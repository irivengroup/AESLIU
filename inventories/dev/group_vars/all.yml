linux_upgrade_environment: dev
linux_upgrade_state_dir: /var/lib/linux-upgrade
linux_upgrade_config_dir: /etc/linux-upgrade
linux_upgrade_change_ticket_pattern: '^CHG[0-9]{7,}$'
linux_upgrade_snapshot_provider: auto
linux_upgrade_snapshot_only_for_virtual_machines: true
linux_upgrade_servicenow_enabled: false
linux_upgrade_target_major_version: null

linux_upgrade_rolling_enabled: false
linux_upgrade_rolling_serial: 1
linux_upgrade_vault_enabled: false
linux_upgrade_vault_url: https://vault.example.com
linux_upgrade_vault_kv_mount: secret

linux_upgrade_rolling_canary_enabled: true
linux_upgrade_rolling_canary_batch_size: 1
linux_upgrade_cluster_quorum_guard_enabled: false
linux_upgrade_cluster_guard_type: none
linux_upgrade_vault_auth_method: token

linux_upgrade_wait_for_server_available: true
linux_upgrade_wait_for_server_timeout: 900
linux_upgrade_force_reboot_after_upgrade: false

linux_upgrade_pre_update_enabled: true
linux_upgrade_pre_update_reboot_if_required: true

linux_upgrade_hardening_enabled: true
linux_upgrade_maintenance_mode_enabled: false
linux_upgrade_backup_critical_files_enabled: true

linux_upgrade_repo_crypto_validation_enabled: true
linux_upgrade_repo_crypto_strict_mode: false
linux_upgrade_post_upgrade_compliance_enabled: true
linux_upgrade_post_upgrade_fail_on_noncompliance: false

linux_upgrade_manage_network_shares_fstab: true

linux_upgrade_manage_root_absolute_symlinks: true
linux_upgrade_update_issue_files_enabled: true

linux_upgrade_local_secrets_enabled: true
linux_upgrade_local_secrets_file: /etc/linux-upgrade/secrets.yml

linux_upgrade_jira_enabled: false
linux_upgrade_change_management_backend: servicenow

linux_upgrade_network_interface_migration_enabled: true
linux_upgrade_network_link_files_enabled: false

linux_upgrade_network_backend: auto
linux_upgrade_network_apply_changes_enabled: true

linux_upgrade_network_recovery_enabled: true
linux_upgrade_network_auto_rollback_on_unreachable: false

linux_upgrade_safe_policy: balanced
linux_upgrade_observability_enabled: true
linux_upgrade_prechecks_advanced_enabled: true
linux_upgrade_before_after_diff_enabled: true
linux_upgrade_servicenow_change_ticket: ""
linux_upgrade_jira_issue_key: ""
linux_upgrade_maintenance_window_enabled: false
linux_upgrade_cluster_guard_min_healthy_nodes: 2
linux_upgrade_application_profiles_load_external: true
linux_upgrade_application_profiles_config_file: /etc/linux-upgrade/application_profiles.yml
linux_upgrade_filesystem_enabled: true
linux_upgrade_filesystem_snapshot_enabled: false
linux_upgrade_lvm_snapshot_enabled: false
linux_upgrade_btrfs_snapshot_enabled: false
linux_upgrade_zfs_snapshot_enabled: false
linux_upgrade_disable_third_party_repos_before_upgrade: true
linux_upgrade_capacity_management_enabled: true
linux_upgrade_filesystem_auto_extend_enabled: false
linux_upgrade_vm_disk_extend_enabled: false
linux_upgrade_server_type: auto
linux_upgrade_network_advanced_l2_enabled: true
linux_upgrade_vm_disk_resize_real_enabled: false
linux_upgrade_local_fs_rollback_enabled: true
linux_upgrade_export_prometheus_textfile_enabled: false
linux_upgrade_application_profiles_selected: []
linux_upgrade_policy_engine_enabled: true
linux_upgrade_policy_profile: balanced
linux_upgrade_inhibitors_catalog_enabled: true
linux_upgrade_plan_enabled: true
linux_upgrade_cluster_orchestration_enabled: true
linux_upgrade_network_post_checks_enabled: true
linux_upgrade_security_hardening_extra_enabled: true
linux_upgrade_cmdb_enabled: false
linux_upgrade_itsm_update_ticket_enabled: false
linux_upgrade_storage_advanced_enabled: true
linux_upgrade_boot_validation_enabled: true
linux_upgrade_artifacts_retention_enabled: true
linux_upgrade_compatibility_matrix_enabled: true
linux_upgrade_remediation_engine_enabled: true
linux_upgrade_assessment_enabled: true
linux_upgrade_hooks_enabled: true
linux_upgrade_cluster_canary_enabled: false
linux_upgrade_security_sign_reports_enabled: false
linux_upgrade_middleware_execution_enabled: true
linux_upgrade_artifacts_archive_enabled: true
linux_upgrade_boot_validate_secureboot: true
linux_upgrade_storage_validate_thinpools: true
linux_upgrade_wave_enabled: false
linux_upgrade_report_html_enabled: true
linux_upgrade_middleware_native_enabled: true
linux_upgrade_middleware_native_fail_on_healthcheck: true
linux_upgrade_storage_resize_advanced_enabled: true
linux_upgrade_storage_simulation_enabled: true
linux_upgrade_storage_allow_non_root_resize: false
linux_upgrade_cluster_native_enabled: true
linux_upgrade_cluster_batch_dynamic_enabled: true
linux_upgrade_cluster_resume_last_healthy_enabled: true
linux_upgrade_tests_enabled: true
linux_upgrade_dbha_native_enabled: true
linux_upgrade_network_reconcile_enabled: true
linux_upgrade_storage_precision_enabled: true
linux_upgrade_itsm_backend_specific_enabled: true