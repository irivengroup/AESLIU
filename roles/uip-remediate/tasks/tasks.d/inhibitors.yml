---
- name: Fix common RHEL Leapp inhibitors
  ansible.builtin.copy:
    dest: /etc/leapp/answers/answerfile
    owner: root
    group: root
    mode: "0644"
    content: |
      [remove_pam_pkcs11_module_check]
      confirm = True
  when:
    - uip_os == "rhel"
    - uip_src_ver in ["7", "8", "9"]
  tags:
    - uip_remediate
    - uip_remediate_inhibitors
    - uip_preupgrade

- name: Ensure Ubuntu release upgrader allows LTS upgrades
  ansible.builtin.lineinfile:
    path: /etc/update-manager/release-upgrades
    regexp: '^Prompt='
    line: 'Prompt=lts'
    create: true
    mode: "0644"
  when:
    - uip_os == "ubuntu"
  tags:
    - uip_remediate
    - uip_remediate_inhibitors
    - uip_preupgrade

- name: Clear interrupted dpkg state
  ansible.builtin.command: dpkg --configure -a
  register: uip_dpkg_configure
  changed_when: false
  failed_when: false
  when:
    - uip_os in ["ubuntu", "debian"]
  tags:
    - uip_remediate
    - uip_remediate_inhibitors
    - uip_preupgrade

- name: Refresh SUSE repositories before migration
  ansible.builtin.command: zypper --non-interactive refresh
  register: uip_suse_refresh
  changed_when: false
  failed_when: false
  when:
    - uip_os == "sles"
  tags:
    - uip_remediate
    - uip_remediate_inhibitors
    - uip_preupgrade


- name: Fix RHEL 6 to 7 legacy upgrade inhibitors
  ansible.builtin.package:
    name:
      - preupgrade-assistant
      - redhat-upgrade-tool
    state: present
  when:
    - uip_os == "rhel"
    - uip_src_ver | string == "6"
    - uip_dst_ver | string == "7"
  tags:
    - uip_remediate
    - uip_remediate_inhibitors
    - uip_preupgrade
