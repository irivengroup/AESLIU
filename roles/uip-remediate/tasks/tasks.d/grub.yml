---
- name: Detect firmware boot mode
  ansible.builtin.set_fact:
    uip_boot_mode: "{{ 'uefi' if ansible_facts.efi is defined and ansible_facts.efi | length > 0 else 'bios' }}"
  tags:
    - uip_remediate
    - uip_remediate_grub
    - uip_preupgrade

- name: Detect GRUB2 command
  ansible.builtin.command: command -v grub2-mkconfig
  register: uip_grub2_cmd
  changed_when: false
  failed_when: false
  tags:
    - uip_remediate
    - uip_remediate_grub
    - uip_preupgrade

- name: Detect GRUB command
  ansible.builtin.command: command -v grub-mkconfig
  register: uip_grub_cmd
  changed_when: false
  failed_when: false
  tags:
    - uip_remediate
    - uip_remediate_grub
    - uip_preupgrade

- name: Set GRUB facts
  ansible.builtin.set_fact:
    uip_grub_version: "{{ '2' if uip_grub2_cmd.rc == 0 or uip_grub_cmd.rc == 0 else '1' }}"
    uip_grub_mkconfig: "{{ uip_grub2_cmd.stdout if uip_grub2_cmd.rc == 0 else uip_grub_cmd.stdout }}"
  tags:
    - uip_remediate
    - uip_remediate_grub
    - uip_preupgrade

- name: Set GRUB output path
  ansible.builtin.set_fact:
    uip_grub_cfg_path: >-
      {{
        '/boot/efi/EFI/redhat/grub.cfg'
        if uip_os == 'rhel' and uip_boot_mode == 'uefi'
        else '/boot/efi/EFI/ubuntu/grub.cfg'
        if uip_os == 'ubuntu' and uip_boot_mode == 'uefi'
        else '/boot/efi/EFI/debian/grub.cfg'
        if uip_os == 'debian' and uip_boot_mode == 'uefi'
        else '/boot/grub2/grub.cfg'
        if uip_os in ['rhel', 'sles']
        else '/boot/grub/grub.cfg'
      }}
  tags:
    - uip_remediate
    - uip_remediate_grub
    - uip_preupgrade

- name: Reconfigure GRUB2 configuration
  ansible.builtin.command: "{{ uip_grub_mkconfig }} -o {{ uip_grub_cfg_path }}"
  register: uip_grub_reconfigure
  changed_when: true
  failed_when: uip_grub_reconfigure.rc != 0
  when:
    - uip_remediate_grub_reconfigure | bool
    - uip_grub_version == "2"
    - uip_grub_mkconfig | length > 0
  tags:
    - uip_remediate
    - uip_remediate_grub
    - uip_preupgrade

- name: Install GRUB on BIOS systems when applicable
  ansible.builtin.command: "grub2-install {{ ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='device') | first }}"
  register: uip_grub_install
  changed_when: true
  failed_when: false
  when:
    - uip_remediate_grub_reconfigure | bool
    - uip_boot_mode == "bios"
    - uip_os in ["rhel", "sles"]
    - uip_grub_version == "2"
  tags:
    - uip_remediate
    - uip_remediate_grub
    - uip_preupgrade
