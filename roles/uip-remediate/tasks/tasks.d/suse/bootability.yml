---
- name: Detect SUSE firmware mode
  ansible.builtin.stat:
    path: /sys/firmware/efi
  register: uip_bootability_efi_stat
  tags:
    - uip_remediate
    - uip_remediate_suse
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Set SUSE bootability facts
  ansible.builtin.set_fact:
    uip_boot_mode: "{{ 'uefi' if uip_bootability_efi_stat.stat.exists else 'bios' }}"
    uip_bootability_grub_cfg: "/boot/grub2/grub.cfg"
  tags:
    - uip_remediate
    - uip_remediate_suse
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Detect SUSE running kernel
  ansible.builtin.command: uname -r
  register: uip_bootability_running_kernel
  changed_when: false
  failed_when: uip_bootability_running_kernel.rc != 0
  tags:
    - uip_remediate
    - uip_remediate_suse
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Check SUSE kernel image exists
  ansible.builtin.stat:
    path: "/boot/vmlinuz-{{ uip_bootability_running_kernel.stdout }}"
  register: uip_bootability_kernel_img
  tags:
    - uip_remediate
    - uip_remediate_suse
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Check SUSE initrd exists
  ansible.builtin.stat:
    path: "/boot/initrd-{{ uip_bootability_running_kernel.stdout }}"
  register: uip_bootability_initramfs
  tags:
    - uip_remediate
    - uip_remediate_suse
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Check SUSE GRUB2 configuration exists
  ansible.builtin.stat:
    path: "{{ uip_bootability_grub_cfg }}"
  register: uip_bootability_grub_cfg_stat
  tags:
    - uip_remediate
    - uip_remediate_suse
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Assert SUSE boot artifacts are bootable
  ansible.builtin.assert:
    that:
      - uip_bootability_kernel_img.stat.exists
      - uip_bootability_kernel_img.stat.size | int > 0
      - uip_bootability_initramfs.stat.exists
      - uip_bootability_initramfs.stat.size | int > 0
      - uip_bootability_grub_cfg_stat.stat.exists
      - uip_bootability_grub_cfg_stat.stat.size | int > 0
    fail_msg: "SUSE bootability check failed: kernel, initrd or GRUB2 config is missing."
  tags:
    - uip_remediate
    - uip_remediate_suse
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Verify SUSE running kernel appears in GRUB2 configuration
  ansible.builtin.command: "grep -F {{ uip_bootability_running_kernel.stdout }} {{ uip_bootability_grub_cfg }}"
  register: uip_bootability_kernel_in_grub
  changed_when: false
  failed_when: uip_bootability_kernel_in_grub.rc != 0
  tags:
    - uip_remediate
    - uip_remediate_suse
    - uip_remediate_bootloader
    - uip_preupgrade
