---
- name: Detect RHEL firmware mode
  ansible.builtin.stat:
    path: /sys/firmware/efi
  register: uip_bootability_efi_stat
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Set RHEL Leapp bootability facts
  ansible.builtin.set_fact:
    uip_boot_mode: "{{ 'uefi' if uip_bootability_efi_stat.stat.exists else 'bios' }}"
    uip_bootability_grub_cfg: "{{ '/boot/efi/EFI/redhat/grub.cfg' if uip_bootability_efi_stat.stat.exists else '/boot/grub2/grub.cfg' }}"
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Detect RHEL running kernel
  ansible.builtin.command: uname -r
  register: uip_bootability_running_kernel
  changed_when: false
  failed_when: uip_bootability_running_kernel.rc != 0
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Check RHEL kernel image exists
  ansible.builtin.stat:
    path: "/boot/vmlinuz-{{ uip_bootability_running_kernel.stdout }}"
  register: uip_bootability_kernel_img
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Check RHEL initramfs exists
  ansible.builtin.stat:
    path: "/boot/initramfs-{{ uip_bootability_running_kernel.stdout }}.img"
  register: uip_bootability_initramfs
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Check RHEL GRUB2 configuration exists
  ansible.builtin.stat:
    path: "{{ uip_bootability_grub_cfg }}"
  register: uip_bootability_grub_cfg_stat
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Assert RHEL Leapp boot artifacts are bootable
  ansible.builtin.assert:
    that:
      - uip_bootability_kernel_img.stat.exists
      - uip_bootability_kernel_img.stat.size | int > 0
      - uip_bootability_initramfs.stat.exists
      - uip_bootability_initramfs.stat.size | int > 0
      - uip_bootability_grub_cfg_stat.stat.exists
      - uip_bootability_grub_cfg_stat.stat.size | int > 0
    fail_msg: "RHEL bootability check failed: kernel, initramfs or GRUB2 config is missing."
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Verify RHEL running kernel appears in GRUB2 configuration
  ansible.builtin.command: "grep -F {{ uip_bootability_running_kernel.stdout }} {{ uip_bootability_grub_cfg }}"
  register: uip_bootability_kernel_in_grub
  changed_when: false
  failed_when: uip_bootability_kernel_in_grub.rc != 0
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade

- name: Validate RHEL grubby default kernel
  ansible.builtin.command: grubby --default-kernel
  register: uip_bootability_grubby_default
  changed_when: false
  failed_when: uip_bootability_grubby_default.rc != 0
  tags:
    - uip_remediate
    - uip_remediate_rhel
    - uip_remediate_bootloader
    - uip_preupgrade
