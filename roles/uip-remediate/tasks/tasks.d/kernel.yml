---
- name: Detect running kernel
  ansible.builtin.command: uname -r
  register: uip_running_kernel
  changed_when: false
  tags:
    - uip_remediate
    - uip_remediate_kernel
    - uip_preupgrade


- name: Ensure yum-utils for legacy kernel cleanup
  ansible.builtin.package:
    name: yum-utils
    state: present
  when:
    - uip_os == "rhel"
    - uip_src_ver | string == "6"
  tags:
    - uip_remediate
    - uip_remediate_kernel
    - uip_preupgrade

- name: Clean old kernels on RHEL family
  ansible.builtin.command: "package-cleanup --oldkernels --count={{ uip_remediate_kernel_keep }} -y"
  register: uip_kernel_cleanup_rhel
  changed_when: "'No old kernels to remove' not in (uip_kernel_cleanup_rhel.stdout | default(''))"
  failed_when: false
  when:
    - uip_os == "rhel"
    - uip_remediate_boot_cleanup | bool
  tags:
    - uip_remediate
    - uip_remediate_kernel
    - uip_preupgrade

- name: Autoremove obsolete kernels on APT family
  ansible.builtin.apt:
    autoremove: true
    purge: true
  when:
    - uip_os in ["ubuntu", "debian"]
    - uip_remediate_boot_cleanup | bool
  tags:
    - uip_remediate
    - uip_remediate_kernel
    - uip_preupgrade

- name: Remove orphaned packages on SUSE
  ansible.builtin.command: zypper --non-interactive packages --orphaned
  register: uip_suse_orphans
  changed_when: false
  failed_when: false
  when:
    - uip_os == "sles"
    - uip_remediate_boot_cleanup | bool
  tags:
    - uip_remediate
    - uip_remediate_kernel
    - uip_preupgrade

- name: Remove obsolete weak modules
  ansible.builtin.command: weak-modules --remove-kernel "{{ uip_running_kernel.stdout }}"
  register: uip_weak_modules
  changed_when: false
  failed_when: false
  when:
    - uip_os == "rhel"
  tags:
    - uip_remediate
    - uip_remediate_kernel
    - uip_preupgrade
