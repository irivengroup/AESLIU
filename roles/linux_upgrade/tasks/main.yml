- name: Include facts
  include_tasks: tasks.d/core/facts.yml

- name: Include policy engine
  include_tasks: tasks.d/core/policy_engine.yml

- name: Include change management normalization
  include_tasks: tasks.d/core/change_management.yml

- name: Include validation
  include_tasks: tasks.d/core/validate.yml

- name: Include network recovery resume restore
  include_tasks: tasks.d/operations/network_resume_restore.yml

- name: Include Vault secret resolution
  include_tasks: tasks.d/core/vault.yml

- name: Include local secrets fallback
  include_tasks: tasks.d/core/local_secrets.yml

- name: Include server type resolution
  include_tasks: tasks.d/core/server_type.yml

- name: Include application profiles loading
  include_tasks: tasks.d/core/application_profiles.yml

- name: Include hardening preparation
  include_tasks: tasks.d/core/hardening_prepare.yml

- name: Include lock handling
  include_tasks: tasks.d/core/lock.yml

- name: Include purge lock
  include_tasks: tasks.d/core/purge_lock.yml
  tags: [purge_lock]

- name: Run default full workflow when no tags
  include_tasks: tasks.d/workflows/workflow_execute.yml
  when: ansible_run_tags | default([]) | length == 0

- name: Run plan workflow
  include_tasks: tasks.d/workflows/workflow_plan.yml
  when: "'plan' in (ansible_run_tags | default([]))"
  tags: [plan]

- name: Run execute workflow
  include_tasks: tasks.d/workflows/workflow_execute.yml
  when: "'execute' in (ansible_run_tags | default([])) or 'upgrade' in (ansible_run_tags | default([])) or 'pre_upgrade' in (ansible_run_tags | default([])) or 'post_upgrade' in (ansible_run_tags | default([]))"
  tags: [execute, upgrade, pre_upgrade, post_upgrade]

- name: Run rollback workflow
  include_tasks: tasks.d/workflows/workflow_rollback.yml
  when: "'rollback' in (ansible_run_tags | default([]))"
  tags: [rollback]

- name: Include compatibility matrix
  include_tasks: tasks.d/operations/platform/compatibility_matrix.yml
- name: Include remediation engine
  include_tasks: tasks.d/operations/platform/remediation_engine.yml
