- name: Stat lock before purge
  stat:
    path: "{{ linux_upgrade_lock_file }}"
  register: _purge_lock_stat

- name: Validate purge lock request
  assert:
    that:
      - linux_upgrade_force_purge_lock | bool
      - linux_upgrade_lock_admin_confirm | bool
      - linux_upgrade_lock_admin_reason | length > 0
    fail_msg: "purge_lock requires force flag, admin confirm and reason."
  when: _purge_lock_stat.stat.exists

- name: Backup lock before purge
  copy:
    remote_src: true
    src: "{{ linux_upgrade_lock_file }}"
    dest: "{{ linux_upgrade_lock_file }}.bak.{{ ansible_date_time.epoch }}"
    mode: "0640"
  when: _purge_lock_stat.stat.exists

- name: Remove active lock
  file:
    path: "{{ linux_upgrade_lock_file }}"
    state: absent
  when: _purge_lock_stat.stat.exists
