- name: Validate supported minimum version
  assert:
    that:
      - linux_upgrade_source_major_version | int >= (linux_upgrade_supported_min_major_versions[linux_upgrade_distribution_key] | default(0) | int)
    fail_msg: "Unsupported source version for {{ linux_upgrade_distribution_key }}: {{ linux_upgrade_source_major_version }}"

- name: Validate target version is next major only
  assert:
    that:
      - linux_upgrade_target_major_version | int == (linux_upgrade_source_major_version | int) + 1
    fail_msg: "Only next major upgrade is allowed. source={{ linux_upgrade_source_major_version }} target={{ linux_upgrade_target_major_version }}"

- name: Validate change ticket for execution
  assert:
    that:
      - (linux_upgrade_change_ticket | default('') | length > 0) or (linux_upgrade_servicenow_change_ticket | default('') | length > 0) or (linux_upgrade_jira_issue_key | default('') | length > 0)
    fail_msg: "A change ticket is mandatory for execute workflow."
  when: linux_upgrade_action == 'execute' or ansible_run_tags | default([]) | length == 0 or 'execute' in (ansible_run_tags | default([])) or 'upgrade' in (ansible_run_tags | default([]))

- name: Validate ServiceNow ticket format when backend includes ServiceNow
  assert:
    that:
      - linux_upgrade_change_ticket is match(linux_upgrade_change_ticket_pattern)
    fail_msg: "Invalid ServiceNow change ticket format."
  when:
    - linux_upgrade_servicenow_enabled | bool
    - linux_upgrade_change_management_backend in ['servicenow', 'both']

- name: Validate Jira ticket format when backend includes Jira
  assert:
    that:
      - linux_upgrade_change_ticket is match(linux_upgrade_jira_issue_key_pattern)
    fail_msg: "Invalid Jira ticket format."
  when:
    - linux_upgrade_jira_enabled | bool
    - linux_upgrade_change_management_backend in ['jira', 'both']

- name: Validate rollback snapshot id
  assert:
    that:
      - linux_upgrade_snapshot_id | length > 0
    fail_msg: "linux_upgrade_snapshot_id is mandatory for rollback."
  when: "'rollback' in (ansible_run_tags | default([]))"

- name: Optional ServiceNow validation
  uri:
    url: "{{ linux_upgrade_servicenow_url }}/api/now/table/change_request?sysparm_query=number={{ linux_upgrade_servicenow_change_ticket | default(linux_upgrade_change_ticket) }}"
    method: GET
    user: "{{ linux_upgrade_servicenow_username }}"
    password: "{{ linux_upgrade_servicenow_password }}"
    force_basic_auth: true
    validate_certs: true
    return_content: true
  register: _snow_result
  no_log: true
  when:
    - linux_upgrade_servicenow_enabled | bool
    - linux_upgrade_change_management_backend in ['servicenow', 'both']
    - linux_upgrade_change_ticket is defined

- name: Assert ServiceNow state
  assert:
    that:
      - _snow_result.json.result | length > 0
      - (_snow_result.json.result[0].state | lower) in linux_upgrade_servicenow_allowed_states
    fail_msg: "Change ticket not approved/eligible in ServiceNow."
  when:
    - linux_upgrade_servicenow_enabled | bool
    - linux_upgrade_change_management_backend in ['servicenow', 'both']

- name: Optional Jira validation with API token
  uri:
    url: "{{ linux_upgrade_jira_url }}/rest/api/2/issue/{{ linux_upgrade_jira_issue_key | default(linux_upgrade_change_ticket) }}?fields=status"
    method: GET
    headers:
      Authorization: "Bearer {{ linux_upgrade_jira_token }}"
      Accept: "application/json"
    validate_certs: "{{ linux_upgrade_jira_validate_certs }}"
    return_content: true
  register: _jira_result_token
  no_log: true
  when:
    - linux_upgrade_jira_enabled | bool
    - linux_upgrade_change_management_backend in ['jira', 'both']
    - linux_upgrade_change_ticket is defined
    - linux_upgrade_jira_token | length > 0

- name: Optional Jira validation with basic auth
  uri:
    url: "{{ linux_upgrade_jira_url }}/rest/api/2/issue/{{ linux_upgrade_jira_issue_key | default(linux_upgrade_change_ticket) }}?fields=status"
    method: GET
    user: "{{ linux_upgrade_jira_username }}"
    password: "{{ linux_upgrade_jira_password }}"
    force_basic_auth: true
    headers:
      Accept: "application/json"
    validate_certs: "{{ linux_upgrade_jira_validate_certs }}"
    return_content: true
  register: _jira_result_basic
  no_log: true
  when:
    - linux_upgrade_jira_enabled | bool
    - linux_upgrade_change_management_backend in ['jira', 'both']
    - linux_upgrade_change_ticket is defined
    - (linux_upgrade_jira_token | length) == 0
    - linux_upgrade_jira_username | length > 0

- name: Normalize Jira validation result
  set_fact:
    linux_upgrade_jira_validation_result: "{{ _jira_result_token if (_jira_result_token is defined and _jira_result_token.status is defined) else _jira_result_basic }}"
  when:
    - linux_upgrade_jira_enabled | bool
    - linux_upgrade_change_management_backend in ['jira', 'both']

- name: Assert Jira state
  assert:
    that:
      - linux_upgrade_jira_validation_result.status | int == 200
      - linux_upgrade_jira_validation_result.json.fields.status.name in linux_upgrade_jira_allowed_statuses
    fail_msg: "Change ticket not approved/eligible in Jira."
  when:
    - linux_upgrade_jira_enabled | bool
    - linux_upgrade_change_management_backend in ['jira', 'both']
