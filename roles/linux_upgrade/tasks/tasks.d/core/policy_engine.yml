- name: Resolve policy profile
  set_fact:
    linux_upgrade_policy_effective: "{{ linux_upgrade_policy_profiles.get(linux_upgrade_policy_profile, linux_upgrade_policy_profiles.balanced) }}"
  when: linux_upgrade_policy_engine_enabled | bool

- name: Apply policy to rollback/reboot/resize flags
  set_fact:
    linux_upgrade_network_auto_rollback_on_unreachable: "{{ linux_upgrade_policy_effective.allow_auto_rollback | default(linux_upgrade_network_auto_rollback_on_unreachable) }}"
    linux_upgrade_vm_disk_resize_real_enabled: "{{ linux_upgrade_policy_effective.allow_vm_disk_resize | default(linux_upgrade_vm_disk_resize_real_enabled) }}"
    linux_upgrade_allow_reboot: "{{ linux_upgrade_policy_effective.allow_reboot | default(linux_upgrade_allow_reboot) }}"
    linux_upgrade_local_fs_rollback_enabled: "{{ linux_upgrade_policy_effective.allow_local_fs_rollback | default(linux_upgrade_local_fs_rollback_enabled) }}"
  when: linux_upgrade_policy_engine_enabled | bool
