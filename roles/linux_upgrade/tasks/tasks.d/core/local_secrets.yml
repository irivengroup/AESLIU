- name: Check local secrets file presence
  stat:
    path: "{{ linux_upgrade_local_secrets_file }}"
  register: _linux_upgrade_local_secrets_stat
  when: linux_upgrade_local_secrets_enabled | bool

- name: Harden local secrets file permissions
  file:
    path: "{{ linux_upgrade_local_secrets_file }}"
    mode: "0600"
  when:
    - linux_upgrade_local_secrets_enabled | bool
    - _linux_upgrade_local_secrets_stat.stat.exists | default(false)

- name: Load local secrets file
  include_vars:
    file: "{{ linux_upgrade_local_secrets_file }}"
    name: linux_upgrade_local_secrets
  no_log: true
  when:
    - linux_upgrade_local_secrets_enabled | bool
    - _linux_upgrade_local_secrets_stat.stat.exists | default(false)
