- name: Ensure backup directories exist
  file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
  loop:
    - "{{ linux_upgrade_backup_dir }}"
    - "{{ linux_upgrade_network_backup_dir }}"
  when: linux_upgrade_hardening_enabled | bool

- name: Ensure state dir permissions are hardened
  file:
    path: "{{ linux_upgrade_state_dir }}"
    state: directory
    mode: "0750"
  when: linux_upgrade_hardening_enabled | bool

- name: Backup critical files before any operation
  copy:
    remote_src: true
    src: "{{ item }}"
    dest: "{{ linux_upgrade_backup_dir }}/{{ item | basename }}.{{ ansible_date_time.epoch }}"
    mode: "0600"
  loop:
    - /etc/fstab
    - /etc/default/grub
    - /etc/hosts
    - /etc/resolv.conf
    - /etc/os-release
  failed_when: false
  when:
    - linux_upgrade_hardening_enabled | bool
    - linux_upgrade_backup_critical_files_enabled | bool

- name: Backup NetworkManager profiles
  shell: "cp -a {{ linux_upgrade_networkmanager_connections_dir }}/* {{ linux_upgrade_network_backup_dir }}/ 2>/dev/null || true"
  changed_when: true
  when:
    - linux_upgrade_hardening_enabled | bool
    - linux_upgrade_network_backup_enabled | bool
    - linux_upgrade_networkmanager_connections_dir | length > 0

- name: Validate /boot space
  shell: "df -B1 /boot | awk 'NR==2 {print $4}'"
  register: _boot_free
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_hardening_enabled | bool
    - linux_upgrade_check_boot_space_enabled | bool

- name: Assert /boot free space
  assert:
    that:
      - (_boot_free.stdout | int) >= (linux_upgrade_min_boot_free_bytes | int)
    fail_msg: "Insufficient free space on /boot."
  when:
    - linux_upgrade_hardening_enabled | bool
    - linux_upgrade_check_boot_space_enabled | bool
    - _boot_free.stdout | default('0') | int > 0

- name: Validate /boot/efi space
  shell: "test -d /boot/efi && df -B1 /boot/efi | awk 'NR==2 {print $4}' || echo 999999999"
  register: _bootefi_free
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_hardening_enabled | bool
    - linux_upgrade_check_boot_space_enabled | bool

- name: Assert /boot/efi free space
  assert:
    that:
      - (_bootefi_free.stdout | int) >= (linux_upgrade_min_boot_efi_free_bytes | int)
    fail_msg: "Insufficient free space on /boot/efi."
  when:
    - linux_upgrade_hardening_enabled | bool
    - linux_upgrade_check_boot_space_enabled | bool
    - _bootefi_free.stdout | default('0') | int > 0

- name: Validate DNS resolution
  shell: "getent hosts {{ item }}"
  loop: "{{ linux_upgrade_dns_test_hosts }}"
  changed_when: false
  when:
    - linux_upgrade_hardening_enabled | bool
    - linux_upgrade_validate_dns_enabled | bool

- name: Validate NTP/time sync
  shell: |
    if command -v timedatectl >/dev/null 2>&1; then
      timedatectl show -p NTPSynchronized --value | grep -qi yes
    elif command -v chronyc >/dev/null 2>&1; then
      chronyc tracking >/dev/null 2>&1
    else
      exit 0
    fi
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_hardening_enabled | bool
    - linux_upgrade_validate_ntp_enabled | bool

- name: Write hardening preparation report
  copy:
    dest: "{{ linux_upgrade_hardening_report_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "hardening_enabled": {{ 'true' if linux_upgrade_hardening_enabled else 'false' }},
        "backup_dir": "{{ linux_upgrade_backup_dir }}",
        "network_backup_dir": "{{ linux_upgrade_network_backup_dir }}",
        "timestamp": "{{ ansible_date_time.iso8601 }}"
      }
  when: linux_upgrade_hardening_enabled | bool
