- name: Check application profiles config file
  stat:
    path: "{{ linux_upgrade_application_profiles_config_file }}"
  register: _linux_upgrade_application_profiles_file

- name: Load external application profiles
  include_vars:
    file: "{{ linux_upgrade_application_profiles_config_file }}"
    name: linux_upgrade_application_profiles_external
  when:
    - linux_upgrade_application_profiles_load_external | bool
    - _linux_upgrade_application_profiles_file.stat.exists | default(false)

- name: Resolve family application profiles root
  set_fact:
    linux_upgrade_application_profiles_family_root: >-
      {{
        (linux_upgrade_application_profiles_external.application_profiles.get(linux_upgrade_distribution_key, {}))
        if (linux_upgrade_application_profiles_external is defined and linux_upgrade_application_profiles_external.application_profiles is defined)
        else {}
      }}

- name: Resolve OS version-specific application profile key
  set_fact:
    linux_upgrade_application_profiles_version_key: >-
      {{
        (
          (linux_upgrade_distribution_key | lower | regex_replace('[^a-z0-9]+', '')) ~
          (linux_upgrade_target_major_version | string)
        )
      }}

- name: Resolve default and version-specific application profiles
  set_fact:
    linux_upgrade_application_profiles_default_resolved: "{{ linux_upgrade_application_profiles_family_root.get('default', {}) }}"
    linux_upgrade_application_profiles_version_resolved: "{{ linux_upgrade_application_profiles_family_root.get(linux_upgrade_application_profiles_version_key, {}) }}"

- name: Merge application profiles for target OS version
  set_fact:
    linux_upgrade_application_profiles_merged_for_target: >-
      {{
        (linux_upgrade_application_profiles_default_resolved | default({}))
        | combine((linux_upgrade_application_profiles_version_resolved | default({})), recursive=True)
      }}

- name: Resolve supported application profile names for target
  set_fact:
    linux_upgrade_application_profiles_supported_for_target: "{{ linux_upgrade_application_profiles_merged_for_target.keys() | list }}"

- name: Resolve selected application profiles
  set_fact:
    linux_upgrade_application_profiles_selected_effective: >-
      {{
        linux_upgrade_application_profiles_selected
        if (linux_upgrade_application_profiles_selected | default([]) | length > 0)
        else (linux_upgrade_application_profiles_supported_for_target | default([]))
      }}

- name: Resolve effective application compliance profile bundle
  set_fact:
    linux_upgrade_application_profile_effective_bundle: >-
      {{
        dict(
          (linux_upgrade_application_profiles_selected_effective | default([]))
          | zip(
              (linux_upgrade_application_profiles_selected_effective | default([]))
              | map('extract', linux_upgrade_application_profiles_merged_for_target)
            )
        )
      }}
