- name: Ensure state dir exists
  file:
    path: "{{ linux_upgrade_state_dir }}"
    state: directory
    mode: "0750"

- name: Set source version facts
  set_fact:
    linux_upgrade_source_version: "{{ ansible_distribution_version }}"
    linux_upgrade_source_major_version: "{{ ansible_distribution_major_version | int }}"
    linux_upgrade_distribution_key: >-
      {{ 'RedHat' if ansible_os_family == 'RedHat' else
         'Debian' if ansible_distribution == 'Debian' else
         'Ubuntu' if ansible_distribution == 'Ubuntu' else
         'SLES' if ansible_os_family == 'Suse' else ansible_distribution }}

- name: Detect boot mode
  set_fact:
    linux_upgrade_boot_mode: "{{ 'uefi' if ansible_facts['filesystems'] is defined and lookup('ansible.builtin.fileglob', '/sys/firmware/efi', errors='ignore') != '' else ('uefi' if ansible_facts['virtualization_role'] is defined and false else ('uefi' if ansible_facts['efi'] | default(false) else 'bios')) }}"
  failed_when: false

- name: Detect if VM guest
  set_fact:
    linux_upgrade_is_virtual_machine: >-
      {{ ansible_virtualization_role | default('') == 'guest'
         and (ansible_virtualization_type | default('') not in ['docker','container','podman','lxc','containerd']) }}

- name: Derive snapshot provider automatically
  set_fact:
    linux_upgrade_snapshot_provider_effective: >-
      {% if not linux_upgrade_snapshot_only_for_virtual_machines and linux_upgrade_snapshot_provider != 'auto' %}
      {{ linux_upgrade_snapshot_provider }}
      {% elif linux_upgrade_snapshot_provider != 'auto' %}
      {{ linux_upgrade_snapshot_provider }}
      {% elif not linux_upgrade_is_virtual_machine %}
      none
      {% elif linux_upgrade_virtualization_provider_hint %}
      {{ linux_upgrade_virtualization_provider_hint }}
      {% elif ansible_virtualization_type | default('') in ['VMware', 'vmware'] %}
      vmware
      {% elif 'openstack' in (ansible_product_name | default('') | lower) or 'openstack' in (ansible_system_vendor | default('') | lower) %}
      openstack
      {% elif (ansible_virtualization_type | default('') | lower) in ['kvm', 'qemu'] and linux_upgrade_proxmox_vmid | string | length > 0 %}
      proxmox
      {% else %}
      none
      {% endif %}

- name: Set target major fallback
  set_fact:
    linux_upgrade_target_major_version: "{{ linux_upgrade_target_major_version | default((linux_upgrade_source_major_version | int) + 1, true) }}"
  when: linux_upgrade_target_major_version is not defined or linux_upgrade_target_major_version in [None, '', 'null']

- name: Detect default root disk for grub
  shell: "lsblk -ndo PKNAME $(findmnt -n -o SOURCE / | sed 's/[0-9]*$//') 2>/dev/null | head -n1"
  register: _root_disk
  changed_when: false
  failed_when: false

- name: Set bootloader device
  set_fact:
    linux_upgrade_bootloader_device: "{{ linux_upgrade_bootloader_device | default('', true) | ternary(linux_upgrade_bootloader_device, '/dev/' + (_root_disk.stdout | trim)) }}"
  when: (_root_disk.stdout | default('') | trim | length) > 0
