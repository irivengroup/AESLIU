- name: Stat active lock
  stat:
    path: "{{ linux_upgrade_lock_file }}"
  register: _active_lock

- name: Read active lock
  slurp:
    path: "{{ linux_upgrade_lock_file }}"
  register: _lock_content
  when: _active_lock.stat.exists

- name: Parse active lock
  set_fact:
    linux_upgrade_existing_lock: "{{ _lock_content.content | b64decode | from_yaml }}"
  when: _active_lock.stat.exists

- name: Block new upgrade if active lock exists and resume not allowed
  fail:
    msg: "Active upgrade lock exists: {{ linux_upgrade_lock_file }}"
  when:
    - _active_lock.stat.exists
    - not (linux_upgrade_resume_allowed | bool and
           linux_upgrade_existing_lock.change_ticket == linux_upgrade_change_ticket and
           (linux_upgrade_existing_lock.target_major_version | int) == (linux_upgrade_target_major_version | int))

- name: Create active lock before execution
  copy:
    dest: "{{ linux_upgrade_lock_file }}"
    mode: "0640"
    content: |
      distribution: {{ ansible_distribution }}
      source_version: {{ linux_upgrade_source_version }}
      source_major_version: {{ linux_upgrade_source_major_version }}
      target_major_version: {{ linux_upgrade_target_major_version }}
      change_ticket: {{ linux_upgrade_change_ticket }}
  when:
    - "'rollback' not in (ansible_run_tags | default([]))"
    - "'plan' not in (ansible_run_tags | default([]))"
    - linux_upgrade_change_ticket is defined
