- name: Normalize change management identifiers
  set_fact:
    linux_upgrade_change_ticket_effective: >-
      {{
        linux_upgrade_servicenow_change_ticket
        if (linux_upgrade_change_management_backend in ['servicenow', 'both'] and (linux_upgrade_servicenow_change_ticket | default('') | length > 0))
        else (
          linux_upgrade_jira_issue_key
          if (linux_upgrade_change_management_backend in ['jira', 'both'] and (linux_upgrade_jira_issue_key | default('') | length > 0))
          else (linux_upgrade_change_ticket | default(''))
        )
      }}

- name: Enforce explicit separate identifiers when both backends are required
  assert:
    that:
      - linux_upgrade_servicenow_change_ticket | length > 0
      - linux_upgrade_jira_issue_key | length > 0
    fail_msg: "Both ServiceNow and Jira identifiers are required."
  when:
    - linux_upgrade_change_management_backend == 'both'
    - linux_upgrade_change_management_require_both_when_configured | bool

- name: Map effective change ticket back to generic field if empty
  set_fact:
    linux_upgrade_change_ticket: "{{ linux_upgrade_change_ticket | default(linux_upgrade_change_ticket_effective, true) }}"
