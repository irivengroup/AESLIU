- name: Deploy runtime directories
  include_tasks: ../operations/deploy.yml
  tags: [deploy]

- name: Run rolling pre-batch checks
  include_tasks: ../operations/rolling.yml
  vars:
    linux_upgrade_rolling_phase: pre
  when: linux_upgrade_rolling_enabled | bool
  tags: [rolling, pre_upgrade]

- name: Run pre-upgrade sequence
  include_tasks: ../operations/pre_upgrade.yml
  tags: [pre_upgrade]

- name: Run upgrade
  include_tasks: ../operations/upgrade.yml
  tags: [execute, upgrade]

- name: Run post-upgrade sequence
  include_tasks: ../operations/post_upgrade.yml
  tags: [post_upgrade]

- name: Run rolling post-batch checks
  include_tasks: ../operations/rolling.yml
  vars:
    linux_upgrade_rolling_phase: post
  when: linux_upgrade_rolling_enabled | bool
  tags: [rolling, post_upgrade]
