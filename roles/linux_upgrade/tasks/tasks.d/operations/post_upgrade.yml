- name: Write post-upgrade start event
  include_tasks: platform/observability.yml
  vars:
    linux_upgrade_event_phase: post_upgrade_start
  tags: [observability]

- name: Refresh package facts
  setup:
    gather_subset:
      - min


- name: Handle reboot if necessary and wait for server availability
  include_tasks: reboot.yml
  vars:
    linux_upgrade_reboot_phase: post_upgrade
  tags: [reboot]

- name: Manage repositories after upgrade
  include_tasks: repos.yml
  vars:
    linux_upgrade_repo_phase: post
  tags: [repos]

- name: Manage subscriptions after upgrade
  include_tasks: subscriptions.yml
  vars:
    linux_upgrade_subscriptions_phase: post
  tags: [subscriptions]

- name: Validate repository cryptography after upgrade
  include_tasks: repo_crypto.yml
  tags: [repos, repo_crypto]

- name: Cleanup legacy packages and old kernels
  include_tasks: cleanup.yml
  tags: [cleanup]

- name: Reconcile network interface naming after upgrade
  include_tasks: network.yml
  vars:
    linux_upgrade_network_migration_phase: post
  tags: [network, interfaces, persistent_network]

- name: Align NetworkManager connection interface-name
  include_tasks: network.yml
  tags: [network]

- name: Reconfigure bootloader
  include_tasks: bootloader.yml
  tags: [bootloader]

- name: Middleware post-commands
  include_tasks: middleware.yml
  vars:
    linux_upgrade_middleware_phase: post
  tags: [middleware]

- name: Cluster activate
  include_tasks: cluster.yml
  vars:
    linux_upgrade_cluster_phase: post
  tags: [clusters]

- name: Restore root absolute symlinks after upgrade
  include_tasks: root_absolute_symlinks.yml
  vars:
    linux_upgrade_root_absolute_symlinks_phase: post
  tags: [symlinks, filesystem]

- name: Restore network shares in fstab after upgrade
  include_tasks: fstab_network_shares.yml
  vars:
    linux_upgrade_fstab_phase: post
  tags: [fstab, storage]

- name: Update issue and motd after upgrade
  include_tasks: issue_motd.yml
  tags: [issue, motd, branding]

- name: Build before/after diff report
  include_tasks: platform/post_upgrade_diff.yml
  tags: [diff, compliance]

- name: Run network post-checks
  include_tasks: network/network_postchecks.yml
  tags: [network, postchecks]


- name: Run native middleware healthchecks
  include_tasks: platform/middleware_native.yml
  tags: [middleware, healthchecks]

- name: Run detailed post-upgrade compliance
  include_tasks: post_upgrade_compliance.yml
  tags: [compliance]

- name: Run pre final checks hooks
  shell: "{{ item }}"
  loop: "{{ linux_upgrade_pre_final_checks_commands }}"
  changed_when: false
  when: linux_upgrade_pre_final_checks_commands | length > 0

- name: Run post checks
  include_tasks: postchecks.yml
  tags: [postchecks]

- name: Cluster post-orchestration
  include_tasks: platform/cluster_orchestration.yml
  vars:
    linux_upgrade_cluster_orchestration_phase: post
  tags: [clusters]

- name: Run post final checks hooks
  shell: "{{ item }}"
  loop: "{{ linux_upgrade_post_final_checks_commands }}"
  changed_when: false
  when: linux_upgrade_post_final_checks_commands | length > 0

- name: Update CMDB and ITSM payloads
  include_tasks: platform/cmdb_itsm.yml
  tags: [cmdb, itsm]

- name: Generate security artifact checksums
  include_tasks: platform/security_extra.yml
  tags: [security]

- name: Validate boot artifacts
  include_tasks: platform/boot_validation.yml
  tags: [boot]

- name: Purge old artifacts
  include_tasks: platform/artifacts_purge.yml
  tags: [artifacts]

- name: Exit maintenance mode
  include_tasks: maintenance.yml
  vars:
    linux_upgrade_maintenance_phase: post
  tags: [maintenance]

- name: Finalize upgraded lock
  copy:
    dest: "{{ linux_upgrade_upgraded_lock_file }}"
    mode: "0640"
    content: |
      distribution: {{ ansible_distribution }}
      final_version: {{ ansible_distribution_version }}
      final_major_version: {{ ansible_distribution_major_version }}
      target_major_version: {{ linux_upgrade_target_major_version }}
      change_ticket: {{ linux_upgrade_change_ticket }}

- name: Remove active lock
  file:
    path: "{{ linux_upgrade_lock_file }}"
    state: absent

- name: Remove pending reboot flag
  file:
    path: "{{ linux_upgrade_pending_reboot_flag }}"
    state: absent

- name: Write final report
  template:
    src: report.json.j2
    dest: "{{ linux_upgrade_report_file }}"
    mode: "0640"

- name: Write post-upgrade completed event
  include_tasks: platform/observability.yml
  vars:
    linux_upgrade_event_phase: post_upgrade_complete
  tags: [observability]

- name: Write post-upgrade timeline event
  include_tasks: platform/timeline.yml
  vars:
    linux_upgrade_timeline_phase: post_upgrade
  tags: [observability]

- name: Run network deep post-checks
  include_tasks: network/network_postchecks.yml
  tags: [network, postchecks]

- name: Execute middleware post hooks
  include_tasks: platform/middleware_execution.yml
  vars:
    linux_upgrade_middleware_execution_phase: post
  tags: [middleware]

- name: Execute application post hooks
  include_tasks: platform/application_hooks.yml
  vars:
    linux_upgrade_application_hooks_phase: post
  tags: [applications]

- name: Push CMDB and ITSM real updates
  include_tasks: platform/cmdb_itsm.yml
  tags: [cmdb, itsm]

- name: Encrypt and sign artifacts
  include_tasks: platform/security_extra.yml
  tags: [security]

- name: Archive state artifacts
  include_tasks: platform/artifacts_archive.yml
  tags: [artifacts]

- name: Deep boot validation
  include_tasks: platform/boot_validation.yml
  tags: [boot]

- name: Wave deployment state
  include_tasks: platform/wave_deployment.yml
  tags: [waves]

- name: Generate HTML summary
  include_tasks: platform/report_html.yml
  tags: [reporting]

- name: Run native cluster orchestration post-phase
  include_tasks: platform/cluster_native.yml
  vars:
    linux_upgrade_cluster_native_phase: post
  tags: [clusters, native_cluster]

- name: Run DB HA native checks post-phase
  include_tasks: platform/dbha_native.yml
  tags: [dbha]

- name: Run network reconcile
  include_tasks: network/network_reconcile.yml
  tags: [network, reconcile]

- name: Run storage precision checks
  include_tasks: filesystem/storage_precision.yml
  tags: [storage]

- name: Run backend-specific ITSM/CMDB updates
  include_tasks: platform/itsm_cmdb_specific.yml
  tags: [itsm, cmdb]

- name: Run non-regression tests
  include_tasks: platform/tests_non_regression.yml
  tags: [tests]
