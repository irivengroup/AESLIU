- name: Determine reboot phase
  set_fact:
    linux_upgrade_reboot_phase_effective: "{{ linux_upgrade_reboot_phase | default('post_upgrade') }}"

- name: Determine whether reboot is required on Debian family
  stat:
    path: /var/run/reboot-required
  register: _deb_reboot_required
  when: ansible_os_family == 'Debian'

- name: Determine whether reboot is required on RHEL-like
  shell: |
    if command -v needs-restarting >/dev/null 2>&1; then
      needs-restarting -r
    else
      exit 1
    fi
  register: _rhel_reboot_required
  changed_when: false
  failed_when: false
  when: ansible_os_family == 'RedHat'

- name: Determine whether reboot is required on SLES
  shell: |
    if command -v zypper >/dev/null 2>&1; then
      zypper ps -s | awk 'NR>2 {found=1} END {exit (found ? 0 : 1)}'
    else
      exit 1
    fi
  register: _sles_reboot_required
  changed_when: false
  failed_when: false
  when: ansible_os_family == 'Suse'

- name: Compute reboot required fact
  set_fact:
    linux_upgrade_reboot_required: >-
      {{
        (linux_upgrade_force_reboot_after_upgrade | bool and linux_upgrade_reboot_phase_effective == 'post_upgrade')
        or
        (ansible_os_family == 'Debian' and (_deb_reboot_required.stat.exists | default(false)))
        or
        (ansible_os_family == 'RedHat' and (_rhel_reboot_required.rc | default(1)) == 1)
        or
        (ansible_os_family == 'Suse' and (_sles_reboot_required.rc | default(1)) == 0)
      }}

- name: Write checkpoint before reboot
  copy:
    dest: "{{ linux_upgrade_post_upgrade_checkpoint_file if linux_upgrade_reboot_phase_effective == 'post_upgrade' else linux_upgrade_pre_update_checkpoint_file }}"
    mode: "0640"
    content: |
      phase: {{ linux_upgrade_reboot_phase_effective }}
      status: reboot_pending
      host: {{ inventory_hostname }}
      distribution: {{ ansible_distribution }}
      version: {{ ansible_distribution_version }}
      target_major_version: {{ linux_upgrade_target_major_version }}
      change_ticket: {{ linux_upgrade_change_ticket | default('N/A') }}
      written_at: {{ ansible_date_time.iso8601 }}
  when:
    - linux_upgrade_allow_reboot | bool
    - linux_upgrade_reboot_required | bool

- name: Reboot server when required
  reboot:
    reboot_timeout: "{{ linux_upgrade_reboot_timeout }}"
    connect_timeout: "{{ linux_upgrade_reboot_connect_timeout }}"
    pre_reboot_delay: "{{ linux_upgrade_reboot_pre_delay }}"
    post_reboot_delay: "{{ linux_upgrade_reboot_post_delay }}"
    test_command: "{{ linux_upgrade_reboot_test_command }}"
    reboot_command: "{{ linux_upgrade_reboot_command if (linux_upgrade_reboot_command | length > 0) else omit }}"
  register: _reboot_result
  when:
    - linux_upgrade_allow_reboot | bool
    - linux_upgrade_reboot_required | bool

- name: Wait for services to settle after reboot
  pause:
    seconds: "{{ linux_upgrade_wait_for_services_settle_seconds | int }}"
  when:
    - linux_upgrade_allow_reboot | bool
    - linux_upgrade_reboot_required | bool
    - linux_upgrade_wait_for_services_settle | bool

- name: Refresh facts after reboot
  setup:
    gather_subset:
      - min
  when:
    - linux_upgrade_allow_reboot | bool
    - linux_upgrade_reboot_required | bool

- name: Mark checkpoint completed after reboot
  copy:
    dest: "{{ linux_upgrade_post_upgrade_checkpoint_file if linux_upgrade_reboot_phase_effective == 'post_upgrade' else linux_upgrade_pre_update_checkpoint_file }}"
    mode: "0640"
    content: |
      phase: {{ linux_upgrade_reboot_phase_effective }}
      status: reboot_completed
      host: {{ inventory_hostname }}
      distribution: {{ ansible_distribution }}
      version: {{ ansible_distribution_version }}
      target_major_version: {{ linux_upgrade_target_major_version }}
      change_ticket: {{ linux_upgrade_change_ticket | default('N/A') }}
      completed_at: {{ ansible_date_time.iso8601 }}
  when:
    - linux_upgrade_allow_reboot | bool
    - linux_upgrade_reboot_required | bool


- block:
    - name: Wait for SSH port after reboot
      wait_for:
        host: "{{ ansible_host | default(inventory_hostname) }}"
        port: "{{ linux_upgrade_wait_for_server_port }}"
        delay: "{{ linux_upgrade_wait_for_server_delay }}"
        sleep: "{{ linux_upgrade_wait_for_server_sleep }}"
        timeout: "{{ linux_upgrade_wait_for_server_timeout }}"
        state: started
      delegate_to: localhost
      when:
        - linux_upgrade_allow_reboot | bool
        - linux_upgrade_reboot_required | bool
        - linux_upgrade_wait_for_server_available | bool

    - name: Wait for connection after reboot
      wait_for_connection:
        delay: "{{ linux_upgrade_wait_for_server_delay }}"
        sleep: "{{ linux_upgrade_wait_for_server_sleep }}"
        timeout: "{{ linux_upgrade_wait_for_server_timeout }}"
        connect_timeout: "{{ linux_upgrade_reboot_connect_timeout }}"
      when:
        - linux_upgrade_allow_reboot | bool
        - linux_upgrade_reboot_required | bool
        - linux_upgrade_wait_for_server_available | bool

  rescue:
    - name: Trigger rollback when host is unreachable after reboot
      include_tasks: rollback.yml
      when:
        - linux_upgrade_network_auto_rollback_on_unreachable | bool
        - (linux_upgrade_snapshot_id_effective | default(linux_upgrade_snapshot_id | default(''))) | length > 0
