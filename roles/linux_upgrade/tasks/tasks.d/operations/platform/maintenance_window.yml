- name: Validate maintenance window inputs
  assert:
    that:
      - linux_upgrade_maintenance_window_start | length > 0
      - linux_upgrade_maintenance_window_end | length > 0
    fail_msg: "Maintenance window start/end must be provided when maintenance window is enabled."
  when: linux_upgrade_maintenance_window_enabled | bool

- name: Check current time is inside maintenance window
  shell: |
    python3 - <<'PY'
    from datetime import datetime
    now = datetime.utcnow().strftime("%H:%M")
    start = "{{ linux_upgrade_maintenance_window_start }}"
    end = "{{ linux_upgrade_maintenance_window_end }}"
    ok = start <= now <= end if start <= end else (now >= start or now <= end)
    raise SystemExit(0 if ok else 1)
    PY
  changed_when: false
  when: linux_upgrade_maintenance_window_enabled | bool
