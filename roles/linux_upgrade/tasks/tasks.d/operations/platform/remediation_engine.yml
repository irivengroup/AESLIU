- name: Check remediation catalog file
  stat:
    path: "{{ linux_upgrade_remediation_catalog_file }}"
  register: _remediation_catalog_file
  when: linux_upgrade_remediation_engine_enabled | bool

- name: Load remediation catalog
  include_vars:
    file: "{{ linux_upgrade_remediation_catalog_file }}"
    name: linux_upgrade_remediation_catalog
  when:
    - linux_upgrade_remediation_engine_enabled | bool
    - _remediation_catalog_file.stat.exists | default(false)

- name: Resolve remediation key
  set_fact:
    linux_upgrade_remediation_catalog_key: "{{ (linux_upgrade_source_major_version | string) ~ '_to_' ~ (linux_upgrade_target_major_version | string) }}"
  when: linux_upgrade_remediation_engine_enabled | bool

- name: Resolve remediation actions
  set_fact:
    linux_upgrade_remediation_actions: "{{ (linux_upgrade_remediation_catalog.remediations.get(linux_upgrade_distribution_key, {}).get(linux_upgrade_remediation_catalog_key, [])) if (linux_upgrade_remediation_catalog is defined and linux_upgrade_remediation_catalog.remediations is defined) else [] }}"
  when: linux_upgrade_remediation_engine_enabled | bool

- name: Execute remediation commands
  shell: "{{ item.command }}"
  loop: "{{ linux_upgrade_remediation_actions }}"
  changed_when: true
  failed_when: false
  when: linux_upgrade_remediation_engine_enabled | bool
