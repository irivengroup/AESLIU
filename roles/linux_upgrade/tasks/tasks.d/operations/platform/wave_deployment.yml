- name: Write wave deployment state
  copy:
    dest: "{{ linux_upgrade_wave_state_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "wave_id": "{{ linux_upgrade_wave_id }}",
        "status": "completed",
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
  when:
    - linux_upgrade_wave_enabled | bool
    - linux_upgrade_wave_id | length > 0

- name: Pause after successful wave
  pause:
    seconds: "{{ linux_upgrade_wave_pause_after_success_seconds | int }}"
  when:
    - linux_upgrade_wave_enabled | bool
    - (linux_upgrade_wave_pause_after_success_seconds | int) > 0
