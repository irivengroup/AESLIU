- name: Collect default grub entry
  shell: |
    if command -v grub2-editenv >/dev/null 2>&1; then grub2-editenv list || true
    elif command -v grub-editenv >/dev/null 2>&1; then grub-editenv list || true
    else true
    fi
  register: _grub_env
  changed_when: false
  failed_when: false
  when: linux_upgrade_boot_validation_enabled | bool

- name: Collect initramfs presence
  shell: "ls -1 /boot/initr* 2>/dev/null || true"
  register: _initramfs_list
  changed_when: false
  failed_when: false
  when: linux_upgrade_boot_validation_enabled | bool

- name: Write boot validation report
  copy:
    dest: "{{ linux_upgrade_boot_validation_report_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "boot_mode": "{{ linux_upgrade_boot_mode | default('unknown') }}",
        "grub_env": {{ (_grub_env.stdout | default('')) | to_json }},
        "initramfs": {{ (_initramfs_list.stdout_lines | default([])) | to_json }},
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
  when: linux_upgrade_boot_validation_enabled | bool

# Merged from boot_deep_validation.yml
- name: Check secure boot status
  shell: "mokutil --sb-state 2>/dev/null || true"
  register: _secureboot
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_boot_validation_enabled | bool
    - linux_upgrade_boot_validate_secureboot | bool

- name: Check running kernel present in grub config
  shell: "grep -R '{{ ansible_kernel }}' /boot/grub* /boot/efi/EFI 2>/dev/null || true"
  register: _kernel_in_grub
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_boot_validation_enabled | bool
    - linux_upgrade_boot_validate_kernel_entry | bool

- name: Append deep boot validation report
  lineinfile:
    path: "{{ linux_upgrade_boot_validation_report_file }}"
    create: true
    mode: "0640"
    line: "{{ {'secureboot': (_secureboot.stdout | default('')), 'kernel_in_grub': (_kernel_in_grub.stdout | default('')), 'timestamp': ansible_date_time.iso8601} | to_json }}"
  when: linux_upgrade_boot_validation_enabled | bool
