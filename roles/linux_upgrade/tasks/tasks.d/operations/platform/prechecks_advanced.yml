- name: Gather mount facts
  set_fact:
    linux_upgrade_root_mount: "{{ (ansible_mounts | selectattr('mount', 'equalto', '/') | list | first) | default({}) }}"
    linux_upgrade_boot_mount: "{{ (ansible_mounts | selectattr('mount', 'equalto', '/boot') | list | first) | default({}) }}"
    linux_upgrade_boot_efi_mount: "{{ (ansible_mounts | selectattr('mount', 'equalto', '/boot/efi') | list | first) | default({}) }}"

- name: Assert root free inodes
  assert:
    that:
      - (linux_upgrade_root_mount.inode_available | default(999999999) | int) >= (linux_upgrade_min_root_free_inodes | int)
    fail_msg: "Insufficient free inodes on root filesystem."
  when: linux_upgrade_prechecks_advanced_enabled | bool

- name: Check SELinux status
  command: getenforce
  register: _selinux_status
  changed_when: false
  failed_when: false
  when: ansible_os_family == 'RedHat'

- name: Check AppArmor status
  command: aa-status
  register: _apparmor_status
  changed_when: false
  failed_when: false
  when: ansible_os_family in ['Debian', 'Suse']

- name: Check default gateway reachability
  shell: "ping -c {{ linux_upgrade_gateway_ping_count | int }} {{ linux_upgrade_network_expected_gateway }}"
  changed_when: false
  when:
    - linux_upgrade_validate_gateway_enabled | bool
    - linux_upgrade_network_expected_gateway | length > 0

- name: Record package inventory before upgrade on RPM systems
  shell: "rpm -qa | sort"
  register: _packages_before_rpm
  changed_when: false
  when:
    - linux_upgrade_before_after_diff_enabled | bool
    - ansible_os_family in ['RedHat', 'Suse']

- name: Record package inventory before upgrade on DEB systems
  shell: "dpkg-query -W -f='${Package} ${Version}\n' | sort"
  register: _packages_before_deb
  changed_when: false
  when:
    - linux_upgrade_before_after_diff_enabled | bool
    - ansible_os_family == 'Debian'

- name: Save package inventory before upgrade
  copy:
    dest: "{{ linux_upgrade_before_packages_inventory_file }}"
    mode: "0640"
    content: "{{ (_packages_before_rpm.stdout if (_packages_before_rpm is defined and _packages_before_rpm.stdout is defined) else (_packages_before_deb.stdout | default(''))) }}"
  when: linux_upgrade_before_after_diff_enabled | bool

- name: Save services inventory before upgrade
  copy:
    dest: "{{ linux_upgrade_before_services_inventory_file }}"
    mode: "0640"
    content: "{{ ansible_facts.services | default({}) | to_nice_json }}"
  when: linux_upgrade_before_after_diff_enabled | bool
