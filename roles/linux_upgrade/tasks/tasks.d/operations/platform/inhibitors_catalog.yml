- name: Check inhibitors catalog file
  stat:
    path: "{{ linux_upgrade_inhibitors_catalog_file }}"
  register: _inhibitors_catalog_file
  when: linux_upgrade_inhibitors_catalog_enabled | bool

- name: Load inhibitors catalog
  include_vars:
    file: "{{ linux_upgrade_inhibitors_catalog_file }}"
    name: linux_upgrade_inhibitors_catalog_data
  when:
    - linux_upgrade_inhibitors_catalog_enabled | bool
    - _inhibitors_catalog_file.stat.exists | default(false)

- name: Write inhibitors example catalog
  copy:
    dest: "{{ linux_upgrade_inhibitors_catalog_example_file }}"
    mode: "0640"
    content: |
      inhibitors:
        RedHat:
          "8_to_9":
            - id: old_kernel_modules
              severity: high
              blocking: true
              remediation: remove_legacy_modules
        Ubuntu:
          "22_to_24":
            - id: legacy_netplan
              severity: medium
              blocking: false
              remediation: normalize_netplan
  when: linux_upgrade_inhibitors_catalog_enabled | bool

- name: Resolve inhibitors catalog key
  set_fact:
    linux_upgrade_inhibitors_catalog_key: "{{ (linux_upgrade_source_major_version | string) ~ '_to_' ~ (linux_upgrade_target_major_version | string) }}"

- name: Resolve effective inhibitors from catalog
  set_fact:
    linux_upgrade_inhibitors_effective: "{{ (linux_upgrade_inhibitors_catalog_data.inhibitors.get(linux_upgrade_distribution_key, {}).get(linux_upgrade_inhibitors_catalog_key, [])) if (linux_upgrade_inhibitors_catalog_data is defined and linux_upgrade_inhibitors_catalog_data.inhibitors is defined) else [] }}"
  when: linux_upgrade_inhibitors_catalog_enabled | bool

- name: Write inhibitors report
  copy:
    dest: "{{ linux_upgrade_inhibitors_report_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "distribution_key": "{{ linux_upgrade_distribution_key }}",
        "catalog_key": "{{ linux_upgrade_inhibitors_catalog_key }}",
        "inhibitors": {{ linux_upgrade_inhibitors_effective | default([]) | to_json }},
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
  when: linux_upgrade_inhibitors_catalog_enabled | bool
