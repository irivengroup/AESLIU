- name: Check compatibility matrix file
  stat:
    path: "{{ linux_upgrade_compatibility_matrix_file }}"
  register: _compatibility_matrix_file
  when: linux_upgrade_compatibility_matrix_enabled | bool

- name: Load compatibility matrix
  include_vars:
    file: "{{ linux_upgrade_compatibility_matrix_file }}"
    name: linux_upgrade_compatibility_matrix_data
  when:
    - linux_upgrade_compatibility_matrix_enabled | bool
    - _compatibility_matrix_file.stat.exists | default(false)

- name: Resolve compatibility key
  set_fact:
    linux_upgrade_compatibility_key: "{{ (linux_upgrade_source_major_version | string) ~ '_to_' ~ (linux_upgrade_target_major_version | string) }}"
  when: linux_upgrade_compatibility_matrix_enabled | bool

- name: Resolve compatibility rule
  set_fact:
    linux_upgrade_compatibility_rule: "{{ (linux_upgrade_compatibility_matrix_data.compatibility_matrix.get(linux_upgrade_distribution_key, {}).get(linux_upgrade_compatibility_key, {})) if (linux_upgrade_compatibility_matrix_data is defined and linux_upgrade_compatibility_matrix_data.compatibility_matrix is defined) else {} }}"
  when: linux_upgrade_compatibility_matrix_enabled | bool
