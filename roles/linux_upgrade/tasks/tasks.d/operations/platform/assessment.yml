- name: Build assessment JSON
  copy:
    dest: "{{ linux_upgrade_assessment_report_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "distribution": "{{ ansible_distribution }}",
        "distribution_version": "{{ ansible_distribution_version }}",
        "target_major_version": "{{ linux_upgrade_target_major_version }}",
        "compatibility_key": "{{ linux_upgrade_compatibility_key | default('') }}",
        "plan_verdict": "{{ linux_upgrade_plan_verdict | default('unknown') }}",
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
  when: linux_upgrade_assessment_enabled | bool

- name: Build assessment markdown
  copy:
    dest: "{{ linux_upgrade_assessment_markdown_file }}"
    mode: "0640"
    content: |
      # Assessment
      - Host: {{ inventory_hostname }}
      - Distribution: {{ ansible_distribution }} {{ ansible_distribution_version }}
      - Target major: {{ linux_upgrade_target_major_version }}
      - Compatibility key: {{ linux_upgrade_compatibility_key | default('n/a') }}
      - Plan verdict: {{ linux_upgrade_plan_verdict | default('unknown') }}
  when: linux_upgrade_assessment_enabled | bool

- name: Build assessment HTML
  copy:
    dest: "{{ linux_upgrade_assessment_html_file }}"
    mode: "0640"
    content: |
      <html><body><h1>Assessment</h1><p>{{ inventory_hostname }}</p><p>{{ ansible_distribution }} {{ ansible_distribution_version }}</p><p>Verdict: {{ linux_upgrade_plan_verdict | default('unknown') }}</p></body></html>
  when:
    - linux_upgrade_assessment_enabled | bool
    - linux_upgrade_report_html_enabled | bool
