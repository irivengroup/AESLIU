- name: Drain cluster node
  shell: "{{ linux_upgrade_cluster_drain_command }}"
  changed_when: true
  when:
    - linux_upgrade_cluster_orchestration_enabled | bool
    - linux_upgrade_cluster_drain_command | length > 0
    - linux_upgrade_cluster_orchestration_phase == 'pre'

- name: Run cluster healthcheck
  shell: "{{ linux_upgrade_cluster_healthcheck_command }}"
  register: _cluster_healthcheck
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_cluster_orchestration_enabled | bool
    - linux_upgrade_cluster_healthcheck_command | length > 0

- name: Assert cluster health gate
  assert:
    that:
      - (_cluster_healthcheck.rc | default(0)) == 0
    fail_msg: "Cluster health gate failed."
  when:
    - linux_upgrade_cluster_orchestration_enabled | bool
    - linux_upgrade_cluster_healthcheck_command | length > 0
    - linux_upgrade_cluster_batch_abort_on_failure | bool

- name: Pause after cluster batch
  pause:
    seconds: "{{ linux_upgrade_cluster_batch_pause_seconds | int }}"
  when:
    - linux_upgrade_cluster_orchestration_enabled | bool
    - (linux_upgrade_cluster_batch_pause_seconds | int) > 0
    - linux_upgrade_cluster_orchestration_phase == 'post'

- name: Undrain cluster node
  shell: "{{ linux_upgrade_cluster_undrain_command }}"
  changed_when: true
  when:
    - linux_upgrade_cluster_orchestration_enabled | bool
    - linux_upgrade_cluster_undrain_command | length > 0
    - linux_upgrade_cluster_orchestration_phase == 'post'
