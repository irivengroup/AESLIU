- name: Check middleware catalog file
  stat:
    path: "{{ linux_upgrade_middleware_profiles_file }}"
  register: _middleware_profiles_file
  when: linux_upgrade_middleware_catalog_enabled | bool

- name: Load middleware catalog
  include_vars:
    file: "{{ linux_upgrade_middleware_profiles_file }}"
    name: linux_upgrade_middleware_catalog
  when:
    - linux_upgrade_middleware_catalog_enabled | bool
    - _middleware_profiles_file.stat.exists | default(false)

- name: Write middleware catalog example
  copy:
    dest: "{{ linux_upgrade_state_dir }}/middleware_profiles.example.yml"
    mode: "0640"
    content: |
      middleware_profiles:
        nginx:
          pre_stop:
            - "systemctl stop nginx"
          post_start:
            - "systemctl start nginx"
          healthcheck:
            - "nginx -t"
        tomcat:
          pre_stop:
            - "systemctl stop tomcat"
          post_start:
            - "systemctl start tomcat"
          healthcheck:
            - "systemctl is-active tomcat"
  when: linux_upgrade_middleware_catalog_enabled | bool
