- name: Auto-detect cluster stack
  shell: |
    if command -v pcs >/dev/null 2>&1; then
      echo pacemaker
    elif command -v crm_mon >/dev/null 2>&1 || systemctl list-unit-files | grep -q corosync; then
      echo corosync
    elif command -v kubectl >/dev/null 2>&1; then
      echo kubernetes
    elif [ -n "{{ linux_upgrade_cluster_dbha_role_query_command | default('') }}" ]; then
      echo dbha
    else
      echo generic
    fi
  register: _cluster_stack_detect
  changed_when: false
  when:
    - linux_upgrade_cluster_native_enabled | bool
    - linux_upgrade_cluster_stack == 'auto'

- name: Resolve effective cluster stack
  set_fact:
    linux_upgrade_cluster_stack_effective: "{{ (_cluster_stack_detect.stdout | trim) if (linux_upgrade_cluster_stack == 'auto') else linux_upgrade_cluster_stack }}"
  when: linux_upgrade_cluster_native_enabled | bool

- name: Resolve effective batch size
  set_fact:
    linux_upgrade_cluster_batch_size_effective: >-
      {{
        1 if (linux_upgrade_cluster_canary_enabled | bool)
        else (linux_upgrade_cluster_batch_size | int if not linux_upgrade_cluster_batch_dynamic_enabled else ([groups.get(group_names[0], [inventory_hostname]) | length, 2] | min))
      }}
  when: linux_upgrade_cluster_native_enabled | bool

- name: Enforce canary host first
  assert:
    that:
      - not linux_upgrade_cluster_canary_enabled | bool or inventory_hostname == linux_upgrade_cluster_canary_host or linux_upgrade_wave_enabled | bool
    fail_msg: "Canary mode enabled: current host is not the canary host."
  when: linux_upgrade_cluster_native_enabled | bool

- name: Determine DB HA current role
  shell: "{{ linux_upgrade_cluster_dbha_role_query_command }}"
  register: _dbha_role
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_cluster_native_enabled | bool
    - linux_upgrade_cluster_stack_effective == 'dbha'
    - linux_upgrade_cluster_dbha_role_query_command | length > 0

- name: Assert primary/secondary strategy
  assert:
    that:
      - linux_upgrade_cluster_primary_node | length > 0
      - linux_upgrade_cluster_secondary_nodes | length > 0
    fail_msg: "Primary/secondary strategy requires primary and secondary nodes."
  when:
    - linux_upgrade_cluster_native_enabled | bool
    - linux_upgrade_cluster_strategy == 'primary_secondary'

- name: Pacemaker quorum check
  shell: "pcs status quorum || pcs status"
  register: _pcs_quorum
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_cluster_native_enabled | bool
    - linux_upgrade_cluster_stack_effective == 'pacemaker'
    - linux_upgrade_cluster_quorum_aware_enabled | bool

- name: Corosync quorum check
  shell: "corosync-quorumtool -s || corosync-cmapctl runtime.totem.pg.mrp.srp.members || true"
  register: _corosync_quorum
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_cluster_native_enabled | bool
    - linux_upgrade_cluster_stack_effective == 'corosync'
    - linux_upgrade_cluster_quorum_aware_enabled | bool

- name: Kubernetes node readiness check
  shell: "kubectl get node {{ inventory_hostname }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'"
  register: _k8s_ready
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_cluster_native_enabled | bool
    - linux_upgrade_cluster_stack_effective == 'kubernetes'
    - linux_upgrade_cluster_quorum_aware_enabled | bool

- name: Drain Pacemaker node
  shell: "pcs node standby {{ inventory_hostname }}"
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_cluster_native_enabled | bool
    - linux_upgrade_cluster_native_phase == 'pre'
    - linux_upgrade_cluster_stack_effective == 'pacemaker'

- name: Cleanup Pacemaker resources on node
  shell: "pcs resource cleanup"
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_cluster_native_enabled | bool
    - linux_upgrade_cluster_native_phase == 'post'
    - linux_upgrade_cluster_stack_effective == 'pacemaker'
    - linux_upgrade_cluster_pacemaker_resource_cleanup | bool

- name: Unstandby Pacemaker node
  shell: "pcs node unstandby {{ inventory_hostname }}"
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_cluster_native_enabled | bool
    - linux_upgrade_cluster_native_phase == 'post'
    - linux_upgrade_cluster_stack_effective == 'pacemaker'

- name: Corosync pre-check status
  shell: "crm_mon -1 || true"
  changed_when: false
  register: _crm_mon
  failed_when: false
  when:
    - linux_upgrade_cluster_native_enabled | bool
    - linux_upgrade_cluster_stack_effective == 'corosync'

- name: Kubernetes cordon node
  shell: "kubectl cordon {{ inventory_hostname }}"
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_cluster_native_enabled | bool
    - linux_upgrade_cluster_native_phase == 'pre'
    - linux_upgrade_cluster_stack_effective == 'kubernetes'

- name: Kubernetes drain node
  shell: "kubectl drain {{ inventory_hostname }} --ignore-daemonsets --delete-emptydir-data {{ linux_upgrade_cluster_k8s_drain_extra_args }}"
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_cluster_native_enabled | bool
    - linux_upgrade_cluster_native_phase == 'pre'
    - linux_upgrade_cluster_stack_effective == 'kubernetes'

- name: Kubernetes uncordon node
  shell: "kubectl uncordon {{ inventory_hostname }}"
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_cluster_native_enabled | bool
    - linux_upgrade_cluster_native_phase == 'post'
    - linux_upgrade_cluster_stack_effective == 'kubernetes'

- name: DB HA demote secondary pre-upgrade
  shell: "{{ linux_upgrade_cluster_dbha_secondary_demote_command }}"
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_cluster_native_enabled | bool
    - linux_upgrade_cluster_native_phase == 'pre'
    - linux_upgrade_cluster_stack_effective == 'dbha'
    - linux_upgrade_cluster_dbha_secondary_demote_command | length > 0
    - (_dbha_role.stdout | default('secondary') | trim) != 'primary'

- name: DB HA promote primary post-upgrade
  shell: "{{ linux_upgrade_cluster_dbha_primary_promote_command }}"
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_cluster_native_enabled | bool
    - linux_upgrade_cluster_native_phase == 'post'
    - linux_upgrade_cluster_stack_effective == 'dbha'
    - linux_upgrade_cluster_dbha_primary_promote_command | length > 0

- name: Generic cluster healthcheck command
  shell: "{{ linux_upgrade_cluster_healthcheck_command }}"
  register: _cluster_generic_health
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_cluster_native_enabled | bool
    - linux_upgrade_cluster_healthcheck_command | length > 0

- name: Assert cluster health
  assert:
    that:
      - (_cluster_generic_health.rc | default(0)) == 0
    fail_msg: "Cluster native healthcheck failed."
  when:
    - linux_upgrade_cluster_native_enabled | bool
    - linux_upgrade_cluster_healthcheck_command | length > 0
    - linux_upgrade_cluster_native_healthcheck_fail_fast | bool

- name: Persist last healthy node state
  copy:
    dest: "{{ linux_upgrade_cluster_last_healthy_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "stack": "{{ linux_upgrade_cluster_stack_effective | default('generic') }}",
        "phase": "{{ linux_upgrade_cluster_native_phase }}",
        "timestamp": "{{ ansible_date_time.iso8601 }}"
      }
  when:
    - linux_upgrade_cluster_native_enabled | bool
    - linux_upgrade_cluster_resume_last_healthy_enabled | bool
    - linux_upgrade_cluster_native_phase == 'post'

- name: Write cluster native report
  copy:
    dest: "{{ linux_upgrade_cluster_native_report_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "stack": "{{ linux_upgrade_cluster_stack_effective | default('generic') }}",
        "batch_size": {{ linux_upgrade_cluster_batch_size_effective | default(1) }},
        "canary_enabled": {{ 'true' if linux_upgrade_cluster_canary_enabled else 'false' }},
        "primary_node": "{{ linux_upgrade_cluster_primary_node }}",
        "secondary_nodes": {{ linux_upgrade_cluster_secondary_nodes | to_json }},
        "dbha_role": "{{ _dbha_role.stdout | default('') | trim }}",
        "pcs_quorum": {{ (_pcs_quorum.stdout | default('')) | to_json }},
        "corosync_quorum": {{ (_corosync_quorum.stdout | default('')) | to_json }},
        "k8s_ready": {{ (_k8s_ready.stdout | default('')) | to_json }},
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
  when: linux_upgrade_cluster_native_enabled | bool
