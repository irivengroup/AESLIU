- name: Record package inventory after upgrade on RPM systems
  shell: "rpm -qa | sort"
  register: _packages_after_rpm
  changed_when: false
  when:
    - linux_upgrade_before_after_diff_enabled | bool
    - ansible_os_family in ['RedHat', 'Suse']

- name: Record package inventory after upgrade on DEB systems
  shell: "dpkg-query -W -f='${Package} ${Version}\n' | sort"
  register: _packages_after_deb
  changed_when: false
  when:
    - linux_upgrade_before_after_diff_enabled | bool
    - ansible_os_family == 'Debian'

- name: Save package inventory after upgrade
  copy:
    dest: "{{ linux_upgrade_after_packages_inventory_file }}"
    mode: "0640"
    content: "{{ (_packages_after_rpm.stdout if (_packages_after_rpm is defined and _packages_after_rpm.stdout is defined) else (_packages_after_deb.stdout | default(''))) }}"
  when: linux_upgrade_before_after_diff_enabled | bool

- name: Save services inventory after upgrade
  copy:
    dest: "{{ linux_upgrade_after_services_inventory_file }}"
    mode: "0640"
    content: "{{ ansible_facts.services | default({}) | to_nice_json }}"
  when: linux_upgrade_before_after_diff_enabled | bool

- name: Build before/after diff report
  shell: |
    python3 - <<'PY'
    import json, pathlib
    before_pkg = pathlib.Path("{{ linux_upgrade_before_packages_inventory_file }}").read_text() if pathlib.Path("{{ linux_upgrade_before_packages_inventory_file }}").exists() else ""
    after_pkg = pathlib.Path("{{ linux_upgrade_after_packages_inventory_file }}").read_text() if pathlib.Path("{{ linux_upgrade_after_packages_inventory_file }}").exists() else ""
    report = {
      "before_packages_lines": len([x for x in before_pkg.splitlines() if x.strip()]),
      "after_packages_lines": len([x for x in after_pkg.splitlines() if x.strip()]),
      "kernel": "{{ ansible_kernel }}",
      "distribution_version": "{{ ansible_distribution_version }}"
    }
    pathlib.Path("{{ linux_upgrade_before_after_diff_report_file }}").write_text(json.dumps(report, indent=2))
    PY
  changed_when: true
  when: linux_upgrade_before_after_diff_enabled | bool
