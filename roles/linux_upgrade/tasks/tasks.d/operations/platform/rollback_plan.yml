- name: Build rollback plan
  copy:
    dest: "{{ linux_upgrade_rollback_plan_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "distribution": "{{ ansible_distribution }}",
        "source_version": "{{ ansible_distribution_version }}",
        "target_major_version": "{{ linux_upgrade_target_major_version }}",
        "snapshot_provider": "{{ linux_upgrade_snapshot_provider_effective | default(linux_upgrade_snapshot_provider | default('none')) }}",
        "snapshot_id": "{{ linux_upgrade_snapshot_id_effective | default(linux_upgrade_snapshot_id | default('')) }}",
        "network_recovery_enabled": {{ 'true' if linux_upgrade_network_recovery_enabled else 'false' }},
        "boot_mode": "{{ linux_upgrade_boot_mode | default('unknown') }}",
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }

- name: Validate rollback plan inputs
  assert:
    that:
      - (linux_upgrade_snapshot_id_effective | default(linux_upgrade_snapshot_id | default('')) | length > 0) or (linux_upgrade_network_recovery_enabled | bool)
    fail_msg: "No rollback path detected: neither snapshot nor network recovery is available."
  when: linux_upgrade_rollback_validation_enabled | bool
