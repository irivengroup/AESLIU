- name: Resolve expected TLS repo hosts map
  set_fact:
    linux_upgrade_repo_expected_tls_hosts_effective: "{{ linux_upgrade_repo_expected_tls_hosts if (linux_upgrade_repo_expected_tls_hosts | length > 0) else (linux_upgrade_repo_expected_tls_hosts_map.get(linux_upgrade_distribution_key, linux_upgrade_repo_expected_tls_hosts_map.get('default', []))) }}"
    linux_upgrade_repo_expected_tls_fingerprints_effective: "{{ linux_upgrade_repo_expected_tls_fingerprints_map.get(linux_upgrade_distribution_key, linux_upgrade_repo_expected_tls_fingerprints_map.get('default', {})) }}"

- name: Validate expected TLS repo hosts DNS
  shell: "getent hosts {{ item }}"
  loop: "{{ linux_upgrade_repo_expected_tls_hosts_effective }}"
  changed_when: false
  when:
    - linux_upgrade_repo_tls_validation_enabled | bool
    - linux_upgrade_repo_expected_tls_hosts_effective | length > 0

- name: Validate expected TLS fingerprints when provided
  shell: |
    host="{{ item.key }}"
    expected="{{ item.value }}"
    actual=$(echo | openssl s_client -connect ${host}:443 -servername ${host} 2>/dev/null | openssl x509 -noout -fingerprint -sha256 | cut -d= -f2)
    test "$actual" = "$expected"
  loop: "{{ linux_upgrade_repo_expected_tls_fingerprints_effective | dict2items }}"
  changed_when: false
  when:
    - linux_upgrade_repo_tls_validation_enabled | bool
    - linux_upgrade_repo_expected_tls_fingerprints_effective | length > 0
