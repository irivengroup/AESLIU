- name: Collect structural assertions
  set_fact:
    linux_upgrade_test_results: []
  when: linux_upgrade_tests_enabled | bool

- name: Assert required core files exist
  stat:
    path: "{{ item }}"
  loop:
    - "{{ role_path }}/tasks/main.yml"
    - "{{ role_path }}/defaults/main.yml"
    - "{{ role_path }}/tasks/tasks.d/operations/pre_upgrade.yml"
    - "{{ role_path }}/tasks/tasks.d/operations/post_upgrade.yml"
  register: _test_required_files
  when: linux_upgrade_tests_enabled | bool

- name: Record required file tests
  set_fact:
    linux_upgrade_test_results: "{{ linux_upgrade_test_results + [ {'name':'required_files','passed': ((_test_required_files.results | rejectattr('stat.exists') | list | length) == 0)} ] }}"
  when: linux_upgrade_tests_enabled | bool

- name: Run simple idempotence probe commands
  shell: "true"
  changed_when: false
  register: _idempotence_probe
  when:
    - linux_upgrade_tests_enabled | bool
    - linux_upgrade_tests_idempotence_enabled | bool

- name: Record idempotence probe
  set_fact:
    linux_upgrade_test_results: "{{ linux_upgrade_test_results + [ {'name':'idempotence_probe','passed': ((_idempotence_probe.rc | default(1)) == 0)} ] }}"
  when:
    - linux_upgrade_tests_enabled | bool
    - linux_upgrade_tests_idempotence_enabled | bool

- name: Write tests report
  copy:
    dest: "{{ linux_upgrade_tests_report_file }}"
    mode: "0640"
    content: "{{ {'host': inventory_hostname, 'results': linux_upgrade_test_results | default([]), 'generated_at': ansible_date_time.iso8601} | to_nice_json }}"
  when: linux_upgrade_tests_enabled | bool
