- name: Append execution timeline event
  lineinfile:
    path: "{{ linux_upgrade_observability_phase_timeline_file }}"
    create: true
    mode: "0640"
    line: "{{ {'timestamp': ansible_date_time.iso8601, 'phase': linux_upgrade_timeline_phase, 'host': inventory_hostname, 'correlation_id': linux_upgrade_correlation_id} | to_json }}"
  when: linux_upgrade_observability_enabled | bool

- name: Export Prometheus textfile
  copy:
    dest: "{{ linux_upgrade_prometheus_textfile }}"
    mode: "0644"
    content: |
      linux_upgrade_last_run{host="{{ inventory_hostname }}"} 1
  when:
    - linux_upgrade_export_prometheus_textfile_enabled | bool
    - linux_upgrade_observability_enabled | bool
