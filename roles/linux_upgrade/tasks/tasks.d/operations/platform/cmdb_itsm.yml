- name: Build CMDB payload
  copy:
    dest: "{{ linux_upgrade_cmdb_payload_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "distribution": "{{ ansible_distribution }}",
        "distribution_version": "{{ ansible_distribution_version }}",
        "kernel": "{{ ansible_kernel }}",
        "change_ticket": "{{ linux_upgrade_change_ticket | default('') }}",
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
  when: linux_upgrade_cmdb_enabled | bool

- name: Append ITSM result comment locally
  lineinfile:
    path: "{{ linux_upgrade_state_dir }}/itsm_result_comment.txt"
    create: true
    mode: "0640"
    line: "{{ linux_upgrade_itsm_result_comment if (linux_upgrade_itsm_result_comment | length > 0) else ('Upgrade result for ' ~ inventory_hostname ~ ' at ' ~ ansible_date_time.iso8601) }}"
  when: linux_upgrade_itsm_update_ticket_enabled | bool

# Merged from cmdb_itsm_real.yml
- name: Push CMDB payload
  uri:
    url: "{{ linux_upgrade_cmdb_api_url }}"
    method: "{{ linux_upgrade_cmdb_api_method }}"
    headers: "{{ linux_upgrade_cmdb_api_headers }}"
    body_format: json
    body: "{{ lookup('file', linux_upgrade_cmdb_payload_file) | from_json }}"
    status_code: [200,201,202,204]
  when:
    - linux_upgrade_cmdb_enabled | bool
    - linux_upgrade_cmdb_api_url | length > 0

- name: Push ITSM result update
  uri:
    url: "{{ linux_upgrade_itsm_api_url }}"
    method: "{{ linux_upgrade_itsm_api_method }}"
    headers: "{{ linux_upgrade_itsm_api_headers }}"
    body_format: json
    body:
      host: "{{ inventory_hostname }}"
      change_ticket: "{{ linux_upgrade_change_ticket | default('') }}"
      comment: "{{ linux_upgrade_itsm_result_comment if (linux_upgrade_itsm_result_comment | length > 0) else ('Upgrade completed for ' ~ inventory_hostname) }}"
    status_code: [200,201,202,204]
  when:
    - linux_upgrade_itsm_update_ticket_enabled | bool
    - linux_upgrade_itsm_api_url | length > 0
