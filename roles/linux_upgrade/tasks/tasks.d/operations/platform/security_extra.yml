- name: Compute checksums for generated reports
  shell: |
    find {{ linux_upgrade_state_dir }} -maxdepth 1 -type f \( -name '*.json' -o -name '*.jsonl' -o -name '*.lock' \) -print0 | xargs -0 -r sha256sum > {{ linux_upgrade_security_artifacts_checksum_file }}
  changed_when: true
  when: linux_upgrade_security_hardening_extra_enabled | bool

- name: Tighten permissions on state files
  shell: "find {{ linux_upgrade_state_dir }} -type f -exec chmod 0640 {} \;"
  changed_when: true
  when: linux_upgrade_security_hardening_extra_enabled | bool

# Merged from security_encryption.yml
- name: Archive state directory for encryption
  archive:
    path: "{{ linux_upgrade_state_dir }}"
    dest: "{{ linux_upgrade_artifacts_archive_dir }}/{{ linux_upgrade_artifacts_archive_name }}"
    format: gz
  when:
    - linux_upgrade_security_encrypt_backups | bool
    - linux_upgrade_artifacts_archive_enabled | bool

- name: Encrypt archived artifacts
  shell: "{{ linux_upgrade_security_encrypt_command }} -in {{ linux_upgrade_artifacts_archive_dir }}/{{ linux_upgrade_artifacts_archive_name }} -out {{ linux_upgrade_artifacts_archive_dir }}/{{ linux_upgrade_artifacts_archive_name }}.enc"
  changed_when: true
  when:
    - linux_upgrade_security_encrypt_backups | bool
    - linux_upgrade_artifacts_archive_enabled | bool

- name: Sign reports checksum
  shell: "sha256sum {{ linux_upgrade_state_dir }}/*.json {{ linux_upgrade_state_dir }}/*.jsonl 2>/dev/null > {{ linux_upgrade_security_signature_file }}"
  changed_when: true
  when: linux_upgrade_security_sign_reports_enabled | bool
