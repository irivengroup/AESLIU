- name: Resolve middleware catalog entries
  set_fact:
    linux_upgrade_middleware_profiles_effective: "{{ (linux_upgrade_middleware_catalog.middleware_profiles | default({})) if (linux_upgrade_middleware_catalog is defined) else {} }}"
  when: linux_upgrade_middleware_execution_enabled | bool

- name: Build middleware pre-stop command list
  set_fact:
    linux_upgrade_middleware_pre_stop_cmds: "{{ (linux_upgrade_middleware_pre_stop_cmds | default([])) + (linux_upgrade_middleware_profiles_effective[item].pre_stop | default([])) }}"
  loop: "{{ linux_upgrade_middleware_selected_profiles | default([]) }}"
  when: linux_upgrade_middleware_execution_enabled | bool

- name: Build middleware post-start command list
  set_fact:
    linux_upgrade_middleware_post_start_cmds: "{{ (linux_upgrade_middleware_post_start_cmds | default([])) + (linux_upgrade_middleware_profiles_effective[item].post_start | default([])) }}"
  loop: "{{ linux_upgrade_middleware_selected_profiles | default([]) }}"
  when: linux_upgrade_middleware_execution_enabled | bool

- name: Execute middleware pre-stop hooks
  shell: "{{ item }}"
  loop: "{{ linux_upgrade_middleware_pre_stop_cmds | default([]) }}"
  changed_when: true
  when:
    - linux_upgrade_middleware_execution_enabled | bool
    - linux_upgrade_middleware_execution_phase == 'pre'

- name: Execute middleware post-start hooks
  shell: "{{ item }}"
  loop: "{{ linux_upgrade_middleware_post_start_cmds | default([]) }}"
  changed_when: true
  when:
    - linux_upgrade_middleware_execution_enabled | bool
    - linux_upgrade_middleware_execution_phase == 'post'
