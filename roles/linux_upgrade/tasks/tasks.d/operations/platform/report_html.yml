- name: Build consolidated HTML summary
  copy:
    dest: "{{ linux_upgrade_state_dir }}/summary.html"
    mode: "0640"
    content: |
      <html><body>
      <h1>Linux Upgrade Summary</h1>
      <p>Host: {{ inventory_hostname }}</p>
      <p>Distribution: {{ ansible_distribution }} {{ ansible_distribution_version }}</p>
      <p>Target major: {{ linux_upgrade_target_major_version }}</p>
      <p>Plan verdict: {{ linux_upgrade_plan_verdict | default('unknown') }}</p>
      </body></html>
  when:
    - linux_upgrade_report_html_enabled | bool
