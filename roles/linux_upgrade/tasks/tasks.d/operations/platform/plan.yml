- name: Resolve rollback capability flag
  set_fact:
    linux_upgrade_plan_has_rollback: >-
      {{
        ((linux_upgrade_snapshot_id_effective | default(linux_upgrade_snapshot_id | default('')) | length) > 0)
        or (linux_upgrade_local_fs_rollback_enabled | bool)
      }}

- name: Resolve go/no-go verdict
  set_fact:
    linux_upgrade_plan_verdict: "{{ 'go' if ((not linux_upgrade_plan_require_snapshot_or_local_rollback | bool) or (linux_upgrade_plan_has_rollback | bool)) else 'no-go' }}"

- name: Write rich plan report
  copy:
    dest: "{{ linux_upgrade_plan_report_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "distribution": "{{ ansible_distribution }}",
        "source_major_version": "{{ linux_upgrade_source_major_version }}",
        "target_major_version": "{{ linux_upgrade_target_major_version }}",
        "selected_app_profiles": {{ linux_upgrade_application_profiles_selected_effective | default([]) | to_json }},
        "rollback_available": {{ 'true' if linux_upgrade_plan_has_rollback else 'false' }},
        "cluster_enabled": {{ 'true' if linux_upgrade_cluster_orchestration_enabled else 'false' }},
        "verdict": "{{ linux_upgrade_plan_verdict }}",
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
  when: linux_upgrade_plan_enabled | bool

- name: Write go/no-go report
  copy:
    dest: "{{ linux_upgrade_plan_go_nogo_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "verdict": "{{ linux_upgrade_plan_verdict }}",
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
  when: linux_upgrade_plan_enabled | bool
