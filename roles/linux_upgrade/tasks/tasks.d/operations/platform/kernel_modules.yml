- name: Collect loaded kernel modules
  command: lsmod
  register: _lsmod
  changed_when: false
  when: linux_upgrade_detect_kernel_modules_enabled | bool

- name: Save kernel modules report
  copy:
    dest: "{{ linux_upgrade_state_dir }}/kernel_modules.txt"
    mode: "0640"
    content: "{{ _lsmod.stdout | default('') }}"
  when: linux_upgrade_detect_kernel_modules_enabled | bool
