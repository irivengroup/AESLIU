- name: Auto-detect DB HA stack
  shell: |
    if command -v patronictl >/dev/null 2>&1; then
      echo patroni
    elif command -v psql >/dev/null 2>&1; then
      echo postgresql_replication
    elif command -v mysql >/dev/null 2>&1; then
      echo galera
    else
      echo generic
    fi
  register: _dbha_detect
  changed_when: false
  when:
    - linux_upgrade_dbha_native_enabled | bool
    - linux_upgrade_dbha_stack == 'auto'

- name: Resolve effective DB HA stack
  set_fact:
    linux_upgrade_dbha_stack_effective: "{{ (_dbha_detect.stdout | trim) if (linux_upgrade_dbha_stack == 'auto') else linux_upgrade_dbha_stack }}"
  when: linux_upgrade_dbha_native_enabled | bool

- name: Check Patroni health
  uri:
    url: "{{ linux_upgrade_dbha_patroni_api_url }}/health"
    method: GET
    status_code: [200]
  register: _patroni_health
  failed_when: false
  when:
    - linux_upgrade_dbha_native_enabled | bool
    - linux_upgrade_dbha_stack_effective == 'patroni'

- name: Check PostgreSQL replication state
  shell: "{{ linux_upgrade_dbha_postgres_psql_command }} "select pg_is_in_recovery();""
  register: _pg_recovery_state
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_dbha_native_enabled | bool
    - linux_upgrade_dbha_stack_effective == 'postgresql_replication'

- name: Check PostgreSQL replication lag
  shell: "{{ linux_upgrade_dbha_postgres_psql_command }} "select coalesce(extract(epoch from now()-pg_last_xact_replay_timestamp())::int,0);""
  register: _pg_lag
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_dbha_native_enabled | bool
    - linux_upgrade_dbha_stack_effective == 'postgresql_replication'

- name: Check Galera wsrep state
  shell: "{{ linux_upgrade_dbha_galera_wsrep_status_command }}"
  register: _galera_wsrep
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_dbha_native_enabled | bool
    - linux_upgrade_dbha_stack_effective == 'galera'

- name: Write DB HA report
  copy:
    dest: "{{ linux_upgrade_dbha_report_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "stack": "{{ linux_upgrade_dbha_stack_effective | default('generic') }}",
        "patroni_health": {{ (_patroni_health.json | default({})) | to_json }},
        "pg_recovery_state": {{ (_pg_recovery_state.stdout | default('')) | to_json }},
        "pg_lag": {{ (_pg_lag.stdout | default('')) | to_json }},
        "galera_wsrep": {{ (_galera_wsrep.stdout | default('')) | to_json }},
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
  when: linux_upgrade_dbha_native_enabled | bool
