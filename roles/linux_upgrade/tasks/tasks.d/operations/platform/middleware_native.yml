- name: Gather service facts for native middleware
  service_facts:
  when: linux_upgrade_middleware_native_enabled | bool

- name: Gather package facts for native middleware
  package_facts:
    manager: auto
  when: linux_upgrade_middleware_native_enabled | bool

- name: Initialize native middleware results
  set_fact:
    linux_upgrade_middleware_native_results: []
  when: linux_upgrade_middleware_native_enabled | bool

- name: Check nginx
  shell: |
    set -o pipefail
    systemctl is-active nginx
    nginx -t
  args:
    executable: /bin/bash
  register: _mw_nginx
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'nginx' in linux_upgrade_middleware_native_selected"

- name: Record nginx result
  set_fact:
    linux_upgrade_middleware_native_results: "{{ linux_upgrade_middleware_native_results + [ {'name':'nginx','rc':(_mw_nginx.rc|default(999)),'stdout':(_mw_nginx.stdout|default('')),'stderr':(_mw_nginx.stderr|default(''))} ] }}"
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'nginx' in linux_upgrade_middleware_native_selected"

- name: Check apache
  shell: |
    set -o pipefail
    if systemctl list-unit-files | grep -qE 'httpd.service'; then
      systemctl is-active httpd
      apachectl -t
    else
      systemctl is-active apache2
      apache2ctl -t
    fi
  args:
    executable: /bin/bash
  register: _mw_apache
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'apache' in linux_upgrade_middleware_native_selected"

- name: Record apache result
  set_fact:
    linux_upgrade_middleware_native_results: "{{ linux_upgrade_middleware_native_results + [ {'name':'apache','rc':(_mw_apache.rc|default(999)),'stdout':(_mw_apache.stdout|default('')),'stderr':(_mw_apache.stderr|default(''))} ] }}"
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'apache' in linux_upgrade_middleware_native_selected"

- name: Check tomcat
  shell: |
    set -o pipefail
    systemctl is-active tomcat || systemctl is-active tomcat9 || systemctl is-active tomcat10
    test -d /etc/tomcat || test -d /etc/tomcat9 || test -d /etc/tomcat10 || test -d /opt/tomcat
  args:
    executable: /bin/bash
  register: _mw_tomcat
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'tomcat' in linux_upgrade_middleware_native_selected"

- name: Record tomcat result
  set_fact:
    linux_upgrade_middleware_native_results: "{{ linux_upgrade_middleware_native_results + [ {'name':'tomcat','rc':(_mw_tomcat.rc|default(999)),'stdout':(_mw_tomcat.stdout|default('')),'stderr':(_mw_tomcat.stderr|default(''))} ] }}"
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'tomcat' in linux_upgrade_middleware_native_selected"

- name: Check wildfly
  shell: |
    set -o pipefail
    systemctl is-active wildfly
    test -f /opt/wildfly/bin/standalone.sh || test -f /usr/share/wildfly/bin/standalone.sh
  args:
    executable: /bin/bash
  register: _mw_wildfly
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'wildfly' in linux_upgrade_middleware_native_selected"

- name: Record wildfly result
  set_fact:
    linux_upgrade_middleware_native_results: "{{ linux_upgrade_middleware_native_results + [ {'name':'wildfly','rc':(_mw_wildfly.rc|default(999)),'stdout':(_mw_wildfly.stdout|default('')),'stderr':(_mw_wildfly.stderr|default(''))} ] }}"
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'wildfly' in linux_upgrade_middleware_native_selected"

- name: Check jboss
  shell: |
    set -o pipefail
    systemctl is-active jboss || systemctl is-active eap7-standalone || systemctl is-active eap7-domain
    test -d /opt/jboss || test -d /opt/rh/eap7
  args:
    executable: /bin/bash
  register: _mw_jboss
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'jboss' in linux_upgrade_middleware_native_selected"

- name: Record jboss result
  set_fact:
    linux_upgrade_middleware_native_results: "{{ linux_upgrade_middleware_native_results + [ {'name':'jboss','rc':(_mw_jboss.rc|default(999)),'stdout':(_mw_jboss.stdout|default('')),'stderr':(_mw_jboss.stderr|default(''))} ] }}"
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'jboss' in linux_upgrade_middleware_native_selected"

- name: Check docker
  shell: |
    set -o pipefail
    systemctl is-active docker
    docker info >/dev/null
  args:
    executable: /bin/bash
  register: _mw_docker
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'docker' in linux_upgrade_middleware_native_selected"

- name: Record docker result
  set_fact:
    linux_upgrade_middleware_native_results: "{{ linux_upgrade_middleware_native_results + [ {'name':'docker','rc':(_mw_docker.rc|default(999)),'stdout':(_mw_docker.stdout|default('')),'stderr':(_mw_docker.stderr|default(''))} ] }}"
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'docker' in linux_upgrade_middleware_native_selected"

- name: Check podman
  shell: |
    set -o pipefail
    systemctl is-active podman || systemctl is-active podman.socket || true
    podman info >/dev/null
  args:
    executable: /bin/bash
  register: _mw_podman
  changed_when: false
