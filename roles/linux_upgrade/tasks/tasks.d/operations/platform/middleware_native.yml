    - "'kafka' in linux_upgrade_middleware_native_selected"

- name: Check redis
  shell: |
    set -o pipefail
    systemctl is-active redis || systemctl is-active redis-server
    redis-cli ping | grep -q PONG
  args:
    executable: /bin/bash
  register: _mw_redis
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'redis' in linux_upgrade_middleware_native_selected"

- name: Record redis result
  set_fact:
    linux_upgrade_middleware_native_results: "{{ linux_upgrade_middleware_native_results + [ {'name':'redis','rc':(_mw_redis.rc|default(999)),'stdout':(_mw_redis.stdout|default('')),'stderr':(_mw_redis.stderr|default(''))} ] }}"
  when:
