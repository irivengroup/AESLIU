    - "'mariadb' in linux_upgrade_middleware_native_selected"

- name: Check mysql
  shell: |
    set -o pipefail
    systemctl is-active mysqld || systemctl is-active mysql
    mysql --version
  args:
    executable: /bin/bash
  register: _mw_mysql
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'mysql' in linux_upgrade_middleware_native_selected"

- name: Record mysql result
  set_fact:
    linux_upgrade_middleware_native_results: "{{ linux_upgrade_middleware_native_results + [ {'name':'mysql','rc':(_mw_mysql.rc|default(999)),'stdout':(_mw_mysql.stdout|default('')),'stderr':(_mw_mysql.stderr|default(''))} ] }}"
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'mysql' in linux_upgrade_middleware_native_selected"

- name: Check rabbitmq
  shell: |
    set -o pipefail
    systemctl is-active rabbitmq-server
    rabbitmq-diagnostics ping
  args:
    executable: /bin/bash
  register: _mw_rabbitmq
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'rabbitmq' in linux_upgrade_middleware_native_selected"

- name: Record rabbitmq result
  set_fact:
    linux_upgrade_middleware_native_results: "{{ linux_upgrade_middleware_native_results + [ {'name':'rabbitmq','rc':(_mw_rabbitmq.rc|default(999)),'stdout':(_mw_rabbitmq.stdout|default('')),'stderr':(_mw_rabbitmq.stderr|default(''))} ] }}"
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'rabbitmq' in linux_upgrade_middleware_native_selected"

- name: Check kafka
  shell: |
    set -o pipefail
    systemctl is-active kafka
    test -d /opt/kafka || test -d /usr/local/kafka || test -f /etc/kafka/server.properties
  args:
    executable: /bin/bash
  register: _mw_kafka
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'kafka' in linux_upgrade_middleware_native_selected"

- name: Record kafka result
  set_fact:
    linux_upgrade_middleware_native_results: "{{ linux_upgrade_middleware_native_results + [ {'name':'kafka','rc':(_mw_kafka.rc|default(999)),'stdout':(_mw_kafka.stdout|default('')),'stderr':(_mw_kafka.stderr|default(''))} ] }}"
  when:
