    - "'redis' in linux_upgrade_middleware_native_selected"

- name: Check elasticsearch
  shell: |
    set -o pipefail
    systemctl is-active elasticsearch
    curl -fsS http://127.0.0.1:9200/_cluster/health >/dev/null
  args:
    executable: /bin/bash
  register: _mw_elasticsearch
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'elasticsearch' in linux_upgrade_middleware_native_selected"

- name: Record elasticsearch result
  set_fact:
    linux_upgrade_middleware_native_results: "{{ linux_upgrade_middleware_native_results + [ {'name':'elasticsearch','rc':(_mw_elasticsearch.rc|default(999)),'stdout':(_mw_elasticsearch.stdout|default('')),'stderr':(_mw_elasticsearch.stderr|default(''))} ] }}"
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'elasticsearch' in linux_upgrade_middleware_native_selected"

- name: Write native middleware report
  copy:
    dest: "{{ linux_upgrade_middleware_native_report_file }}"
    mode: "0640"
    content: "{{ {'host': inventory_hostname, 'results': linux_upgrade_middleware_native_results | default([]), 'generated_at': ansible_date_time.iso8601} | to_nice_json }}"
  when: linux_upgrade_middleware_native_enabled | bool

- name: Assert native middleware healthchecks
  assert:
    that:
      - item.rc | int == 0
    fail_msg: "Native middleware healthcheck failed: {{ item.name }}"
  loop: "{{ linux_upgrade_middleware_native_results | default([]) }}"
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - linux_upgrade_middleware_native_fail_on_healthcheck | bool
