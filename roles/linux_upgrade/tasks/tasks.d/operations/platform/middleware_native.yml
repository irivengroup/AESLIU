    - "'podman' in linux_upgrade_middleware_native_selected"

- name: Record podman result
  set_fact:
    linux_upgrade_middleware_native_results: "{{ linux_upgrade_middleware_native_results + [ {'name':'podman','rc':(_mw_podman.rc|default(999)),'stdout':(_mw_podman.stdout|default('')),'stderr':(_mw_podman.stderr|default(''))} ] }}"
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'podman' in linux_upgrade_middleware_native_selected"

- name: Check postgresql
  shell: |
    set -o pipefail
    systemctl is-active postgresql || systemctl is-active postgresql-14 || systemctl is-active postgresql-15 || systemctl is-active postgresql-16
    psql --version
  args:
    executable: /bin/bash
  register: _mw_postgresql
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'postgresql' in linux_upgrade_middleware_native_selected"

- name: Record postgresql result
  set_fact:
    linux_upgrade_middleware_native_results: "{{ linux_upgrade_middleware_native_results + [ {'name':'postgresql','rc':(_mw_postgresql.rc|default(999)),'stdout':(_mw_postgresql.stdout|default('')),'stderr':(_mw_postgresql.stderr|default(''))} ] }}"
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'postgresql' in linux_upgrade_middleware_native_selected"

- name: Check mariadb
  shell: |
    set -o pipefail
    systemctl is-active mariadb
    mariadb --version || mysql --version
  args:
    executable: /bin/bash
  register: _mw_mariadb
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_middleware_native_enabled | bool
    - "'mariadb' in linux_upgrade_middleware_native_selected"

- name: Record mariadb result
  set_fact:
    linux_upgrade_middleware_native_results: "{{ linux_upgrade_middleware_native_results + [ {'name':'mariadb','rc':(_mw_mariadb.rc|default(999)),'stdout':(_mw_mariadb.stdout|default('')),'stderr':(_mw_mariadb.stderr|default(''))} ] }}"
