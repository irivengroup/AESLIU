- name: Run custom quorum guard commands
  shell: "{{ item }}"
  loop: "{{ linux_upgrade_cluster_guard_commands_pre if linux_upgrade_guard_phase == 'pre' else linux_upgrade_cluster_guard_commands_post }}"
  changed_when: false
  when:
    - linux_upgrade_cluster_guard_type == 'custom'

- name: Check Pacemaker quorum
  shell: "pcs status xml | grep -qi '<quorate>true</quorate>'"
  changed_when: false
  when:
    - linux_upgrade_cluster_guard_type == 'pacemaker'

- name: Check Kubernetes ready nodes threshold
  shell: "kubectl get nodes --no-headers | awk '$2 ~ /Ready/ {c++} END {exit !(c >= {{ linux_upgrade_cluster_guard_min_healthy_nodes | int }})}'"
  changed_when: false
  when:
    - linux_upgrade_cluster_guard_type == 'kubernetes'

- name: Check OpenStack control plane health
  shell: "openstack compute service list -f value -c State -c Status | awk '$1=="up" && $2=="enabled" {c++} END {exit !(c >= {{ linux_upgrade_cluster_guard_min_healthy_nodes | int }})}'"
  changed_when: false
  when:
    - linux_upgrade_cluster_guard_type == 'openstack_control_plane'
