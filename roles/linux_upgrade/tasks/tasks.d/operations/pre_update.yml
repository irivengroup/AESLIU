- name: Mark pre-update checkpoint start
  copy:
    dest: "{{ linux_upgrade_pre_update_checkpoint_file }}"
    mode: "0640"
    content: |
      phase: pre_update
      distribution: {{ ansible_distribution }}
      source_version: {{ linux_upgrade_source_version }}
      source_major_version: {{ linux_upgrade_source_major_version }}
      target_major_version: {{ linux_upgrade_target_major_version }}
      change_ticket: {{ linux_upgrade_change_ticket | default('N/A') }}
      started_at: {{ ansible_date_time.iso8601 }}
  when: linux_upgrade_pre_update_enabled | bool

- name: Update system before upgrade on Debian/Ubuntu
  apt:
    update_cache: true
    upgrade: dist
    autoremove: "{{ linux_upgrade_pre_update_autoremove | bool }}"
    cache_valid_time: "{{ linux_upgrade_pre_update_cache_valid_time | int }}"
  environment:
    DEBIAN_FRONTEND: noninteractive
  when:
    - linux_upgrade_pre_update_enabled | bool
    - ansible_os_family == 'Debian'

- name: Update system before upgrade on RHEL-like with dnf
  dnf:
    name: "*"
    state: latest
    update_only: true
  when:
    - linux_upgrade_pre_update_enabled | bool
    - ansible_os_family == 'RedHat'
    - ansible_pkg_mgr == 'dnf'

- name: Update system before upgrade on RHEL-like with yum
  yum:
    name: "*"
    state: latest
    update_only: true
  when:
    - linux_upgrade_pre_update_enabled | bool
    - ansible_os_family == 'RedHat'
    - ansible_pkg_mgr == 'yum'

- name: Update system before upgrade on SLES
  zypper:
    name: "*"
    state: latest
    update_cache: true
  when:
    - linux_upgrade_pre_update_enabled | bool
    - ansible_os_family == 'Suse'

- name: Handle reboot if required after pre-update
  include_tasks: reboot.yml
  vars:
    linux_upgrade_reboot_phase: pre_update
  when:
    - linux_upgrade_pre_update_enabled | bool
    - linux_upgrade_pre_update_reboot_if_required | bool

- name: Mark pre-update checkpoint completed
  copy:
    dest: "{{ linux_upgrade_pre_update_checkpoint_file }}"
    mode: "0640"
    content: |
      phase: pre_update
      status: completed
      distribution: {{ ansible_distribution }}
      version_after_pre_update: {{ ansible_distribution_version }}
      target_major_version: {{ linux_upgrade_target_major_version }}
      change_ticket: {{ linux_upgrade_change_ticket | default('N/A') }}
      completed_at: {{ ansible_date_time.iso8601 }}
  when: linux_upgrade_pre_update_enabled | bool
