- name: Auto-detect network backend - netplan
  stat:
    path: "{{ linux_upgrade_network_netplan_dir }}"
  register: _netplan_dir
  when: linux_upgrade_network_backend_auto_detect | bool

- name: Auto-detect network backend - NetworkManager dir
  stat:
    path: "{{ linux_upgrade_networkmanager_connections_dir }}"
  register: _nm_dir
  when: linux_upgrade_network_backend_auto_detect | bool

- name: Auto-detect network backend - ifcfg dir
  stat:
    path: "{{ linux_upgrade_network_ifcfg_dir }}"
  register: _ifcfg_dir
  when: linux_upgrade_network_backend_auto_detect | bool

- name: Resolve effective network backend
  set_fact:
    linux_upgrade_network_backend_effective: >-
      {% if linux_upgrade_network_backend != 'auto' %}
      {{ linux_upgrade_network_backend }}
      {% elif _netplan_dir.stat.exists | default(false) %}
      netplan
      {% elif _nm_dir.stat.exists | default(false) %}
      NetworkManager
      {% elif _ifcfg_dir.stat.exists | default(false) %}
      ifcfg
      {% else %}
      networkd
      {% elif (ansible_facts.services is defined and 'systemd-networkd.service' in ansible_facts.services) %}
      networkd
      {% else %}
      unknown
      {% endif %}

- name: Collect pre-upgrade primary interface facts
  set_fact:
    linux_upgrade_primary_interface_pre: "{{ ansible_default_ipv4.interface | default('') }}"
    linux_upgrade_primary_ipv4_pre: "{{ ansible_default_ipv4.address | default('') }}"
    linux_upgrade_primary_mac_pre: "{{ ansible_default_ipv4.macaddress | default('') }}"
  when:
    - linux_upgrade_network_interface_migration_enabled | bool
    - linux_upgrade_network_migration_phase | default('post') == 'pre'

- name: Build pre-upgrade interface inventory
  set_fact:
    linux_upgrade_network_interfaces_inventory_pre: "{{ linux_upgrade_network_interfaces_inventory_pre | default([]) + [ {
      'name': item,
      'mac': (hostvars[inventory_hostname]['ansible_' ~ item].macaddress | default('')),
      'ipv4': (hostvars[inventory_hostname]['ansible_' ~ item].ipv4.address | default('')),
      'type': (hostvars[inventory_hostname]['ansible_' ~ item].type | default('')),
      'active': (item == (ansible_default_ipv4.interface | default('')))
    } ] }}"
  loop: "{{ ansible_interfaces | default([]) }}"
  when:
    - linux_upgrade_network_interface_migration_enabled | bool
    - linux_upgrade_network_migration_phase | default('post') == 'pre'
    - item not in ['lo']

- name: Save pre-upgrade network inventory
  copy:
    dest: "{{ linux_upgrade_network_pre_inventory_file }}"
    mode: "0640"
    content: "{{ {
      'backend': linux_upgrade_network_backend_effective,
      'primary_interface': linux_upgrade_primary_interface_pre | default(''),
      'primary_ipv4': linux_upgrade_primary_ipv4_pre | default(''),
      'primary_mac': linux_upgrade_primary_mac_pre | default(''),
      'interfaces': linux_upgrade_network_interfaces_inventory_pre | default([])
    } | to_nice_json }}"
  when:
    - linux_upgrade_network_interface_migration_enabled | bool
    - linux_upgrade_network_migration_phase | default('post') == 'pre'

- name: Generate persistent .link files for NICs by MAC
  copy:
    dest: "{{ linux_upgrade_network_link_dir }}/{{ linux_upgrade_network_link_file_prefix }}{{ item.name }}.link"
    mode: "0644"
    content: |
      [Match]
      MACAddress={{ item.mac }}

      [Link]
      Name={{ item.name }}
  loop: "{{ linux_upgrade_network_interfaces_inventory_pre | default([]) }}"
  when:
    - linux_upgrade_network_interface_migration_enabled | bool
    - linux_upgrade_network_link_files_enabled | bool
    - linux_upgrade_network_persistent_naming_enabled | bool
    - linux_upgrade_network_migration_phase | default('post') == 'pre'
    - item.mac | length > 0
    - item.name | length > 0

- name: Refresh facts after upgrade for network reconciliation
  setup:
    gather_subset:
      - network
  when:
    - linux_upgrade_network_interface_migration_enabled | bool
    - linux_upgrade_network_migration_phase | default('post') == 'post'

- name: Build post-upgrade interface inventory
  set_fact:
    linux_upgrade_network_interfaces_inventory_post: "{{ linux_upgrade_network_interfaces_inventory_post | default([]) + [ {
      'name': item,
      'mac': (hostvars[inventory_hostname]['ansible_' ~ item].macaddress | default('')),
      'ipv4': (hostvars[inventory_hostname]['ansible_' ~ item].ipv4.address | default('')),
      'type': (hostvars[inventory_hostname]['ansible_' ~ item].type | default(''))
    } ] }}"
  loop: "{{ ansible_interfaces | default([]) }}"
  when:
    - linux_upgrade_network_interface_migration_enabled | bool
    - linux_upgrade_network_migration_phase | default('post') == 'post'
    - item not in ['lo']

- name: Resolve migrated primary interface by MAC
  set_fact:
    linux_upgrade_primary_interface_post_resolved: "{{ (linux_upgrade_network_interfaces_inventory_post | default([]) | selectattr('mac', 'equalto', linux_upgrade_primary_mac_pre | default('')) | map(attribute='name') | list | first) | default(ansible_default_ipv4.interface | default('')) }}"
    linux_upgrade_primary_ipv4_post_resolved: "{{ (linux_upgrade_network_interfaces_inventory_post | default([]) | selectattr('mac', 'equalto', linux_upgrade_primary_mac_pre | default('')) | map(attribute='ipv4') | list | first) | default(ansible_default_ipv4.address | default('')) }}"
  when:
    - linux_upgrade_network_interface_migration_enabled | bool
    - linux_upgrade_network_migration_phase | default('post') == 'post'

- name: Save post-upgrade network inventory
  copy:
    dest: "{{ linux_upgrade_network_post_inventory_file }}"
    mode: "0640"
    content: "{{ {
      'backend': linux_upgrade_network_backend_effective,
      'primary_interface_pre': linux_upgrade_primary_interface_pre | default(''),
      'primary_interface_post_resolved': linux_upgrade_primary_interface_post_resolved | default(''),
      'primary_ipv4_pre': linux_upgrade_primary_ipv4_pre | default(''),
      'primary_ipv4_post_resolved': linux_upgrade_primary_ipv4_post_resolved | default(''),
      'interfaces': linux_upgrade_network_interfaces_inventory_post | default([])
    } | to_nice_json }}"
  when:
    - linux_upgrade_network_interface_migration_enabled | bool
    - linux_upgrade_network_migration_phase | default('post') == 'post'

- name: Find NetworkManager profiles
  find:
    paths: "{{ linux_upgrade_networkmanager_connections_dir }}"
    patterns: "*.nmconnection"
  register: _nm_profiles
  when:
    - linux_upgrade_networkmanager_realign_profiles | bool
    - linux_upgrade_network_backend_effective == 'NetworkManager'
    - linux_upgrade_network_migration_phase | default('post') == 'post'

- name: Update interface-name in NetworkManager profiles
  lineinfile:
    path: "{{ item.path }}"
    regexp: '^interface-name='
    line: "interface-name={{ linux_upgrade_primary_interface_post_resolved | default(ansible_default_ipv4.interface | default('')) }}"
    insertafter: '^\[connection\]'
  loop: "{{ _nm_profiles.files | default([]) }}"
  when:
    - linux_upgrade_networkmanager_realign_profiles | bool
    - linux_upgrade_network_backend_effective == 'NetworkManager'
    - linux_upgrade_network_migration_phase | default('post') == 'post'
    - (linux_upgrade_primary_interface_post_resolved | default(ansible_default_ipv4.interface | default(''))) | length > 0
  notify: restart NetworkManager

- name: Ensure NetworkManager profile binds to MAC
  lineinfile:
    path: "{{ item.path }}"
    regexp: '^mac-address='
    line: "mac-address={{ linux_upgrade_primary_mac_pre | default(ansible_default_ipv4.macaddress | default('')) }}"
    insertafter: '^\[ethernet\]'
  loop: "{{ _nm_profiles.files | default([]) }}"
  when:
    - linux_upgrade_networkmanager_realign_profiles | bool
    - linux_upgrade_network_backend_effective == 'NetworkManager'
    - linux_upgrade_network_migration_phase | default('post') == 'post'
    - (linux_upgrade_primary_mac_pre | default(ansible_default_ipv4.macaddress | default(''))) | length > 0
  notify: restart NetworkManager

- name: Find netplan files
  find:
    paths: "{{ linux_upgrade_network_netplan_dir }}"
    patterns: "*.yaml,*.yml"
    use_regex: false
  register: _netplan_files
  when:
    - linux_upgrade_network_netplan_enabled | bool
    - linux_upgrade_network_backend_effective == 'netplan'
    - linux_upgrade_network_migration_phase | default('post') == 'post'

- name: Ensure netplan match.macaddress exists
  lineinfile:
    path: "{{ item.path }}"
    regexp: '^\s*macaddress:\s*.*$'
    line: "      macaddress: {{ linux_upgrade_primary_mac_pre }}"
    insertafter: '^\s*match:\s*$'
  loop: "{{ _netplan_files.files | default([]) }}"
  when:
    - linux_upgrade_network_netplan_enabled | bool
    - linux_upgrade_network_backend_effective == 'netplan'
    - linux_upgrade_network_migration_phase | default('post') == 'post'
    - (linux_upgrade_primary_mac_pre | default('')) | length > 0

- name: Ensure netplan set-name exists
  lineinfile:
    path: "{{ item.path }}"
    regexp: '^\s*set-name:\s*.*$'
    line: "      set-name: {{ linux_upgrade_primary_interface_post_resolved | default(ansible_default_ipv4.interface | default('')) }}"
    insertafter: '^\s*match:\s*$'
  loop: "{{ _netplan_files.files | default([]) }}"
  when:
    - linux_upgrade_network_netplan_enabled | bool
    - linux_upgrade_network_backend_effective == 'netplan'
    - linux_upgrade_network_migration_phase | default('post') == 'post'
    - (linux_upgrade_primary_interface_post_resolved | default(ansible_default_ipv4.interface | default(''))) | length > 0

- name: Generate netplan configuration
  command: netplan generate
  changed_when: false
  when:
    - linux_upgrade_network_apply_changes_enabled | bool
    - linux_upgrade_network_netplan_enabled | bool
    - linux_upgrade_network_backend_effective == 'netplan'
    - linux_upgrade_network_migration_phase | default('post') == 'post'

- name: Find ifcfg files
  find:
    paths: "{{ linux_upgrade_network_ifcfg_dir }}"
    patterns: "ifcfg-*"
  register: _ifcfg_files
  when:
    - linux_upgrade_network_ifcfg_enabled | bool
    - linux_upgrade_network_backend_effective == 'ifcfg'
    - linux_upgrade_network_migration_phase | default('post') == 'post'

- name: Update DEVICE in ifcfg files
  lineinfile:
    path: "{{ item.path }}"
    regexp: '^DEVICE='
    line: 'DEVICE={{ linux_upgrade_primary_interface_post_resolved | default(ansible_default_ipv4.interface | default("")) }}'
  loop: "{{ _ifcfg_files.files | default([]) }}"
  when:
    - linux_upgrade_network_ifcfg_enabled | bool
    - linux_upgrade_network_backend_effective == 'ifcfg'
    - linux_upgrade_network_migration_phase | default('post') == 'post'
    - (linux_upgrade_primary_interface_post_resolved | default(ansible_default_ipv4.interface | default(''))) | length > 0

- name: Update HWADDR in ifcfg files
  lineinfile:
    path: "{{ item.path }}"
    regexp: '^HWADDR='
    line: 'HWADDR={{ linux_upgrade_primary_mac_pre | default(ansible_default_ipv4.macaddress | default("")) }}'
  loop: "{{ _ifcfg_files.files | default([]) }}"
  when:
    - linux_upgrade_network_ifcfg_enabled | bool
    - linux_upgrade_network_backend_effective == 'ifcfg'
    - linux_upgrade_network_migration_phase | default('post') == 'post'
    - (linux_upgrade_primary_mac_pre | default('')) | length > 0

- name: Validate primary interface was restored
  assert:
    that:
      - linux_upgrade_primary_interface_post_resolved | default(ansible_default_ipv4.interface | default('')) | length > 0
    fail_msg: "Primary network interface could not be resolved after upgrade."
  when:
    - linux_upgrade_network_interface_migration_enabled | bool
    - linux_upgrade_network_migration_phase | default('post') == 'post'
    - linux_upgrade_network_restore_primary_interface_required | bool

- name: Validate primary IP was restored
  assert:
    that:
      - linux_upgrade_primary_ipv4_post_resolved | default(ansible_default_ipv4.address | default('')) | length > 0
    fail_msg: "Primary IPv4 address was not restored after upgrade."
  when:
    - linux_upgrade_network_interface_migration_enabled | bool
    - linux_upgrade_network_migration_phase | default('post') == 'post'
    - linux_upgrade_network_restore_ip_required | bool

- name: Reload NetworkManager connections
  command: nmcli connection reload
  changed_when: false
  when:
    - linux_upgrade_network_apply_changes_enabled | bool
    - linux_upgrade_network_backend_effective == 'NetworkManager'
    - linux_upgrade_network_migration_phase | default('post') == 'post'

- name: Write network interface migration report
  copy:
    dest: "{{ linux_upgrade_network_interface_migration_report_file }}"
    mode: "0640"
    content: "{{ {
      'backend': linux_upgrade_network_backend_effective,
      'primary_interface_pre': linux_upgrade_primary_interface_pre | default(''),
      'primary_mac_pre': linux_upgrade_primary_mac_pre | default(''),
      'primary_ipv4_pre': linux_upgrade_primary_ipv4_pre | default(''),
      'primary_interface_post_resolved': linux_upgrade_primary_interface_post_resolved | default(ansible_default_ipv4.interface | default('')),
      'primary_ipv4_post_resolved': linux_upgrade_primary_ipv4_post_resolved | default(ansible_default_ipv4.address | default('')),
      'persistent_naming_enabled': linux_upgrade_network_persistent_naming_enabled,
      'link_files_enabled': linux_upgrade_network_link_files_enabled
    } | to_nice_json }}"
  when:
    - linux_upgrade_network_interface_migration_enabled | bool
    - linux_upgrade_network_migration_phase | default('post') in ['pre', 'post']



- name: Find systemd-networkd files
  find:
    paths: "{{ linux_upgrade_network_networkd_dir }}"
    patterns: "*.network"
  register: _networkd_files
  when:
    - linux_upgrade_network_networkd_enabled | bool
    - linux_upgrade_network_backend_effective == 'networkd'
    - linux_upgrade_network_migration_phase | default('post') == 'post'

- name: Ensure Match MACAddress in networkd files
  lineinfile:
    path: "{{ item.path }}"
    regexp: '^MACAddress='
    line: "MACAddress={{ linux_upgrade_primary_mac_pre }}"
    insertafter: '^\[Match\]'
  loop: "{{ _networkd_files.files | default([]) }}"
  when:
    - linux_upgrade_network_networkd_enabled | bool
    - linux_upgrade_network_backend_effective == 'networkd'
    - (linux_upgrade_primary_mac_pre | default('')) | length > 0

- name: Ensure Name in networkd files
  lineinfile:
    path: "{{ item.path }}"
    regexp: '^Name='
    line: "Name={{ linux_upgrade_primary_interface_post_resolved }}"
    insertafter: '^\[Match\]'
  loop: "{{ _networkd_files.files | default([]) }}"
  when:
    - linux_upgrade_network_networkd_enabled | bool
    - linux_upgrade_network_backend_effective == 'networkd'
    - (linux_upgrade_primary_interface_post_resolved | default('')) | length > 0

- name: Reload systemd-networkd
  command: networkctl reload
  changed_when: false
  when:
    - linux_upgrade_network_apply_changes_enabled | bool
    - linux_upgrade_network_backend_effective == 'networkd'

