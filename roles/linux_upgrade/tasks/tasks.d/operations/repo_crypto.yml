- name: Resolve expected repo crypto maps
  set_fact:
    linux_upgrade_repo_expected_gpg_fingerprints_effective_effective: "{{ linux_upgrade_repo_expected_gpg_fingerprints_effective if (linux_upgrade_repo_expected_gpg_fingerprints_effective | length > 0) else (linux_upgrade_repo_expected_gpg_fingerprints_effective_map.get(linux_upgrade_distribution_key, [])) }}"
    linux_upgrade_repo_expected_tls_hosts_effective: "{{ linux_upgrade_repo_expected_tls_hosts if (linux_upgrade_repo_expected_tls_hosts | length > 0) else (linux_upgrade_repo_expected_tls_hosts_map.get(linux_upgrade_distribution_key, linux_upgrade_repo_expected_tls_hosts_map.get('default', []))) }}"
    linux_upgrade_repo_expected_tls_fingerprints_effective: "{{ linux_upgrade_repo_expected_tls_fingerprints_map.get(linux_upgrade_distribution_key, linux_upgrade_repo_expected_tls_fingerprints_map.get('default', {})) }}"

- name: Resolve repo GPG keys for distribution
  set_fact:
    linux_upgrade_repo_gpg_keys_effective: "{{ linux_upgrade_repo_gpg_keys.get(linux_upgrade_distribution_key, []) }}"

- name: Ensure RPM GPG keys are installed on RHEL-like
  rpm_key:
    state: present
    key: "{{ item.url if (item is mapping and 'url' in item) else item }}"
  loop: "{{ linux_upgrade_repo_gpg_keys_effective }}"
  when:
    - linux_upgrade_repo_crypto_validation_enabled | bool
    - ansible_os_family == 'RedHat'

- name: Ensure APT keyring directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when:
    - linux_upgrade_repo_crypto_validation_enabled | bool
    - ansible_os_family == 'Debian'

- name: Install repository keyrings on Debian/Ubuntu
  get_url:
    url: "{{ item.url }}"
    dest: "/etc/apt/keyrings/{{ item.name | default('linux-upgrade-' ~ loop.index ~ '.asc') }}"
    mode: "0644"
  loop: "{{ linux_upgrade_repo_gpg_keys_effective }}"
  when:
    - linux_upgrade_repo_crypto_validation_enabled | bool
    - ansible_os_family == 'Debian'
    - item is mapping
    - item.url is defined

- name: Install repository keys on SLES
  rpm_key:
    state: present
    key: "{{ item.url if (item is mapping and 'url' in item) else item }}"
  loop: "{{ linux_upgrade_repo_gpg_keys_effective }}"
  when:
    - linux_upgrade_repo_crypto_validation_enabled | bool
    - ansible_os_family == 'Suse'

- name: Gather RPM GPG fingerprints
  shell: "rpm -q gpg-pubkey --qf '%{SUMMARY}\n' 2>/dev/null || true"
  register: _rpm_gpg_keys
  changed_when: false
  when:
    - linux_upgrade_repo_crypto_validation_enabled | bool
    - ansible_os_family in ['RedHat', 'Suse']

- name: Gather APT trusted fingerprints
  shell: "gpg --show-keys --with-fingerprint /etc/apt/keyrings/* 2>/dev/null || true"
  register: _apt_gpg_keys
  changed_when: false
  when:
    - linux_upgrade_repo_crypto_validation_enabled | bool
    - ansible_os_family == 'Debian'

- name: Validate expected GPG fingerprints presence
  assert:
    that:
      - item in ((_rpm_gpg_keys.stdout | default('')) ~ (_apt_gpg_keys.stdout | default('')))
    fail_msg: "Expected repository GPG fingerprint missing: {{ item }}"
  loop: "{{ linux_upgrade_repo_expected_gpg_fingerprints_effective }}"
  when:
    - linux_upgrade_repo_crypto_validation_enabled | bool
    - linux_upgrade_repo_expected_gpg_fingerprints_effective | length > 0

- name: Validate yum repo gpgcheck on RHEL-like
  shell: "grep -R '^[[:space:]]*gpgcheck=1' /etc/yum.repos.d/*.repo 2>/dev/null"
  register: _yum_gpgcheck
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_repo_crypto_validation_enabled | bool
    - ansible_os_family == 'RedHat'

- name: Validate apt signed-by usage
  shell: "grep -R 'signed-by=' /etc/apt/sources.list /etc/apt/sources.list.d 2>/dev/null || true"
  register: _apt_signedby
  changed_when: false
  when:
    - linux_upgrade_repo_crypto_validation_enabled | bool
    - ansible_os_family == 'Debian'

- name: Validate zypper GPG check
  shell: "zypper lr -u | cat"
  register: _zypper_lr
  changed_when: false
  when:
    - linux_upgrade_repo_crypto_validation_enabled | bool
    - ansible_os_family == 'Suse'

- name: Enforce strict repo crypto mode for yum
  assert:
    that:
      - (_yum_gpgcheck.stdout | default('')) | length > 0
    fail_msg: "Strict crypto mode: yum/dnf repos without gpgcheck=1 detected."
  when:
    - linux_upgrade_repo_crypto_validation_enabled | bool
    - linux_upgrade_repo_crypto_strict_mode | bool
    - ansible_os_family == 'RedHat'

- name: Enforce strict repo crypto mode for apt
  assert:
    that:
      - (_apt_signedby.stdout | default('')) | length > 0
    fail_msg: "Strict crypto mode: apt repos without signed-by detected."
  when:
    - linux_upgrade_repo_crypto_validation_enabled | bool
    - linux_upgrade_repo_crypto_strict_mode | bool
    - ansible_os_family == 'Debian'

- name: Write repository crypto compliance report
  copy:
    dest: "{{ linux_upgrade_repo_crypto_report_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "distribution": "{{ ansible_distribution }}",
        "strict_mode": {{ 'true' if linux_upgrade_repo_crypto_strict_mode else 'false' }},
        "expected_fingerprints": {{ linux_upgrade_repo_expected_gpg_fingerprints_effective | to_json }},
        "rpm_key_output": {{ (_rpm_gpg_keys.stdout | default('')) | to_json }},
        "apt_key_output": {{ (_apt_gpg_keys.stdout | default('')) | to_json }},
        "yum_gpgcheck_output": {{ (_yum_gpgcheck.stdout | default('')) | to_json }},
        "apt_signed_by_output": {{ (_apt_signedby.stdout | default('')) | to_json }},
        "zypper_output": {{ (_zypper_lr.stdout | default('')) | to_json }},
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
  when: linux_upgrade_repo_crypto_validation_enabled | bool
