- name: Backup /etc/fstab before network shares changes
  copy:
    remote_src: true
    src: /etc/fstab
    dest: "{{ linux_upgrade_fstab_backup_file }}"
    mode: "0600"
  when:
    - linux_upgrade_manage_network_shares_fstab | bool
    - linux_upgrade_fstab_phase == 'pre'

- name: Extract network share entries from /etc/fstab
  shell: >
    awk 'BEGIN{types="{{ linux_upgrade_fstab_network_share_types | join("|") }}"}
    $0 !~ /^[[:space:]]*#/ && $3 ~ "^((" types "))$" {print $0}' /etc/fstab
  register: _fstab_network_shares
  changed_when: false
  when:
    - linux_upgrade_manage_network_shares_fstab | bool
    - linux_upgrade_fstab_phase == 'pre'

- name: Save extracted network share entries
  copy:
    dest: "{{ linux_upgrade_fstab_network_shares_backup_file }}"
    mode: "0600"
    content: "{{ (_fstab_network_shares.stdout_lines | default([])) | join('\n') }}{% if (_fstab_network_shares.stdout_lines | default([]) | length) > 0 %}\n{% endif %}"
  when:
    - linux_upgrade_manage_network_shares_fstab | bool
    - linux_upgrade_fstab_phase == 'pre'

- name: Comment NFS/CIFS entries in /etc/fstab
  replace:
    path: /etc/fstab
    regexp: '^(?![[:space:]]*# linux-upgrade managed: )(?![[:space:]]*#)(.*[[:space:]]({{ linux_upgrade_fstab_network_share_types | join("|") }})[[:space:]].*)$'
    replace: '{{ linux_upgrade_fstab_comment_marker }}\1'
    backup: false
  when:
    - linux_upgrade_manage_network_shares_fstab | bool
    - linux_upgrade_fstab_phase == 'pre'

- name: Restore NFS/CIFS entries in /etc/fstab
  replace:
    path: /etc/fstab
    regexp: '^[[:space:]]*# linux-upgrade managed: (.*[[:space:]]({{ linux_upgrade_fstab_network_share_types | join("|") }})[[:space:]].*)$'
    replace: '\1'
    backup: false
  when:
    - linux_upgrade_manage_network_shares_fstab | bool
    - linux_upgrade_fstab_phase == 'post'

- name: Validate /etc/fstab syntax after share restoration
  command: mount -fav
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_manage_network_shares_fstab | bool
    - linux_upgrade_fstab_phase == 'post'
