- name: Deduce provider from snapshot id if needed
  set_fact:
    linux_upgrade_snapshot_provider_effective: "{{ linux_upgrade_snapshot_provider if linux_upgrade_snapshot_provider != 'auto' else (linux_upgrade_snapshot_id.split(':')[0] if linux_upgrade_snapshot_id | length > 0 else 'none') }}"

- name: Rollback OpenStack using rebuild from image
  openstack.cloud.server_action:
    cloud: "{{ linux_upgrade_openstack_cloud }}"
    server: "{{ linux_upgrade_openstack_server }}"
    action: rebuild
    image: "{{ linux_upgrade_snapshot_id.split(':')[-1] }}"
    wait: true
  delegate_to: localhost
  when: linux_upgrade_snapshot_provider_effective == 'openstack'

- name: Rollback VMware snapshot
  vmware.vmware.vm_snapshot_revert:
    hostname: "{{ linux_upgrade_vmware_hostname }}"
    username: "{{ linux_upgrade_vmware_username }}"
    password: "{{ linux_upgrade_vmware_password }}"
    validate_certs: "{{ linux_upgrade_vmware_validate_certs }}"
    datacenter: "{{ linux_upgrade_vmware_datacenter }}"
    folder: "{{ linux_upgrade_vmware_folder | default(omit) }}"
    name: "{{ linux_upgrade_vmware_name }}"
    snapshot_name: "{{ linux_upgrade_snapshot_id.split(':')[-1] }}"
  delegate_to: localhost
  no_log: true
  when: linux_upgrade_snapshot_provider_effective == 'vmware'

- name: Rollback Proxmox snapshot
  community.proxmox.proxmox_snap:
    api_host: "{{ linux_upgrade_proxmox_api_host }}"
    api_user: "{{ linux_upgrade_proxmox_api_user }}"
    api_password: "{{ linux_upgrade_proxmox_api_password }}"
    node: "{{ linux_upgrade_proxmox_node }}"
    vmid: "{{ linux_upgrade_proxmox_vmid }}"
    snapname: "{{ linux_upgrade_snapshot_id.split(':')[-1] }}"
    state: rollback
  delegate_to: localhost
  no_log: true
  when: linux_upgrade_snapshot_provider_effective == 'proxmox'

- name: Optionally delete snapshot after rollback on Proxmox
  community.proxmox.proxmox_snap:
    api_host: "{{ linux_upgrade_proxmox_api_host }}"
    api_user: "{{ linux_upgrade_proxmox_api_user }}"
    api_password: "{{ linux_upgrade_proxmox_api_password }}"
    node: "{{ linux_upgrade_proxmox_node }}"
    vmid: "{{ linux_upgrade_proxmox_vmid }}"
    snapname: "{{ linux_upgrade_snapshot_id.split(':')[-1] }}"
    state: absent
  delegate_to: localhost
  no_log: true
  when:
    - linux_upgrade_snapshot_provider_effective == 'proxmox'
    - linux_upgrade_snapshot_delete_after_rollback | bool


- name: Write rollback report
  copy:
    dest: "{{ linux_upgrade_rollback_report_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "provider": "{{ linux_upgrade_snapshot_provider_effective | default('unknown') }}",
        "snapshot_id": "{{ linux_upgrade_snapshot_id | default('') }}",
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }

- name: Include local filesystem rollback capabilities report
  include_tasks: filesystem/filesystem_local_rollback.yml
  when: linux_upgrade_local_fs_rollback_enabled | bool
