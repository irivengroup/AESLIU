- name: Detect advanced network topology artifacts
  shell: |
    {
      echo "[bonds]"
      cat /proc/net/bonding/* 2>/dev/null || true
      echo "[bridges]"
      bridge link show 2>/dev/null || true
      echo "[vlans]"
      ip -d link show type vlan 2>/dev/null || true
      echo "[routes]"
      ip route show 2>/dev/null || true
    }
  register: _network_topology
  changed_when: false
  when: linux_upgrade_network_advanced_l2_enabled | bool

- name: Save advanced network topology report
  copy:
    dest: "{{ linux_upgrade_state_dir }}/network_topology.txt"
    mode: "0640"
    content: "{{ _network_topology.stdout | default('') }}"
  when: linux_upgrade_network_advanced_l2_enabled | bool

- name: Validate expected routes
  shell: "ip route show | grep -F -- {{ item | quote }}"
  loop: "{{ linux_upgrade_network_expected_routes }}"
  changed_when: false
  when:
    - linux_upgrade_network_routes_validation_enabled | bool
    - linux_upgrade_network_expected_routes | length > 0

- name: Validate expected bond names
  shell: "test -d /proc/net/bonding && test -f /proc/net/bonding/{{ item }}"
  loop: "{{ linux_upgrade_network_expected_bonds }}"
  changed_when: false
  when:
    - linux_upgrade_network_advanced_l2_enabled | bool
    - linux_upgrade_network_expected_bonds | length > 0

- name: Validate expected bridges
  shell: "bridge link show | grep -F -- {{ item | quote }}"
  loop: "{{ linux_upgrade_network_expected_bridges }}"
  changed_when: false
  when:
    - linux_upgrade_network_advanced_l2_enabled | bool
    - linux_upgrade_network_expected_bridges | length > 0

- name: Validate expected vlans
  shell: "ip -d link show type vlan | grep -F -- {{ item | quote }}"
  loop: "{{ linux_upgrade_network_expected_vlans }}"
  changed_when: false
  when:
    - linux_upgrade_network_advanced_l2_enabled | bool
    - linux_upgrade_network_expected_vlans | length > 0
