- name: Detect L2/L3 network artifacts
  shell: |
    ip -d link show | egrep 'bond|bridge|vlan|team' || true
  register: _network_l2
  changed_when: false
  when: linux_upgrade_network_detect_l2_artifacts_enabled | bool

- name: Save advanced network artifacts report
  copy:
    dest: "{{ linux_upgrade_state_dir }}/network_advanced.txt"
    mode: "0640"
    content: "{{ _network_l2.stdout | default('') }}"
  when: linux_upgrade_network_detect_l2_artifacts_enabled | bool
