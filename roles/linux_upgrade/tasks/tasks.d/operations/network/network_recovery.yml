- name: Ensure network recovery backup dir exists
  file:
    path: "{{ linux_upgrade_network_recovery_backup_dir }}"
    state: directory
    mode: "0750"
  when: linux_upgrade_network_recovery_enabled | bool

- name: Backup NetworkManager configs for recovery
  shell: "cp -a {{ linux_upgrade_networkmanager_connections_dir }} {{ linux_upgrade_network_recovery_backup_dir }}/NetworkManager 2>/dev/null || true"
  changed_when: true
  when:
    - linux_upgrade_network_recovery_enabled | bool
    - linux_upgrade_network_backend_effective | default('unknown') == 'NetworkManager'

- name: Backup netplan configs for recovery
  shell: "cp -a {{ linux_upgrade_network_netplan_dir }} {{ linux_upgrade_network_recovery_backup_dir }}/netplan 2>/dev/null || true"
  changed_when: true
  when:
    - linux_upgrade_network_recovery_enabled | bool
    - linux_upgrade_network_backend_effective | default('unknown') == 'netplan'

- name: Backup ifcfg configs for recovery
  shell: "cp -a {{ linux_upgrade_network_ifcfg_dir }} {{ linux_upgrade_network_recovery_backup_dir }}/ifcfg 2>/dev/null || true"
  changed_when: true
  when:
    - linux_upgrade_network_recovery_enabled | bool
    - linux_upgrade_network_backend_effective | default('unknown') == 'ifcfg'

- name: Backup systemd-networkd configs for recovery
  shell: "cp -a {{ linux_upgrade_network_networkd_dir }} {{ linux_upgrade_network_recovery_backup_dir }}/networkd 2>/dev/null || true"
  changed_when: true
  when:
    - linux_upgrade_network_recovery_enabled | bool
    - linux_upgrade_network_backend_effective | default('unknown') == 'networkd'

- name: Write network recovery checkpoint
  copy:
    dest: "{{ linux_upgrade_network_recovery_checkpoint_file }}"
    mode: "0640"
    content: |
      backend: {{ linux_upgrade_network_backend_effective | default('unknown') }}
      primary_interface_pre: {{ linux_upgrade_primary_interface_pre | default(ansible_default_ipv4.interface | default('')) }}
      primary_ipv4_pre: {{ linux_upgrade_primary_ipv4_pre | default(ansible_default_ipv4.address | default('')) }}
      primary_mac_pre: {{ linux_upgrade_primary_mac_pre | default(ansible_default_ipv4.macaddress | default('')) }}
      snapshot_id: {{ linux_upgrade_snapshot_id_effective | default(linux_upgrade_snapshot_id | default('')) }}
      written_at: {{ ansible_date_time.iso8601 }}
  when: linux_upgrade_network_recovery_enabled | bool

- name: Write network recovery report
  copy:
    dest: "{{ linux_upgrade_network_recovery_report_file }}"
    mode: "0640"
    content: |
      {
        "backend": "{{ linux_upgrade_network_backend_effective | default('unknown') }}",
        "backup_dir": "{{ linux_upgrade_network_recovery_backup_dir }}",
        "checkpoint_file": "{{ linux_upgrade_network_recovery_checkpoint_file }}",
        "snapshot_id": "{{ linux_upgrade_snapshot_id_effective | default(linux_upgrade_snapshot_id | default('')) }}",
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
  when: linux_upgrade_network_recovery_enabled | bool
