- name: Check network recovery checkpoint
  stat:
    path: "{{ linux_upgrade_network_recovery_checkpoint_file }}"
  register: _network_recovery_checkpoint

- name: Restore NetworkManager configs from recovery backup
  shell: "cp -a {{ linux_upgrade_network_recovery_backup_dir }}/NetworkManager/* {{ linux_upgrade_networkmanager_connections_dir }}/ 2>/dev/null || true"
  changed_when: true
  when:
    - linux_upgrade_network_recovery_enabled | bool
    - linux_upgrade_network_recovery_restore_on_resume | bool
    - _network_recovery_checkpoint.stat.exists | default(false)
    - linux_upgrade_network_backend_effective | default('unknown') == 'NetworkManager'

- name: Restore netplan configs from recovery backup
  shell: "cp -a {{ linux_upgrade_network_recovery_backup_dir }}/netplan/* {{ linux_upgrade_network_netplan_dir }}/ 2>/dev/null || true"
  changed_when: true
  when:
    - linux_upgrade_network_recovery_enabled | bool
    - linux_upgrade_network_recovery_restore_on_resume | bool
    - _network_recovery_checkpoint.stat.exists | default(false)
    - linux_upgrade_network_backend_effective | default('unknown') == 'netplan'

- name: Restore ifcfg configs from recovery backup
  shell: "cp -a {{ linux_upgrade_network_recovery_backup_dir }}/ifcfg/* {{ linux_upgrade_network_ifcfg_dir }}/ 2>/dev/null || true"
  changed_when: true
  when:
    - linux_upgrade_network_recovery_enabled | bool
    - linux_upgrade_network_recovery_restore_on_resume | bool
    - _network_recovery_checkpoint.stat.exists | default(false)
    - linux_upgrade_network_backend_effective | default('unknown') == 'ifcfg'

- name: Restore systemd-networkd configs from recovery backup
  shell: "cp -a {{ linux_upgrade_network_recovery_backup_dir }}/networkd/* {{ linux_upgrade_network_networkd_dir }}/ 2>/dev/null || true"
  changed_when: true
  when:
    - linux_upgrade_network_recovery_enabled | bool
    - linux_upgrade_network_recovery_restore_on_resume | bool
    - _network_recovery_checkpoint.stat.exists | default(false)
    - linux_upgrade_network_backend_effective | default('unknown') == 'networkd'

- name: Reload NetworkManager after recovery restore
  command: nmcli connection reload
  changed_when: false
  failed_when: false
  when:
    - _network_recovery_checkpoint.stat.exists | default(false)
    - linux_upgrade_network_backend_effective | default('unknown') == 'NetworkManager'

- name: Generate netplan after recovery restore
  command: netplan generate
  changed_when: false
  failed_when: false
  when:
    - _network_recovery_checkpoint.stat.exists | default(false)
    - linux_upgrade_network_backend_effective | default('unknown') == 'netplan'

- name: Reload systemd-networkd after recovery restore
  command: networkctl reload
  changed_when: false
  failed_when: false
  when:
    - _network_recovery_checkpoint.stat.exists | default(false)
    - linux_upgrade_network_backend_effective | default('unknown') == 'networkd'
