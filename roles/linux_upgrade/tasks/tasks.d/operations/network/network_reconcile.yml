- name: Collect current IPv4 routes
  shell: "ip route show"
  register: _net_routes_v4
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_network_reconcile_enabled | bool
    - linux_upgrade_network_reconcile_routes_enabled | bool

- name: Collect current IPv6 routes
  shell: "ip -6 route show"
  register: _net_routes_v6
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_network_reconcile_enabled | bool
    - linux_upgrade_network_reconcile_ipv6_enabled | bool

- name: Collect current ip rules
  shell: "ip rule show"
  register: _net_ip_rules
  changed_when: false
  failed_when: false
  when: linux_upgrade_network_reconcile_enabled | bool

- name: Reconcile missing IPv4 routes
  shell: "ip route add {{ item }} || true"
  loop: "{{ linux_upgrade_network_expected_routes }}"
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_network_reconcile_enabled | bool
    - linux_upgrade_network_reconcile_routes_enabled | bool
    - item not in (_net_routes_v4.stdout | default(''))

- name: Reconcile missing IPv6 routes
  shell: "ip -6 route add {{ item }} || true"
  loop: "{{ linux_upgrade_network_expected_ipv6_routes }}"
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_network_reconcile_enabled | bool
    - linux_upgrade_network_reconcile_ipv6_enabled | bool
    - item not in (_net_routes_v6.stdout | default(''))

- name: Reconcile missing ip rules
  shell: "ip rule add {{ item }} || true"
  loop: "{{ linux_upgrade_network_expected_ip_rules }}"
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_network_reconcile_enabled | bool
    - item not in (_net_ip_rules.stdout | default(''))

- name: Write network reconcile report
  copy:
    dest: "{{ linux_upgrade_network_reconcile_report_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "routes_v4": {{ (_net_routes_v4.stdout | default('')) | to_json }},
        "routes_v6": {{ (_net_routes_v6.stdout | default('')) | to_json }},
        "ip_rules": {{ (_net_ip_rules.stdout | default('')) | to_json }},
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
  when: linux_upgrade_network_reconcile_enabled | bool
