- name: Run cluster-specific quorum guards before batch
  include_tasks: rolling_guards.yml
  vars:
    linux_upgrade_guard_phase: pre
  when:
    - linux_upgrade_cluster_quorum_guard_enabled | bool
    - linux_upgrade_rolling_phase == 'pre'

- name: Run rolling pre-batch commands
  shell: "{{ item }}"
  loop: "{{ linux_upgrade_cluster_batch_precheck_commands }}"
  changed_when: false
  when: linux_upgrade_rolling_phase == 'pre'

- name: Run rolling post-batch commands
  shell: "{{ item }}"
  loop: "{{ linux_upgrade_cluster_batch_postcheck_commands }}"
  changed_when: false
  when: linux_upgrade_rolling_phase == 'post'

- name: Run cluster-specific quorum guards after batch
  include_tasks: rolling_guards.yml
  vars:
    linux_upgrade_guard_phase: post
  when:
    - linux_upgrade_cluster_quorum_guard_enabled | bool
    - linux_upgrade_rolling_phase == 'post'

- name: Pause between rolling batches
  pause:
    seconds: "{{ linux_upgrade_rolling_pause_between_batches_seconds | int }}"
  when:
    - linux_upgrade_rolling_phase == 'post'
    - (linux_upgrade_rolling_pause_between_batches_seconds | int) > 0
