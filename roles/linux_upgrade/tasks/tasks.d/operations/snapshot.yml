- name: Validate snapshot provider can run
  assert:
    that:
      - linux_upgrade_snapshot_provider_effective in ['none','openstack','vmware','proxmox']
    fail_msg: 'Unsupported snapshot provider.'
  when: linux_upgrade_snapshot_validate_before_upgrade | bool

- name: Skip snapshot when host is not a VM
  debug:
    msg: "Snapshot skipped because host is not a supported VM guest."
  when:
    - not linux_upgrade_is_virtual_machine
    - linux_upgrade_snapshot_only_for_virtual_machines | bool

- name: Create OpenStack snapshot image
  openstack.cloud.server_action:
    cloud: "{{ linux_upgrade_openstack_cloud }}"
    server: "{{ linux_upgrade_openstack_server }}"
    action: create_image
    image_name: "{{ linux_upgrade_snapshot_name }}"
    wait: true
  delegate_to: localhost
  register: _os_snapshot
  when:
    - linux_upgrade_is_virtual_machine
    - linux_upgrade_snapshot_provider_effective == 'openstack'

- name: Set OpenStack snapshot id
  set_fact:
    linux_upgrade_snapshot_id_effective: "openstack:{{ linux_upgrade_openstack_server }}:{{ linux_upgrade_snapshot_name }}"
  when:
    - linux_upgrade_is_virtual_machine
    - linux_upgrade_snapshot_provider_effective == 'openstack'

- name: Gather VMware snapshot info
  vmware.vmware.vm_snapshot_info:
    hostname: "{{ linux_upgrade_vmware_hostname }}"
    username: "{{ linux_upgrade_vmware_username }}"
    password: "{{ linux_upgrade_vmware_password }}"
    validate_certs: "{{ linux_upgrade_vmware_validate_certs }}"
    datacenter: "{{ linux_upgrade_vmware_datacenter }}"
    folder: "{{ linux_upgrade_vmware_folder | default(omit) }}"
    name: "{{ linux_upgrade_vmware_name }}"
  delegate_to: localhost
  register: _vmw_snapinfo
  no_log: true
  when:
    - linux_upgrade_is_virtual_machine
    - linux_upgrade_snapshot_provider_effective == 'vmware'

- name: Create VMware snapshot
  vmware.vmware.vm_snapshot:
    hostname: "{{ linux_upgrade_vmware_hostname }}"
    username: "{{ linux_upgrade_vmware_username }}"
    password: "{{ linux_upgrade_vmware_password }}"
    validate_certs: "{{ linux_upgrade_vmware_validate_certs }}"
    datacenter: "{{ linux_upgrade_vmware_datacenter }}"
    folder: "{{ linux_upgrade_vmware_folder | default(omit) }}"
    name: "{{ linux_upgrade_vmware_name }}"
    snapshot_name: "{{ linux_upgrade_snapshot_name }}"
    description: "Pre-upgrade snapshot ({{ linux_upgrade_change_ticket }})"
    state: present
    quiesce: "{{ linux_upgrade_vmware_quiesce }}"
    memory_dump: "{{ linux_upgrade_vmware_memory_dump }}"
  delegate_to: localhost
  no_log: true
  when:
    - linux_upgrade_is_virtual_machine
    - linux_upgrade_snapshot_provider_effective == 'vmware'
    - linux_upgrade_snapshot_name not in ((_vmw_snapinfo.snapshots | default([])) | map(attribute='name') | list)

- name: Set VMware snapshot id
  set_fact:
    linux_upgrade_snapshot_id_effective: "vmware:{{ linux_upgrade_vmware_name }}:{{ linux_upgrade_snapshot_name }}"
  when:
    - linux_upgrade_is_virtual_machine
    - linux_upgrade_snapshot_provider_effective == 'vmware'

- name: Create Proxmox snapshot
  community.proxmox.proxmox_snap:
    api_host: "{{ linux_upgrade_proxmox_api_host }}"
    api_user: "{{ linux_upgrade_proxmox_api_user }}"
    api_password: "{{ linux_upgrade_proxmox_api_password }}"
    node: "{{ linux_upgrade_proxmox_node }}"
    vmid: "{{ linux_upgrade_proxmox_vmid }}"
    snapname: "{{ linux_upgrade_snapshot_name }}"
    state: present
  delegate_to: localhost
  no_log: true
  when:
    - linux_upgrade_is_virtual_machine
    - linux_upgrade_snapshot_provider_effective == 'proxmox'

- name: Set Proxmox snapshot id
  set_fact:
    linux_upgrade_snapshot_id_effective: "proxmox:{{ linux_upgrade_proxmox_vmid }}:{{ linux_upgrade_snapshot_name }}"
  when:
    - linux_upgrade_is_virtual_machine
    - linux_upgrade_snapshot_provider_effective == 'proxmox'
