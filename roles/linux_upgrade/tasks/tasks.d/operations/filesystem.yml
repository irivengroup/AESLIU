- name: Include deep storage checks
  include_tasks: filesystem/storage_advanced.yml
  when: linux_upgrade_storage_advanced_enabled | bool

- name: Include deep disk mapping report
  include_tasks: filesystem/filesystem_disk_mapping.yml
