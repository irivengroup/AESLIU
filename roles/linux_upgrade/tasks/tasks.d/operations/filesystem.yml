- name: Include storage advanced checks
  include_tasks: filesystem/storage_advanced.yml
  when: linux_upgrade_storage_advanced_enabled | bool

- name: Include disk mapping report
  include_tasks: filesystem/filesystem_disk_mapping.yml
  when: linux_upgrade_capacity_management_enabled | bool

- name: Include filesystem prechecks
  include_tasks: filesystem/filesystem_prechecks.yml
  when: linux_upgrade_filesystem_enabled | bool

- name: Include filesystem capacity analysis
  include_tasks: filesystem/filesystem_capacity.yml
  when: linux_upgrade_capacity_management_enabled | bool

- name: Include filesystem backup
  include_tasks: filesystem/filesystem_backup.yml
  when:
    - linux_upgrade_filesystem_enabled | bool
    - linux_upgrade_filesystem_backup_enabled | bool

- name: Include filesystem snapshot
  include_tasks: filesystem/filesystem_snapshot.yml
  when:
    - linux_upgrade_filesystem_enabled | bool
    - linux_upgrade_filesystem_snapshot_enabled | bool

- name: Include filesystem cleanup
  include_tasks: filesystem/filesystem_cleanup.yml
  when:
    - linux_upgrade_filesystem_enabled | bool
    - linux_upgrade_filesystem_cleanup_enabled | bool


- name: Include filesystem extend actions
  include_tasks: filesystem/filesystem_extend.yml
  when:
    - linux_upgrade_capacity_management_enabled | bool
    - linux_upgrade_filesystem_auto_extend_enabled | bool


- name: Include real VM disk resize actions
  include_tasks: filesystem/filesystem_vm_disk_resize.yml
  when:
    - linux_upgrade_capacity_management_enabled | bool
    - linux_upgrade_vm_disk_resize_real_enabled | bool


- name: Include local filesystem rollback capabilities
  include_tasks: filesystem/filesystem_local_rollback.yml
  when: linux_upgrade_local_fs_rollback_enabled | bool
