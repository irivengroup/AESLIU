- name: Detect UEFI path for RHEL-like
  set_fact:
    linux_upgrade_grub_cfg_path: >-
      {{ '/boot/efi/EFI/redhat/grub.cfg' if ansible_os_family == 'RedHat' and linux_upgrade_boot_mode == 'uefi'
         else '/boot/grub2/grub.cfg' if ansible_os_family == 'RedHat'
         else '/boot/grub/grub.cfg' if ansible_os_family == 'Debian'
         else '/boot/grub2/grub.cfg' }}

- name: Rebuild initramfs on Debian
  command: update-initramfs -u
  changed_when: true
  when:
    - linux_upgrade_initramfs_rebuild | bool
    - ansible_os_family == 'Debian'

- name: Rebuild initramfs on RHEL/SLES
  command: dracut -f
  changed_when: true
  when:
    - linux_upgrade_initramfs_rebuild | bool
    - ansible_os_family in ['RedHat', 'Suse']

- name: Install grub on BIOS systems when forced
  command: "grub2-install {{ linux_upgrade_bootloader_device }}"
  changed_when: true
  when:
    - linux_upgrade_bootloader_reconfigure | bool
    - linux_upgrade_boot_mode == 'bios'
    - linux_upgrade_bootloader_force_reinstall | bool
    - ansible_os_family in ['RedHat', 'Suse']

- name: Install grub on Debian BIOS systems when forced
  command: "grub-install {{ linux_upgrade_bootloader_device }}"
  changed_when: true
  when:
    - linux_upgrade_bootloader_reconfigure | bool
    - linux_upgrade_boot_mode == 'bios'
    - linux_upgrade_bootloader_force_reinstall | bool
    - ansible_os_family == 'Debian'

- name: Rebuild grub config on RHEL/SLES
  command: "grub2-mkconfig -o {{ linux_upgrade_grub_cfg_path }}"
  changed_when: true
  when:
    - linux_upgrade_bootloader_reconfigure | bool
    - ansible_os_family in ['RedHat', 'Suse']

- name: Rebuild grub config on Debian family
  command: update-grub
  changed_when: true
  when:
    - linux_upgrade_bootloader_reconfigure | bool
    - ansible_os_family == 'Debian'

- name: Validate current default kernel on RHEL-like
  command: grubby --default-kernel
  register: _default_kernel
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_boot_validation_enabled | bool
    - ansible_os_family == 'RedHat'

- name: Set fallback grub entry
  command: "grub2-set-default {{ linux_upgrade_bootloader_fallback_index }}"
  changed_when: true
  when:
    - linux_upgrade_bootloader_fallback_enabled | bool
    - ansible_os_family in ['RedHat', 'Suse']
    - linux_upgrade_bootloader_fallback_index is not none

- name: Set fallback grub entry on Debian family
  command: "grub-set-default {{ linux_upgrade_bootloader_fallback_index }}"
  changed_when: true
  when:
    - linux_upgrade_bootloader_fallback_enabled | bool
    - ansible_os_family == 'Debian'
    - linux_upgrade_bootloader_fallback_index is not none

- name: Validate EFI entries
  command: efibootmgr -v
  changed_when: false
  when:
    - linux_upgrade_efi_validation | bool
    - linux_upgrade_boot_mode == 'uefi'
