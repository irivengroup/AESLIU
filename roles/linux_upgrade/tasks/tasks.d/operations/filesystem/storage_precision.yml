- name: Collect pvs
  shell: "pvs --reportformat json 2>/dev/null || true"
  register: _pvs_json
  changed_when: false
  failed_when: false
  when: linux_upgrade_storage_precision_enabled | bool

- name: Collect lvs
  shell: "lvs --reportformat json 2>/dev/null || true"
  register: _lvs_json_precise
  changed_when: false
  failed_when: false
  when: linux_upgrade_storage_precision_enabled | bool

- name: Collect multipath WWIDs
  shell: "multipath -ll 2>/dev/null || true"
  register: _multipath_wwids
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_storage_precision_enabled | bool
    - linux_upgrade_storage_validate_wwid_mapping | bool

- name: Collect filesystem chain
  shell: "lsblk -J -O 2>/dev/null || true"
  register: _fs_chain
  changed_when: false
  failed_when: false
  when: linux_upgrade_storage_precision_enabled | bool

- name: Write storage precision report
  copy:
    dest: "{{ linux_upgrade_storage_precision_report_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "pvs": {{ (_pvs_json.stdout | default('{}')) | to_json }},
        "lvs": {{ (_lvs_json_precise.stdout | default('{}')) | to_json }},
        "multipath_wwids": {{ (_multipath_wwids.stdout | default('')) | to_json }},
        "fs_chain": {{ (_fs_chain.stdout | default('{}')) | to_json }},
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
  when: linux_upgrade_storage_precision_enabled | bool
