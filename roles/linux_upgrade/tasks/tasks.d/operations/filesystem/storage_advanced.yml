- name: Check multipath devices
  shell: "multipath -ll 2>/dev/null || true"
  register: _multipath
  changed_when: false
  failed_when: false
  when: linux_upgrade_storage_advanced_enabled | bool

- name: Check mdraid devices
  shell: "cat /proc/mdstat 2>/dev/null || true"
  register: _mdraid
  changed_when: false
  failed_when: false
  when: linux_upgrade_storage_advanced_enabled | bool

- name: Check LUKS devices
  shell: "lsblk -o NAME,TYPE,FSTYPE | grep -i crypt || true"
  register: _luks
  changed_when: false
  failed_when: false
  when: linux_upgrade_storage_advanced_enabled | bool

- name: Write storage advanced report
  copy:
    dest: "{{ linux_upgrade_storage_report_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "multipath": {{ (_multipath.stdout | default('')) | to_json }},
        "mdraid": {{ (_mdraid.stdout | default('')) | to_json }},
        "luks": {{ (_luks.stdout | default('')) | to_json }},
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
  when: linux_upgrade_storage_advanced_enabled | bool

# Merged from storage_deep.yml
- name: Check thin pools
  shell: "lvs --noheadings -o lv_name,lv_attr,data_percent,metadata_percent 2>/dev/null || true"
  register: _thinpools
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_storage_advanced_enabled | bool
    - linux_upgrade_storage_validate_thinpools | bool

- name: Check non-root filesystems
  shell: "findmnt -J -o TARGET,SOURCE,FSTYPE 2>/dev/null || true"
  register: _non_root_fs
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_storage_advanced_enabled | bool
    - linux_upgrade_storage_validate_non_root_volumes | bool

- name: Append deep storage report
  lineinfile:
    path: "{{ linux_upgrade_storage_report_file }}"
    create: true
    mode: "0640"
    line: "{{ {'thinpools': (_thinpools.stdout | default('')), 'non_root': (_non_root_fs.stdout | default('')), 'timestamp': ansible_date_time.iso8601} | to_json }}"
  when: linux_upgrade_storage_advanced_enabled | bool

# Merged advanced real storage checks
- name: Check iSCSI sessions
  shell: "iscsiadm -m session 2>/dev/null || true"
  register: _iscsi_sessions
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_storage_advanced_enabled | bool
    - linux_upgrade_storage_iscsi_fc_checks_enabled | bool

- name: Check FC hosts
  shell: "ls /sys/class/fc_host 2>/dev/null || true"
  register: _fc_hosts
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_storage_advanced_enabled | bool
    - linux_upgrade_storage_iscsi_fc_checks_enabled | bool

- name: Check btrfs subvolumes
  shell: "btrfs subvolume list / 2>/dev/null || true"
  register: _btrfs_subvolumes
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_storage_advanced_enabled | bool
    - linux_upgrade_storage_btrfs_complex_enabled | bool

- name: Check ZFS datasets
  shell: "zfs list -H -o name,used,avail,mountpoint 2>/dev/null || true"
  register: _zfs_datasets
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_storage_advanced_enabled | bool
    - linux_upgrade_storage_zfs_multi_dataset_enabled | bool

- name: Check thin pools with thresholds
  shell: "lvs --noheadings --separator ',' -o lv_name,lv_attr,data_percent,metadata_percent 2>/dev/null || true"
  register: _thinpool_details
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_storage_advanced_enabled | bool
    - linux_upgrade_storage_validate_thinpools | bool

- name: Assert iSCSI session minimum
  assert:
    that:
      - ((_iscsi_sessions.stdout_lines | default([])) | length) >= (linux_upgrade_storage_expected_iscsi_sessions_min | int)
    fail_msg: "iSCSI sessions below expected minimum."
  when:
    - linux_upgrade_storage_advanced_enabled | bool
    - linux_upgrade_storage_iscsi_fc_checks_enabled | bool
    - (linux_upgrade_storage_expected_iscsi_sessions_min | int) > 0

- name: Assert FC host minimum
  assert:
    that:
      - ((_fc_hosts.stdout_lines | default([])) | length) >= (linux_upgrade_storage_expected_fc_hosts_min | int)
    fail_msg: "FC hosts below expected minimum."
  when:
    - linux_upgrade_storage_advanced_enabled | bool
    - linux_upgrade_storage_iscsi_fc_checks_enabled | bool
    - (linux_upgrade_storage_expected_fc_hosts_min | int) > 0

- name: Append advanced storage details report
  lineinfile:
    path: "{{ linux_upgrade_storage_report_file }}"
    create: true
    mode: "0640"
    line: "{{ {'iscsi_sessions': (_iscsi_sessions.stdout | default('')), 'fc_hosts': (_fc_hosts.stdout | default('')), 'btrfs_subvolumes': (_btrfs_subvolumes.stdout | default('')), 'zfs_datasets': (_zfs_datasets.stdout | default('')), 'thinpool_details': (_thinpool_details.stdout | default('')), 'timestamp': ansible_date_time.iso8601} | to_json }}"
  when: linux_upgrade_storage_advanced_enabled | bool
