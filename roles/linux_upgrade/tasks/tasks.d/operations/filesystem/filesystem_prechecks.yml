- name: Gather filesystem mount details
  set_fact:
    linux_upgrade_filesystem_mounts_map: >-
      {{
        dict((ansible_mounts | default([])) | map(attribute='mount') | zip(ansible_mounts | default([])))
      }}

- name: Assert configured mount points have minimum free space
  assert:
    that:
      - (linux_upgrade_filesystem_mounts_map[item.key].size_available | default(999999999999) / 1024 / 1024) | int >= (item.value | int)
    fail_msg: "Insufficient free space on {{ item.key }}."
  loop: "{{ linux_upgrade_filesystem_min_free_space_mb | dict2items }}"
  when:
    - item.key in linux_upgrade_filesystem_mounts_map

- name: Assert configured mount points have minimum free inodes
  assert:
    that:
      - (linux_upgrade_filesystem_mounts_map[item.key].inode_available | default(999999999)) | int >= (item.value | int)
    fail_msg: "Insufficient free inodes on {{ item.key }}."
  loop: "{{ linux_upgrade_filesystem_min_free_inodes | dict2items }}"
  when:
    - item.key in linux_upgrade_filesystem_mounts_map

- name: Validate mount configuration
  command: mount -fav
  changed_when: false
  when: linux_upgrade_filesystem_validate_mounts | bool

- name: Detect LVM inventory
  shell: |
    if command -v lvs >/dev/null 2>&1; then
      lvs --reportformat json
    else
      echo '{}'
    fi
  register: _lvs_json
  changed_when: false
  failed_when: false

- name: Detect VGs inventory
  shell: |
    if command -v vgs >/dev/null 2>&1; then
      vgs --reportformat json
    else
      echo '{}'
    fi
  register: _vgs_json
  changed_when: false
  failed_when: false

- name: Detect filesystems inventory
  shell: "findmnt -J -o TARGET,SOURCE,FSTYPE,OPTIONS"
  register: _findmnt_json
  changed_when: false
  failed_when: false

- name: Write filesystem report
  copy:
    dest: "{{ linux_upgrade_filesystem_report_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "mounts": {{ (ansible_mounts | default([])) | to_json }},
        "findmnt": {{ (_findmnt_json.stdout | default('{}')) | to_json }},
        "lvs": {{ (_lvs_json.stdout | default('{}')) | to_json }},
        "vgs": {{ (_vgs_json.stdout | default('{}')) | to_json }},
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
