- name: Ensure filesystem backup dir exists
  file:
    path: "{{ linux_upgrade_filesystem_backup_dir }}"
    state: directory
    mode: "0750"

- name: Backup critical filesystem paths
  archive:
    path: "{{ item }}"
    dest: "{{ linux_upgrade_filesystem_backup_dir }}/{{ item | regex_replace('^/', '') | regex_replace('/', '_') }}.tar.gz"
    format: gz
  loop: "{{ linux_upgrade_filesystem_backup_paths }}"
  failed_when: false
