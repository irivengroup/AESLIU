- name: Resolve target mount source for capacity extension
  command: "findmnt -n -o SOURCE {{ linux_upgrade_vm_disk_target_mount }}"
  register: _linux_upgrade_target_mount_source
  changed_when: false
  failed_when: false

- name: Derive target device basename
  set_fact:
    linux_upgrade_vm_disk_target_device_effective: "{{ linux_upgrade_vm_disk_target_device_hint | default((_linux_upgrade_target_mount_source.stdout | default('') | regex_replace('^/dev/', '')), true) }}"

- name: Gather VMware guest information
  community.vmware.vmware_guest_info:
    hostname: "{{ linux_upgrade_vmware_hostname }}"
    username: "{{ linux_upgrade_vmware_username }}"
    password: "{{ linux_upgrade_vmware_password }}"
    validate_certs: "{{ linux_upgrade_vmware_validate_certs }}"
    datacenter: "{{ linux_upgrade_vmware_datacenter }}"
    folder: "{{ linux_upgrade_vmware_folder | default(omit) }}"
    name: "{{ linux_upgrade_vmware_name }}"
  delegate_to: localhost
  register: _vmware_guest_info
  no_log: true
  when:
    - linux_upgrade_vm_disk_resize_real_enabled | bool
    - linux_upgrade_server_type_effective == 'vm'
    - (linux_upgrade_snapshot_provider_effective | default(linux_upgrade_vm_disk_extend_provider)) == 'vmware'

- name: Gather VMware guest disk information
  community.vmware.vmware_guest_disk_info:
    hostname: "{{ linux_upgrade_vmware_hostname }}"
    username: "{{ linux_upgrade_vmware_username }}"
    password: "{{ linux_upgrade_vmware_password }}"
    validate_certs: "{{ linux_upgrade_vmware_validate_certs }}"
    datacenter: "{{ linux_upgrade_vmware_datacenter }}"
    folder: "{{ linux_upgrade_vmware_folder | default(omit) }}"
    name: "{{ linux_upgrade_vmware_name }}"
  delegate_to: localhost
  register: _vmware_guest_disk_info
  no_log: true
  when:
    - linux_upgrade_vm_disk_resize_real_enabled | bool
    - linux_upgrade_server_type_effective == 'vm'
    - (linux_upgrade_snapshot_provider_effective | default(linux_upgrade_vm_disk_extend_provider)) == 'vmware'

- name: Resolve VMware placement facts
  set_fact:
    linux_upgrade_vmware_detected_folder: "{{ _vmware_guest_info.instance.hw_folder | default(linux_upgrade_vmware_folder | default('')) }}"
    linux_upgrade_vmware_detected_datastore: "{{ (_vmware_guest_info.instance.hw_datastores | default([]) | first) | default('') }}"
    linux_upgrade_vmware_detected_cluster: "{{ _vmware_guest_info.instance.hw_esxi_host | default('') }}"
  when:
    - _vmware_guest_info is defined
    - _vmware_guest_info.instance is defined

- name: Resolve VMware target disk size in GiB
  set_fact:
    linux_upgrade_vmware_target_disk_size_gb: >-
      {{
        (((_vmware_guest_disk_info.guest_disk_info | default({})).values() | list | first).capacity_in_kb | default(0) | int // 1024 // 1024)
        + (linux_upgrade_vm_disk_extend_size_gb | int)
      }}
  when:
    - _vmware_guest_disk_info is defined
    - (_vmware_guest_disk_info.guest_disk_info | default({})) | length > 0

- name: Resize VMware guest disk
  community.vmware.vmware_guest_disk:
    hostname: "{{ linux_upgrade_vmware_hostname }}"
    username: "{{ linux_upgrade_vmware_username }}"
    password: "{{ linux_upgrade_vmware_password }}"
    validate_certs: "{{ linux_upgrade_vmware_validate_certs }}"
    datacenter: "{{ linux_upgrade_vmware_datacenter }}"
    folder: "{{ linux_upgrade_vmware_detected_folder | default(linux_upgrade_vmware_folder | default(omit)) }}"
    name: "{{ linux_upgrade_vmware_name }}"
    disk:
      - controller_number: "{{ linux_upgrade_vmware_disk_controller_number | int }}"
        unit_number: "{{ linux_upgrade_vmware_disk_unit_number | int }}"
        size_gb: "{{ linux_upgrade_vmware_target_disk_size_gb | int }}"
        state: present
  delegate_to: localhost
  register: _vmware_disk_resize
  no_log: true
  when:
    - linux_upgrade_vm_disk_resize_real_enabled | bool
    - linux_upgrade_server_type_effective == 'vm'
    - (linux_upgrade_snapshot_provider_effective | default(linux_upgrade_vm_disk_extend_provider)) == 'vmware'
    - linux_upgrade_vmware_target_disk_size_gb is defined

- name: Gather OpenStack server info
  openstack.cloud.server_info:
    cloud: "{{ linux_upgrade_openstack_cloud }}"
    server: "{{ linux_upgrade_openstack_server }}"
  delegate_to: localhost
  register: _openstack_server_info
  when:
    - linux_upgrade_vm_disk_resize_real_enabled | bool
    - linux_upgrade_server_type_effective == 'vm'
    - (linux_upgrade_snapshot_provider_effective | default(linux_upgrade_vm_disk_extend_provider)) == 'openstack'

- name: Gather OpenStack volume info
  openstack.cloud.volume_info:
    cloud: "{{ linux_upgrade_openstack_cloud }}"
  delegate_to: localhost
  register: _openstack_volume_info
  when:
    - linux_upgrade_vm_disk_resize_real_enabled | bool
    - linux_upgrade_server_type_effective == 'vm'
    - (linux_upgrade_snapshot_provider_effective | default(linux_upgrade_vm_disk_extend_provider)) == 'openstack'

- name: Resolve OpenStack attached target volume
  set_fact:
    linux_upgrade_openstack_volume_id_effective: >-
      {{
        linux_upgrade_openstack_volume_id
        if (linux_upgrade_openstack_volume_id | default('') | length > 0)
        else
        (
          _openstack_volume_info.volumes
          | selectattr('attachments', 'defined')
          | selectattr('attachments', 'ne', [])
          | selectattr('attachments.0.server_id', 'equalto', (_openstack_server_info.servers | first).id)
          | map(attribute='id')
          | list
          | first
          | default('')
        )
      }}
    linux_upgrade_openstack_current_volume_size: >-
      {{
        (
          _openstack_volume_info.volumes
          | selectattr('id', 'equalto',
              (
                linux_upgrade_openstack_volume_id
                if (linux_upgrade_openstack_volume_id | default('') | length > 0)
                else (
                  _openstack_volume_info.volumes
                  | selectattr('attachments', 'defined')
                  | selectattr('attachments', 'ne', [])
                  | selectattr('attachments.0.server_id', 'equalto', (_openstack_server_info.servers | first).id)
                  | map(attribute='id')
                  | list
                  | first
                  | default('')
                )
              )
            )
          | map(attribute='size')
          | list
          | first
          | default(0)
        )
      }}
  when:
    - _openstack_server_info is defined
    - (_openstack_server_info.servers | default([])) | length > 0
    - _openstack_volume_info is defined

- name: Resize OpenStack volume
  openstack.cloud.volume:
    cloud: "{{ linux_upgrade_openstack_cloud }}"
    state: present
    id: "{{ linux_upgrade_openstack_volume_id_effective }}"
    size: "{{ (linux_upgrade_openstack_current_volume_size | int) + (linux_upgrade_vm_disk_extend_size_gb | int) }}"
    wait: true
  delegate_to: localhost
  register: _openstack_volume_resize
  when:
    - linux_upgrade_vm_disk_resize_real_enabled | bool
    - linux_upgrade_server_type_effective == 'vm'
    - (linux_upgrade_snapshot_provider_effective | default(linux_upgrade_vm_disk_extend_provider)) == 'openstack'
    - linux_upgrade_openstack_volume_id_effective | default('') | length > 0

- name: Gather Proxmox VM info
  community.proxmox.proxmox_vm_info:
    api_host: "{{ linux_upgrade_proxmox_api_host }}"
    api_user: "{{ linux_upgrade_proxmox_api_user }}"
    api_password: "{{ linux_upgrade_proxmox_api_password }}"
    validate_certs: "{{ linux_upgrade_proxmox_api_validate_certs }}"
    vmid: "{{ linux_upgrade_proxmox_vmid }}"
  delegate_to: localhost
  register: _proxmox_vm_info
  no_log: true
  when:
    - linux_upgrade_vm_disk_resize_real_enabled | bool
    - linux_upgrade_server_type_effective == 'vm'
    - (linux_upgrade_snapshot_provider_effective | default(linux_upgrade_vm_disk_extend_provider)) == 'proxmox'

- name: Resolve Proxmox node and storage facts
  set_fact:
    linux_upgrade_proxmox_node_effective: "{{ linux_upgrade_proxmox_node if (linux_upgrade_proxmox_node | default('') | length > 0) else ((_proxmox_vm_info.proxmox_vms | first).node | default('')) }}"
    linux_upgrade_proxmox_storage_effective: "{{ ((_proxmox_vm_info.proxmox_vms | first).disks[linux_upgrade_proxmox_disk_name].storage | default('')) if ((_proxmox_vm_info.proxmox_vms | first).disks is defined and linux_upgrade_proxmox_disk_name in (_proxmox_vm_info.proxmox_vms | first).disks) else '' }}"
  when:
    - _proxmox_vm_info is defined
    - (_proxmox_vm_info.proxmox_vms | default([])) | length > 0

- name: Resize Proxmox disk
  community.proxmox.proxmox_disk:
    api_host: "{{ linux_upgrade_proxmox_api_host }}"
    api_user: "{{ linux_upgrade_proxmox_api_user }}"
    api_password: "{{ linux_upgrade_proxmox_api_password }}"
    validate_certs: "{{ linux_upgrade_proxmox_api_validate_certs }}"
    node: "{{ linux_upgrade_proxmox_node_effective }}"
    vmid: "{{ linux_upgrade_proxmox_vmid }}"
    disk: "{{ linux_upgrade_proxmox_disk_name }}"
    size: "+{{ linux_upgrade_vm_disk_extend_size_gb | int }}G"
    state: resized
  delegate_to: localhost
  register: _proxmox_disk_resize
  no_log: true
  when:
    - linux_upgrade_vm_disk_resize_real_enabled | bool
    - linux_upgrade_server_type_effective == 'vm'
    - (linux_upgrade_snapshot_provider_effective | default(linux_upgrade_vm_disk_extend_provider)) == 'proxmox'
    - linux_upgrade_proxmox_node_effective | default('') | length > 0

- name: Rescan SCSI buses after VM disk resize
  shell: "for host in /sys/class/scsi_host/host*; do echo '- - -' > $host/scan; done"
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_vm_disk_rescan_enabled | bool
    - linux_upgrade_vm_disk_resize_real_enabled | bool
    - linux_upgrade_server_type_effective == 'vm'

- name: Write VM disk resize provider report
  copy:
    dest: "{{ linux_upgrade_capacity_report_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "provider": "{{ linux_upgrade_snapshot_provider_effective | default(linux_upgrade_vm_disk_extend_provider | default('unknown')) }}",
        "server_type": "{{ linux_upgrade_server_type_effective | default('unknown') }}",
        "vmware_detected_folder": "{{ linux_upgrade_vmware_detected_folder | default('') }}",
        "vmware_detected_datastore": "{{ linux_upgrade_vmware_detected_datastore | default('') }}",
        "vmware_detected_cluster": "{{ linux_upgrade_vmware_detected_cluster | default('') }}",
        "openstack_volume_id": "{{ linux_upgrade_openstack_volume_id_effective | default('') }}",
        "proxmox_node": "{{ linux_upgrade_proxmox_node_effective | default('') }}",
        "proxmox_storage": "{{ linux_upgrade_proxmox_storage_effective | default('') }}",
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
  when:
    - linux_upgrade_vm_disk_resize_real_enabled | bool
    - linux_upgrade_server_type_effective == 'vm'
