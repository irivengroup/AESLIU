- name: Build local filesystem rollback capability report
  copy:
    dest: "{{ linux_upgrade_local_fs_rollback_report_file }}"
    mode: "0640"
    content: |
      {
        "lvm_snapshot_enabled": {{ 'true' if linux_upgrade_lvm_snapshot_enabled else 'false' }},
        "btrfs_snapshot_enabled": {{ 'true' if linux_upgrade_btrfs_snapshot_enabled else 'false' }},
        "zfs_snapshot_enabled": {{ 'true' if linux_upgrade_zfs_snapshot_enabled else 'false' }},
        "filesystem_snapshot_report_file": "{{ linux_upgrade_filesystem_snapshot_report_file }}",
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
  when: linux_upgrade_local_fs_rollback_enabled | bool

- name: Revert LVM snapshot branch
  debug:
    msg: "LVM local rollback branch available"
  when:
    - linux_upgrade_local_fs_rollback_enabled | bool
    - linux_upgrade_lvm_snapshot_enabled | bool

- name: Revert btrfs snapshot branch
  debug:
    msg: "btrfs local rollback branch available"
  when:
    - linux_upgrade_local_fs_rollback_enabled | bool
    - linux_upgrade_btrfs_snapshot_enabled | bool

- name: Revert zfs snapshot branch
  debug:
    msg: "zfs local rollback branch available"
  when:
    - linux_upgrade_local_fs_rollback_enabled | bool
    - linux_upgrade_zfs_snapshot_enabled | bool
