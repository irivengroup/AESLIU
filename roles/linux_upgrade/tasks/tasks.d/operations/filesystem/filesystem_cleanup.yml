- name: Clean package manager caches
  shell: |
    if command -v dnf >/dev/null 2>&1; then dnf clean all; fi
    if command -v yum >/dev/null 2>&1; then yum clean all; fi
    if command -v apt-get >/dev/null 2>&1; then apt-get clean; fi
    if command -v zypper >/dev/null 2>&1; then zypper clean --all; fi
  changed_when: true

- name: Vacuum journald
  command: "journalctl --vacuum-time={{ linux_upgrade_filesystem_cleanup_journal_vacuum_time }}"
  changed_when: true
  failed_when: false
  when: linux_upgrade_filesystem_cleanup_journal_enabled | bool

- name: Clean /tmp and /var/tmp old files
  shell: |
    find /tmp -xdev -type f -mtime +7 -delete 2>/dev/null || true
    find /var/tmp -xdev -type f -mtime +7 -delete 2>/dev/null || true
  changed_when: true
  when: linux_upgrade_filesystem_cleanup_tmp_enabled | bool
