- name: Extend VM disk on VMware
  debug:
    msg: "VMware disk extension requested for {{ linux_upgrade_vm_disk_extend_disk_name | default('default-disk') }} by {{ linux_upgrade_vm_disk_extend_size_gb }} GiB"
  when:
    - linux_upgrade_capacity_management_enabled | bool
    - linux_upgrade_vm_disk_extend_enabled | bool
    - linux_upgrade_server_type_effective == 'vm'
    - (linux_upgrade_snapshot_provider_effective | default(linux_upgrade_vm_disk_extend_provider)) == 'vmware'

- name: Extend VM disk on OpenStack
  debug:
    msg: "OpenStack disk extension requested by {{ linux_upgrade_vm_disk_extend_size_gb }} GiB"
  when:
    - linux_upgrade_capacity_management_enabled | bool
    - linux_upgrade_vm_disk_extend_enabled | bool
    - linux_upgrade_server_type_effective == 'vm'
    - (linux_upgrade_snapshot_provider_effective | default(linux_upgrade_vm_disk_extend_provider)) == 'openstack'

- name: Extend VM disk on Proxmox
  debug:
    msg: "Proxmox disk extension requested by {{ linux_upgrade_vm_disk_extend_size_gb }} GiB"
  when:
    - linux_upgrade_capacity_management_enabled | bool
    - linux_upgrade_vm_disk_extend_enabled | bool
    - linux_upgrade_server_type_effective == 'vm'
    - (linux_upgrade_snapshot_provider_effective | default(linux_upgrade_vm_disk_extend_provider)) == 'proxmox'

- name: Resize partition table for root disk
  shell: |
    if command -v growpart >/dev/null 2>&1; then
      rootdev=$(findmnt -n -o SOURCE /)
      disk=$(lsblk -ndo PKNAME "$rootdev" 2>/dev/null | head -n1)
      part=$(echo "$rootdev" | grep -o '[0-9]\+$' || true)
      if [ -n "$disk" ] && [ -n "$part" ]; then
        growpart /dev/$disk $part || true
      fi
    fi
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_capacity_management_enabled | bool
    - linux_upgrade_partition_extend_enabled | bool
    - linux_upgrade_capacity_candidates | default([]) | length > 0

- name: Extend LVM logical volume for root
  shell: |
    rootdev=$(findmnt -n -o SOURCE /)
    if echo "$rootdev" | grep -q '^/dev/mapper/'; then
      lvextend -r -l {{ linux_upgrade_lvm_auto_extend_percent_free }} "$rootdev" || true
    fi
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_capacity_management_enabled | bool
    - linux_upgrade_lvm_auto_extend_enabled | bool
    - linux_upgrade_capacity_candidates | default([]) | length > 0

- name: Extend ext filesystems if needed
  shell: |
    rootdev=$(findmnt -n -o SOURCE /)
    resize2fs "$rootdev" || true
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_capacity_management_enabled | bool
    - linux_upgrade_filesystem_auto_extend_enabled | bool
    - (ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='fstype') | list | first) in ['ext2','ext3','ext4']
    - linux_upgrade_capacity_candidates | default([]) | length > 0

- name: Extend xfs filesystems if needed
  command: xfs_growfs /
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_capacity_management_enabled | bool
    - linux_upgrade_filesystem_auto_extend_enabled | bool
    - (ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='fstype') | list | first) == 'xfs'
    - linux_upgrade_capacity_candidates | default([]) | length > 0
