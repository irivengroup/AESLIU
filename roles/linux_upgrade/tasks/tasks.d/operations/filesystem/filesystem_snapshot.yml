- name: Detect root mount source
  command: findmnt -n -o SOURCE /
  register: _root_source
  changed_when: false
  failed_when: false

- name: Create LVM snapshot for root LV
  shell: |
    lvcreate -L {{ linux_upgrade_lvm_snapshot_size }} -s -n {{ linux_upgrade_lvm_snapshot_name_prefix }}_root {{ _root_source.stdout }}
  register: _lvm_snapshot
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_lvm_snapshot_enabled | bool
    - _root_source.stdout is defined
    - _root_source.stdout.startswith('/dev/')

- name: Create btrfs snapshot
  shell: |
    mkdir -p {{ linux_upgrade_btrfs_snapshot_dir }}
    btrfs subvolume snapshot / {{ linux_upgrade_btrfs_snapshot_dir }}/{{ linux_upgrade_lvm_snapshot_name_prefix }}-root
  register: _btrfs_snapshot
  changed_when: true
  failed_when: false
  when: linux_upgrade_btrfs_snapshot_enabled | bool

- name: Create ZFS snapshot
  shell: |
    zfs snapshot {{ linux_upgrade_zfs_dataset }}@{{ linux_upgrade_lvm_snapshot_name_prefix }}-root
  register: _zfs_snapshot
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_zfs_snapshot_enabled | bool
    - linux_upgrade_zfs_dataset | length > 0

- name: Write filesystem snapshot report
  copy:
    dest: "{{ linux_upgrade_filesystem_snapshot_report_file }}"
    mode: "0640"
    content: |
      {
        "root_source": "{{ _root_source.stdout | default('') }}",
        "lvm_snapshot": {{ (_lvm_snapshot.stdout | default('')) | to_json }},
        "btrfs_snapshot": {{ (_btrfs_snapshot.stdout | default('')) | to_json }},
        "zfs_snapshot": {{ (_zfs_snapshot.stdout | default('')) | to_json }},
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
