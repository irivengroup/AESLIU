- name: Resolve target mounts for advanced storage resize
  set_fact:
    linux_upgrade_storage_resize_targets_effective: >-
      {{
        linux_upgrade_storage_resize_target_mounts
        if (linux_upgrade_storage_allow_non_root_resize | bool)
        else ['/']
      }}

- name: Collect findmnt for resize targets
  shell: "findmnt -J -o TARGET,SOURCE,FSTYPE,OPTIONS {{ item }}"
  loop: "{{ linux_upgrade_storage_resize_targets_effective }}"
  register: _resize_findmnt
  changed_when: false
  failed_when: false
  when: linux_upgrade_storage_resize_advanced_enabled | bool

- name: Collect multipath layout
  shell: "multipath -ll 2>/dev/null || true"
  register: _resize_multipath
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_storage_resize_advanced_enabled | bool
    - linux_upgrade_storage_multipath_enabled | bool

- name: Collect mdraid layout
  shell: "cat /proc/mdstat 2>/dev/null || true"
  register: _resize_mdraid
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_storage_resize_advanced_enabled | bool
    - linux_upgrade_storage_mdraid_enabled | bool

- name: Collect LUKS layout
  shell: "lsblk -o NAME,TYPE,FSTYPE,MOUNTPOINT | grep -i crypt || true"
  register: _resize_luks
  changed_when: false
  failed_when: false
  when:
    - linux_upgrade_storage_resize_advanced_enabled | bool
    - linux_upgrade_storage_luks_enabled | bool

- name: Collect supported bus classes
  shell: |
    {
      echo "[nvme]"
      ls /dev/nvme*n* 2>/dev/null || true
      echo "[virtio]"
      ls /dev/vd* 2>/dev/null || true
      echo "[scsi]"
      ls /dev/sd* 2>/dev/null || true
    }
  register: _resize_bus_classes
  changed_when: false
  failed_when: false
  when: linux_upgrade_storage_resize_advanced_enabled | bool

- name: Simulate storage resize plan
  copy:
    dest: "{{ linux_upgrade_storage_resize_report_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "simulation_only": {{ 'true' if linux_upgrade_storage_simulation_enabled else 'false' }},
        "targets": {{ linux_upgrade_storage_resize_targets_effective | to_json }},
        "findmnt": {{ (_resize_findmnt.results | default([])) | to_json }},
        "multipath": {{ (_resize_multipath.stdout | default('')) | to_json }},
        "mdraid": {{ (_resize_mdraid.stdout | default('')) | to_json }},
        "luks": {{ (_resize_luks.stdout | default('')) | to_json }},
        "bus_classes": {{ (_resize_bus_classes.stdout | default('')) | to_json }},
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
  when: linux_upgrade_storage_resize_advanced_enabled | bool

- name: Rescan NVMe namespaces
  shell: |
    for dev in /sys/class/nvme/nvme*; do
      [ -e "$dev/rescan_controller" ] && echo 1 > "$dev/rescan_controller" || true
    done
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_storage_resize_advanced_enabled | bool
    - not linux_upgrade_storage_simulation_enabled | bool
    - linux_upgrade_storage_nvme_support_enabled | bool

- name: Rescan SCSI hosts
  shell: "for host in /sys/class/scsi_host/host*; do echo '- - -' > $host/scan; done"
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_storage_resize_advanced_enabled | bool
    - not linux_upgrade_storage_simulation_enabled | bool
    - linux_upgrade_storage_scsi_support_enabled | bool

- name: Reload multipath maps
  shell: "multipathd reconfigure 2>/dev/null || true"
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_storage_resize_advanced_enabled | bool
    - not linux_upgrade_storage_simulation_enabled | bool
    - linux_upgrade_storage_multipath_enabled | bool

- name: Grow partitions with growpart on targets
  shell: |
    src=$(findmnt -n -o SOURCE {{ item }})
    disk=$(lsblk -ndo PKNAME "$src" 2>/dev/null | head -n1)
    part=$(echo "$src" | grep -o '[0-9]\+$' || true)
    if command -v growpart >/dev/null 2>&1 && [ -n "$disk" ] && [ -n "$part" ]; then
      growpart /dev/$disk $part || true
    fi
  loop: "{{ linux_upgrade_storage_resize_targets_effective }}"
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_storage_resize_advanced_enabled | bool
    - not linux_upgrade_storage_simulation_enabled | bool

- name: pvresize underlying PVs
  shell: |
    pvs --noheadings -o pv_name 2>/dev/null | awk '{print $1}' | while read pv; do
      [ -n "$pv" ] && pvresize "$pv" || true
    done
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_storage_resize_advanced_enabled | bool
    - not linux_upgrade_storage_simulation_enabled | bool

- name: Extend non-root LVs when allowed
  shell: |
    for mnt in {{ linux_upgrade_storage_resize_targets_effective | join(' ') }}; do
      src=$(findmnt -n -o SOURCE "$mnt" 2>/dev/null || true)
      if echo "$src" | grep -q '^/dev/mapper/'; then
        lvextend -r -l 100%FREE "$src" || true
      fi
    done
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_storage_resize_advanced_enabled | bool
    - not linux_upgrade_storage_simulation_enabled | bool
    - linux_upgrade_storage_allow_non_root_resize | bool

- name: Grow ext filesystems on targets
  shell: |
    src=$(findmnt -n -o SOURCE {{ item }})
    fstype=$(findmnt -n -o FSTYPE {{ item }})
    if echo "$fstype" | grep -qE '^ext[234]$'; then
      resize2fs "$src" || true
    fi
  loop: "{{ linux_upgrade_storage_resize_targets_effective }}"
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_storage_resize_advanced_enabled | bool
    - not linux_upgrade_storage_simulation_enabled | bool

- name: Grow XFS filesystems on targets
  command: "xfs_growfs {{ item }}"
  loop: "{{ linux_upgrade_storage_resize_targets_effective }}"
  changed_when: true
  failed_when: false
  when:
    - linux_upgrade_storage_resize_advanced_enabled | bool
    - not linux_upgrade_storage_simulation_enabled | bool
