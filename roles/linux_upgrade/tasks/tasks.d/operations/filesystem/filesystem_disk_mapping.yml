- name: Collect lsblk mapping
  command: lsblk -J -o NAME,KNAME,PKNAME,TYPE,SIZE,MOUNTPOINT
  register: _lsblk_json
  changed_when: false
  failed_when: false

- name: Write VM disk mapping report
  copy:
    dest: "{{ linux_upgrade_vm_disk_mapping_report_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "target_mounts": {{ linux_upgrade_vm_disk_target_mounts | to_json }},
        "target_mount": "{{ linux_upgrade_vm_disk_target_mount }}",
        "target_mount_source": "{{ _linux_upgrade_target_mount_source.stdout | default('') if (_linux_upgrade_target_mount_source is defined) else '' }}",
        "lsblk": {{ (_lsblk_json.stdout | default('{}')) | to_json }},
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }

# Merged from filesystem_disk_mapping_deep.yml
- name: Collect detailed udev links
  shell: "ls -l /dev/disk/by-id 2>/dev/null || true"
  register: _byid_links
  changed_when: false
  failed_when: false

- name: Write deep disk mapping report
  copy:
    dest: "{{ linux_upgrade_vm_disk_target_device_map_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "by_id": {{ (_byid_links.stdout | default('')) | to_json }},
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }

- name: Collect detailed block topology
  shell: |
    lsblk -J -O
  register: _lsblk_topology_json
  changed_when: false
  failed_when: false

- name: Collect blkid details
  shell: |
    blkid -o export 2>/dev/null || true
  register: _blkid_export
  changed_when: false
  failed_when: false

- name: Collect dmsetup mapping
  shell: |
    dmsetup ls --tree 2>/dev/null || true
  register: _dmsetup_tree
  changed_when: false
  failed_when: false

- name: Collect udev by-id links
  shell: |
    ls -l /dev/disk/by-id 2>/dev/null || true
  register: _disk_byid
  changed_when: false
  failed_when: false

- name: Collect udev by-path links
  shell: |
    ls -l /dev/disk/by-path 2>/dev/null || true
  register: _disk_bypath
  changed_when: false
  failed_when: false

- name: Write enhanced OS disk mapping report
  copy:
    dest: "{{ linux_upgrade_storage_os_disk_map_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "lsblk_topology": {{ (_lsblk_topology_json.stdout | default('{}')) | to_json }},
        "blkid_export": {{ (_blkid_export.stdout | default('')) | to_json }},
        "dmsetup_tree": {{ (_dmsetup_tree.stdout | default('')) | to_json }},
        "by_id": {{ (_disk_byid.stdout | default('')) | to_json }},
        "by_path": {{ (_disk_bypath.stdout | default('')) | to_json }},
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }

- name: Write hypervisor disk mapping placeholder report
  copy:
    dest: "{{ linux_upgrade_storage_hypervisor_disk_map_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "provider": "{{ linux_upgrade_snapshot_provider_effective | default(linux_upgrade_vm_disk_extend_provider | default('unknown')) }}",
        "target_mounts": {{ linux_upgrade_storage_resize_target_mounts | to_json }},
        "note": "Populate hypervisor-to-OS disk correlation using provider facts plus by-id/by-path mapping.",
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
