- name: Build low-space mount candidates
  set_fact:
    linux_upgrade_capacity_candidates: "{{ linux_upgrade_capacity_candidates | default([]) + [ item.key ] }}"
  loop: "{{ linux_upgrade_filesystem_auto_extend_threshold_mb | dict2items }}"
  when:
    - linux_upgrade_capacity_management_enabled | bool
    - item.key in (linux_upgrade_filesystem_mounts_map | default({}))
    - ((linux_upgrade_filesystem_mounts_map[item.key].size_available | default(0) / 1024 / 1024) | int) < (item.value | int)

- name: Write capacity pre-report
  copy:
    dest: "{{ linux_upgrade_capacity_report_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "server_type": "{{ linux_upgrade_server_type_effective | default('unknown') }}",
        "candidates": {{ linux_upgrade_capacity_candidates | default([]) | to_json }},
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
  when: linux_upgrade_capacity_management_enabled | bool
