- name: Backup /etc/issue before update
  copy:
    remote_src: true
    src: /etc/issue
    dest: "{{ linux_upgrade_issue_backup_file }}"
    mode: "0600"
  failed_when: false
  when: linux_upgrade_update_issue_files_enabled | bool

- name: Backup /etc/motd before update
  copy:
    remote_src: true
    src: /etc/motd
    dest: "{{ linux_upgrade_motd_backup_file }}"
    mode: "0600"
  failed_when: false
  when: linux_upgrade_update_issue_files_enabled | bool

- name: Update /etc/issue after upgrade
  copy:
    dest: /etc/issue
    mode: "0644"
    content: "{{ linux_upgrade_issue_template }}
"
  when: linux_upgrade_update_issue_files_enabled | bool

- name: Update /etc/motd after upgrade
  copy:
    dest: /etc/motd
    mode: "0644"
    content: "{{ linux_upgrade_motd_template }}
"
  when: linux_upgrade_update_issue_files_enabled | bool
