- name: Flatten expected services from selected application profiles
  set_fact:
    linux_upgrade_post_upgrade_expected_services_effective: >-
      {{
        (
          linux_upgrade_post_upgrade_expected_services
          if (linux_upgrade_post_upgrade_expected_services | length > 0)
          else (
            linux_upgrade_application_profile_effective_bundle.values()
            | map(attribute='expected_services')
            | list
            | flatten
            | unique
          )
        )
      }}

- name: Flatten expected packages from selected application profiles
  set_fact:
    linux_upgrade_post_upgrade_expected_packages_effective: >-
      {{
        (
          linux_upgrade_post_upgrade_expected_packages
          if (linux_upgrade_post_upgrade_expected_packages | length > 0)
          else (
            linux_upgrade_application_profile_effective_bundle.values()
            | map(attribute='expected_packages')
            | list
            | flatten
            | unique
          )
        )
      }}

- name: Flatten expected files from selected application profiles
  set_fact:
    linux_upgrade_post_upgrade_expected_files_effective: >-
      {{
        (
          linux_upgrade_post_upgrade_expected_files
          if (linux_upgrade_post_upgrade_expected_files | length > 0)
          else (
            linux_upgrade_application_profile_effective_bundle.values()
            | map(attribute='expected_files')
            | list
            | flatten
            | unique
          )
        )
      }}

- name: Flatten expected commands from selected application profiles
  set_fact:
    linux_upgrade_post_upgrade_expected_commands_effective: >-
      {{
        (
          linux_upgrade_post_upgrade_expected_commands
          if (linux_upgrade_post_upgrade_expected_commands | length > 0)
          else (
            linux_upgrade_application_profile_effective_bundle.values()
            | map(attribute='expected_commands')
            | list
            | flatten
            | unique
          )
        )
      }}

- name: Gather service facts for compliance
  service_facts:

- name: Gather package facts for compliance
  package_facts:
    manager: auto

- name: Collect running kernel
  command: uname -r
  register: _compliance_kernel
  changed_when: false

- name: Collect DNS validation status
  shell: "getent hosts {{ item }}"
  loop: "{{ linux_upgrade_dns_test_hosts }}"
  register: _compliance_dns
  changed_when: false
  failed_when: false
  when: linux_upgrade_validate_dns_enabled | bool

- name: Collect NTP validation status
  shell: |
    if command -v timedatectl >/dev/null 2>&1; then
      timedatectl show -p NTPSynchronized --value
    elif command -v chronyc >/dev/null 2>&1; then
      chronyc tracking >/dev/null 2>&1 && echo yes || echo no
    else
      echo unknown
    fi
  register: _compliance_ntp
  changed_when: false
  failed_when: false
  when: linux_upgrade_validate_ntp_enabled | bool

- name: Check expected services
  assert:
    that:
      - "ansible_facts.services[item + '.service'].state | default('unknown') in ['running', 'started']"
    fail_msg: "Expected service not running: {{ item }}"
  loop: "{{ linux_upgrade_post_upgrade_expected_services_effective }}"
  register: _compliance_services
  failed_when: false
  when: linux_upgrade_post_upgrade_expected_services_effective | length > 0

- name: Check expected packages
  assert:
    that:
      - "item in ansible_facts.packages"
    fail_msg: "Expected package missing: {{ item }}"
  loop: "{{ linux_upgrade_post_upgrade_expected_packages_effective }}"
  register: _compliance_packages
  failed_when: false
  when: linux_upgrade_post_upgrade_expected_packages_effective | length > 0

- name: Check expected files
  stat:
    path: "{{ item }}"
  loop: "{{ linux_upgrade_post_upgrade_expected_files_effective }}"
  register: _compliance_files
  when: linux_upgrade_post_upgrade_expected_files_effective | length > 0

- name: Check expected commands
  shell: "{{ item }}"
  loop: "{{ linux_upgrade_post_upgrade_expected_commands_effective }}"
  register: _compliance_commands
  changed_when: false
  failed_when: false
  when: linux_upgrade_post_upgrade_expected_commands_effective | length > 0

- name: Compute simple compliance score
  set_fact:
    linux_upgrade_post_upgrade_compliance_score: >-
      {{
        100
        - ((_compliance_services.results | default([]) | selectattr('failed', 'defined') | selectattr('failed') | list | length) * 10)
        - ((_compliance_packages.results | default([]) | selectattr('failed', 'defined') | selectattr('failed') | list | length) * 10)
        - ((_compliance_files.results | default([]) | rejectattr('stat.exists', 'defined') | list | length) * 10)
        - ((_compliance_commands.results | default([]) | rejectattr('rc', 'equalto', 0) | list | length) * 10)
      }}

- name: Write post-upgrade compliance report
  copy:
    dest: "{{ linux_upgrade_post_upgrade_compliance_report_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "distribution": "{{ ansible_distribution }}",
        "distribution_version": "{{ ansible_distribution_version }}",
        "selected_profiles": {{ linux_upgrade_application_profiles_selected_effective | default([]) | to_json }},
        "kernel": {{ (_compliance_kernel.stdout | default('unknown')) | to_json }},
        "boot_mode": {{ linux_upgrade_boot_mode | to_json }},
        "dns_results": {{ (_compliance_dns.results | default([])) | to_json }},
        "ntp_result": {{ (_compliance_ntp.stdout | default('unknown')) | to_json }},
        "expected_services": {{ linux_upgrade_post_upgrade_expected_services_effective | to_json }},
        "expected_packages": {{ linux_upgrade_post_upgrade_expected_packages_effective | to_json }},
        "expected_files": {{ linux_upgrade_post_upgrade_expected_files_effective | to_json }},
        "expected_commands": {{ linux_upgrade_post_upgrade_expected_commands_effective | to_json }},
        "services_results": {{ (_compliance_services.results | default([])) | to_json }},
        "packages_results": {{ (_compliance_packages.results | default([])) | to_json }},
        "files_results": {{ (_compliance_files.results | default([])) | to_json }},
        "commands_results": {{ (_compliance_commands.results | default([])) | to_json }},
        "score": {{ linux_upgrade_post_upgrade_compliance_score | int }},
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
  when: linux_upgrade_post_upgrade_compliance_enabled | bool

- name: Enforce minimum compliance score
  assert:
    that:
      - (linux_upgrade_post_upgrade_compliance_score | int) >= (linux_upgrade_post_upgrade_min_score | int)
    fail_msg: "Post-upgrade compliance score below threshold."
  when:
    - linux_upgrade_post_upgrade_compliance_enabled | bool
    - linux_upgrade_post_upgrade_fail_on_noncompliance | bool
