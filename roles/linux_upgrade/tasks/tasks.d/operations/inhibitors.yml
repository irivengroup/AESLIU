- name: Resolve inhibitor list
  set_fact:
    linux_upgrade_inhibitors_effective: "{{ linux_upgrade_inhibitors_catalog.get(linux_upgrade_distribution_key, {}).get(linux_upgrade_source_major_version | string, []) }}"

- name: Run inhibitor remediations
  shell: "{{ item.1 }}"
  loop: "{{ linux_upgrade_inhibitors_effective | subelements('commands', skip_missing=True) }}"
  register: _inhibitors_exec
  changed_when: true
  failed_when: false
  when: linux_upgrade_inhibitors_effective | length > 0

- name: Write inhibitors report
  copy:
    dest: "{{ linux_upgrade_inhibitors_report_file }}"
    mode: "0640"
    content: "{{ {'applied': linux_upgrade_inhibitors_effective, 'results': _inhibitors_exec.results | default([])} | to_nice_json }}"
