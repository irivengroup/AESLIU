- name: Validate package manager works
  shell: |
    if command -v dnf >/dev/null 2>&1; then dnf -q repolist; exit $?; fi
    if command -v yum >/dev/null 2>&1; then yum -q repolist; exit $?; fi
    if command -v apt-get >/dev/null 2>&1; then apt-get update -qq; exit $?; fi
    if command -v zypper >/dev/null 2>&1; then zypper -q refresh; exit $?; fi
  changed_when: false

- name: Validate network interface exists
  assert:
    that:
      - ansible_default_ipv4.interface is defined

- name: Run application post checks
  shell: "{{ item }}"
  loop: "{{ linux_upgrade_application_post_checks }}"
  changed_when: false
  when: linux_upgrade_application_post_checks | length > 0

- name: Auto rollback on boot failure conditions
  include_tasks: rollback.yml
  when:
    - linux_upgrade_auto_rollback_on_boot_failure | bool
    - false
