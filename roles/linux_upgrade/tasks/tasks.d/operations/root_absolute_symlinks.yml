- name: Find root-level symlinks
  find:
    paths: /
    file_type: link
    depth: 1
    recurse: false
  register: _root_symlinks
  when: linux_upgrade_manage_root_absolute_symlinks | bool

- name: Read symlink targets
  shell: "readlink {{ item.path | quote }}"
  loop: "{{ _root_symlinks.files | default([]) }}"
  register: _root_symlink_targets
  changed_when: false
  when: linux_upgrade_manage_root_absolute_symlinks | bool

- name: Build absolute root symlink inventory
  set_fact:
    linux_upgrade_root_absolute_symlinks_effective: "{{ linux_upgrade_root_absolute_symlinks_effective | default([]) + [ {'path': item.item.path, 'target': item.stdout, 'backup_path': item.item.path ~ linux_upgrade_root_absolute_symlinks_backup_suffix} ] }}"
  loop: "{{ _root_symlink_targets.results | default([]) }}"
  when:
    - linux_upgrade_manage_root_absolute_symlinks | bool
    - item.stdout is defined
    - item.stdout | regex_search('^/')

- name: Save root absolute symlink inventory
  copy:
    dest: "{{ linux_upgrade_root_absolute_symlinks_inventory_file }}"
    mode: "0640"
    content: "{{ (linux_upgrade_root_absolute_symlinks_effective | default([])) | to_nice_json }}"
  when: linux_upgrade_manage_root_absolute_symlinks | bool

- name: Rename absolute root symlinks before upgrade
  command: "mv {{ item.path | quote }} {{ item.backup_path | quote }}"
  loop: "{{ linux_upgrade_root_absolute_symlinks_effective | default([]) }}"
  when:
    - linux_upgrade_manage_root_absolute_symlinks | bool
    - linux_upgrade_root_absolute_symlinks_phase == 'pre'

- name: Restore absolute root symlinks after upgrade
  command: "mv {{ item.backup_path | quote }} {{ item.path | quote }}"
  loop: "{{ linux_upgrade_root_absolute_symlinks_effective | default([]) }}"
  when:
    - linux_upgrade_manage_root_absolute_symlinks | bool
    - linux_upgrade_root_absolute_symlinks_phase == 'post'
