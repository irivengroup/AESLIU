- name: Collect yum repo files
  find:
    paths: /etc/yum.repos.d
    patterns: "*.repo"
  register: _yum_repo_files
  when:
    - linux_upgrade_disable_third_party_repos_before_upgrade | bool
    - ansible_os_family == 'RedHat'

- name: Disable third-party yum repos before upgrade
  replace:
    path: "{{ item.path }}"
    regexp: '^(enabled\s*=\s*)1$'
    replace: '\g<1>0'
  loop: "{{ _yum_repo_files.files | default([]) }}"
  when:
    - linux_upgrade_disable_third_party_repos_before_upgrade | bool
    - ansible_os_family == 'RedHat'
    - linux_upgrade_repo_phase == 'pre'
    - not ((item.path | lower) is search((linux_upgrade_repo_disable_allowlist | join('|')) | lower))

- name: Re-enable yum repos after upgrade when matching managed/internal patterns
  replace:
    path: "{{ item.path }}"
    regexp: '^(enabled\s*=\s*)0$'
    replace: '\g<1>1'
  loop: "{{ _yum_repo_files.files | default([]) }}"
  when:
    - linux_upgrade_disable_third_party_repos_before_upgrade | bool
    - ansible_os_family == 'RedHat'
    - linux_upgrade_repo_phase == 'post'
    - ((item.path | lower) is search((linux_upgrade_repo_disable_allowlist | join('|')) | lower))

- name: Collect apt source files
  find:
    paths:
      - /etc/apt
      - /etc/apt/sources.list.d
    patterns: "*.list,*.sources,sources.list"
    use_regex: false
  register: _apt_repo_files
  when:
    - linux_upgrade_disable_third_party_repos_before_upgrade | bool
    - ansible_os_family == 'Debian'

- name: Comment third-party apt repos before upgrade
  replace:
    path: "{{ item.path }}"
    regexp: '^(deb\s+https?://(?!.*({{ linux_upgrade_repo_disable_allowlist | join("|") }})).*)$'
    replace: '# linux-upgrade disabled: \1'
  loop: "{{ _apt_repo_files.files | default([]) }}"
  when:
    - linux_upgrade_disable_third_party_repos_before_upgrade | bool
    - ansible_os_family == 'Debian'
    - linux_upgrade_repo_phase == 'pre'
  failed_when: false

- name: Restore disabled apt repos after upgrade
  replace:
    path: "{{ item.path }}"
    regexp: '^# linux-upgrade disabled: (deb\s+https?://.*)$'
    replace: '\1'
  loop: "{{ _apt_repo_files.files | default([]) }}"
  when:
    - linux_upgrade_disable_third_party_repos_before_upgrade | bool
    - ansible_os_family == 'Debian'
    - linux_upgrade_repo_phase == 'post'
  failed_when: false

- name: Collect zypper repo files
  find:
    paths: /etc/zypp/repos.d
    patterns: "*.repo"
  register: _zypper_repo_files
  when:
    - linux_upgrade_disable_third_party_repos_before_upgrade | bool
    - ansible_os_family == 'Suse'

- name: Disable third-party zypper repos before upgrade
  replace:
    path: "{{ item.path }}"
    regexp: '^(enabled\s*=\s*)1$'
    replace: '\g<1>0'
  loop: "{{ _zypper_repo_files.files | default([]) }}"
  when:
    - linux_upgrade_disable_third_party_repos_before_upgrade | bool
    - ansible_os_family == 'Suse'
    - linux_upgrade_repo_phase == 'pre'
    - not ((item.path | lower) is search((linux_upgrade_repo_disable_allowlist | join('|')) | lower))

- name: Re-enable zypper repos after upgrade when matching managed/internal patterns
  replace:
    path: "{{ item.path }}"
    regexp: '^(enabled\s*=\s*)0$'
    replace: '\g<1>1'
  loop: "{{ _zypper_repo_files.files | default([]) }}"
  when:
    - linux_upgrade_disable_third_party_repos_before_upgrade | bool
    - ansible_os_family == 'Suse'
    - linux_upgrade_repo_phase == 'post'
    - ((item.path | lower) is search((linux_upgrade_repo_disable_allowlist | join('|')) | lower))

- name: Write third-party repo report
  copy:
    dest: "{{ linux_upgrade_third_party_repo_report_file }}"
    mode: "0640"
    content: |
      {
        "host": "{{ inventory_hostname }}",
        "phase": "{{ linux_upgrade_repo_phase }}",
        "allowlist": {{ linux_upgrade_repo_disable_allowlist | to_json }},
        "generated_at": "{{ ansible_date_time.iso8601 }}"
      }
  when: linux_upgrade_disable_third_party_repos_before_upgrade | bool


- name: Resolve versioned repo profile for OS family and major version
  set_fact:
    linux_upgrade_repo_profile_versioned: >-
      {{
        linux_upgrade_repo_profiles_by_major_version.get(linux_upgrade_distribution_key, {}).get(
          ((linux_upgrade_source_major_version if linux_upgrade_repo_phase == 'pre' else linux_upgrade_target_major_version) | string), {}
        )
      }}
  when: linux_upgrade_internal_repositories_enabled | bool

- name: Resolve repo profile major version
  set_fact:
    linux_upgrade_repo_major_version_effective: "{{ (linux_upgrade_source_major_version if linux_upgrade_repo_phase == 'pre' else linux_upgrade_target_major_version) | string }}"
    linux_upgrade_repo_profile: "{{ linux_upgrade_internal_repo_profiles.get(linux_upgrade_distribution_key, {}).get(((linux_upgrade_source_major_version if linux_upgrade_repo_phase == 'pre' else linux_upgrade_target_major_version) | string), {}) }}"
  when: linux_upgrade_internal_repositories_enabled | bool

- name: Run pre disable commands
  shell: "{{ item }}"
  loop: "{{ linux_upgrade_repo_profile.get('pre', {}).get('disable_commands', []) }}"
  changed_when: true
  when:
    - linux_upgrade_internal_repositories_enabled | bool
    - linux_upgrade_repo_phase == 'pre'

- name: Configure yum repo from profile
  copy:
    dest: /etc/yum.repos.d/artifactory-linux-upgrade.repo
    content: "{{ linux_upgrade_repo_profile.get('post', {}).get('artifactory_yum_repo_content', '') }}"
    mode: "0644"
  when:
    - linux_upgrade_internal_repositories_enabled | bool
    - linux_upgrade_repo_phase == 'post'
    - ansible_os_family == 'RedHat'
    - linux_upgrade_repo_profile.get('post', {}).get('artifactory_yum_repo_content', '') | length > 0

- name: Configure apt repo from profile
  apt_repository:
    repo: "{{ linux_upgrade_repo_profile.get('post', {}).get('artifactory_apt_repo_line', '') }}"
    filename: linux-upgrade-artifactory
    state: present
  when:
    - linux_upgrade_internal_repositories_enabled | bool
    - linux_upgrade_repo_phase == 'post'
    - ansible_os_family == 'Debian'
    - linux_upgrade_repo_profile.get('post', {}).get('artifactory_apt_repo_line', '') | length > 0

- name: Refresh zypper repos
  command: zypper --gpg-auto-import-keys refresh
  changed_when: true
  when:
    - linux_upgrade_internal_repositories_enabled | bool
    - linux_upgrade_repo_phase == 'post'
    - ansible_os_family == 'Suse'
