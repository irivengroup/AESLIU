- name: Include advanced prechecks
  include_tasks: platform/prechecks_advanced.yml
  when: linux_upgrade_prechecks_advanced_enabled | bool


- name: Validate declared command lists against blocked patterns
  assert:
    that:
      - item.1 is not search(item.0)
    fail_msg: "Blocked shell pattern detected in declared commands: {{ item.0 }}"
  loop: "{{ linux_upgrade_shell_blocked_patterns | product((linux_upgrade_cluster_pre_drain_commands + linux_upgrade_cluster_post_activate_commands + linux_upgrade_middleware_pre_commands + linux_upgrade_middleware_post_commands + linux_upgrade_pre_final_checks_commands + linux_upgrade_post_final_checks_commands + linux_upgrade_maintenance_mode_pre_commands + linux_upgrade_maintenance_mode_post_commands)) | list }}"
  when:
    - linux_upgrade_shell_guard_enabled | bool
    - linux_upgrade_hardening_enabled | bool

- name: Check root filesystem free space
  assert:
    that:
      - (ansible_mounts | selectattr('mount','equalto','/') | list | first).size_available > 2147483648
    fail_msg: "Not enough free space on root filesystem."

- name: Ensure package manager not locked on Debian family
  shell: "fuser /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock 2>/dev/null || true"
  register: _dpkg_lock
  changed_when: false
  when: ansible_os_family == 'Debian'

- name: Auto remediate dpkg lock by waiting a short time
  wait_for:
    path: /var/lib/dpkg/lock-frontend
    state: absent
    timeout: 60
  when:
    - ansible_os_family == 'Debian'
    - _dpkg_lock.stdout | length > 0

- name: Gather active services health baseline
  service_facts:

- name: Ensure NetworkManager present if configured
  command: nmcli --version
  changed_when: false
  failed_when: false
  when: linux_upgrade_networkmanager_realign_profiles | bool

- name: Include kernel module checks
  include_tasks: platform/kernel_modules.yml
  when: linux_upgrade_detect_kernel_modules_enabled | bool

- name: Include repo TLS checks
  include_tasks: platform/repo_tls.yml
  when: linux_upgrade_repo_tls_validation_enabled | bool
