- name: Remove old kernels on RHEL-like
  shell: "package-cleanup --oldkernels --count={{ linux_upgrade_keep_kernel_count }} -y || true"
  changed_when: true
  when:
    - linux_upgrade_cleanup_enabled | bool
    - linux_upgrade_remove_old_kernels | bool
    - ansible_os_family == 'RedHat'

- name: Autoremove packages on Debian family
  apt:
    autoremove: true
    purge: true
  when:
    - linux_upgrade_cleanup_enabled | bool
    - ansible_os_family == 'Debian'

- name: Remove orphan packages on SLES
  shell: "zypper packages --orphaned && zypper remove -y $(zypper packages --orphaned | awk 'NR>4 {print $5}') || true"
  changed_when: true
  when:
    - linux_upgrade_cleanup_enabled | bool
    - ansible_os_family == 'Suse'

- name: Clean package caches
  shell: |
    if command -v dnf >/dev/null 2>&1; then dnf clean all; fi
    if command -v yum >/dev/null 2>&1; then yum clean all; fi
    if command -v apt-get >/dev/null 2>&1; then apt-get clean; fi
    if command -v zypper >/dev/null 2>&1; then zypper clean --all; fi
  changed_when: true
  when: linux_upgrade_cleanup_enabled | bool
