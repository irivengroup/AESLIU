linux_upgrade_inhibitors_catalog:
  RedHat:
    "7":
      - name: leapp-answerfile
        commands:
          - "mkdir -p /var/log/leapp"
          - "test -f /var/log/leapp/answerfile || touch /var/log/leapp/answerfile"
      - name: pam-pkcs11
        commands:
          - "grep -rl 'pam_pkcs11' /etc/pam.d 2>/dev/null | xargs -r sed -i '/pam_pkcs11/d'"
      - name: yum-versionlock
        commands:
          - "yum versionlock clear || true"
    "8":
      - name: leapp-answerfile
        commands:
          - "mkdir -p /var/log/leapp"
          - "test -f /var/log/leapp/answerfile || touch /var/log/leapp/answerfile"
      - name: old-kernels
        commands:
          - "package-cleanup --oldkernels --count={{ linux_upgrade_keep_kernel_count }} -y || true"
  Debian:
    "10":
      - name: dpkg-fix
        commands:
          - "dpkg --configure -a || true"
          - "apt-get -f install -y || true"
          - "apt-mark showhold | xargs -r apt-mark unhold || true"
    "11":
      - name: dpkg-fix
        commands:
          - "dpkg --configure -a || true"
          - "apt-get -f install -y || true"
          - "apt-mark showhold | xargs -r apt-mark unhold || true"
  Ubuntu:
    "18":
      - name: release-upgrader-prompt
        commands:
          - "sed -i 's/^Prompt=.*/Prompt=lts/' /etc/update-manager/release-upgrades || true"
          - "dpkg --configure -a || true"
          - "apt-get -f install -y || true"
          - "apt-mark showhold | xargs -r apt-mark unhold || true"
    "20":
      - name: release-upgrader-prompt
        commands:
          - "sed -i 's/^Prompt=.*/Prompt=lts/' /etc/update-manager/release-upgrades || true"
          - "dpkg --configure -a || true"
          - "apt-get -f install -y || true"
  SLES:
    "10":
      - name: zypper-locks
        commands:
          - "zypper ll || true"
          - "zypper rl $(zypper ll -s | awk 'NR>2 {print $3}') || true"
    "12":
      - name: zypper-locks
        commands:
          - "zypper ll || true"
          - "zypper rl $(zypper ll -s | awk 'NR>2 {print $3}') || true"
    "15":
      - name: zypper-refresh
        commands:
          - "zypper --gpg-auto-import-keys refresh || true"


