---
- name: Define critical filesystem requirements
  ansible.builtin.set_fact:
    uip_pre_fs_req:
      - name: root
        path: /
        min_mb: "{{ uip_pre_min_root_mb }}"
      - name: boot
        path: /boot
        min_mb: "{{ uip_pre_min_boot_mb }}"
      - name: var
        path: /var
        min_mb: "{{ uip_pre_min_var_mb }}"
      - name: tmp
        path: /tmp
        min_mb: "{{ uip_pre_min_tmp_mb }}"
  tags:
    - uip_precheck
    - uip_precheck_fs
    - uip_preupgrade

- name: Build critical filesystem verification report
  ansible.builtin.set_fact:
    uip_pre_fs_report: "{{ uip_pre_fs_report | default([]) + [uip_pre_fs_item] }}"
  vars:
    uip_pre_fs_mount: >-
      {{
        (
          ansible_mounts
          | selectattr('mount', 'equalto', item.path)
          | list
          | first
        )
        | default({})
      }}
    uip_pre_fs_free_mb: "{{ (uip_pre_fs_mount.size_available | default(0) | int) // 1024 // 1024 }}"
    uip_pre_fs_item:
      name: "{{ item.name }}"
      path: "{{ item.path }}"
      free_mb: "{{ uip_pre_fs_free_mb | int }}"
      status: "{{ 'ok' if (uip_pre_fs_free_mb | int) >= (item.min_mb | int) else 'ko' }}"
      min_required_mb: "{{ item.min_mb | int }}"
      mount: "{{ uip_pre_fs_mount.mount | default(item.path) }}"
      fstype: "{{ uip_pre_fs_mount.fstype | default('unknown') }}"
  loop: "{{ uip_pre_fs_req }}"
  tags:
    - uip_precheck
    - uip_precheck_fs
    - uip_preupgrade

- name: Display critical filesystem verification report
  ansible.builtin.debug:
    var: uip_pre_fs_report
  tags:
    - uip_precheck
    - uip_precheck_fs
    - uip_preupgrade

- name: Persist critical filesystem verification report as YAML
  ansible.builtin.copy:
    dest: "{{ uip_report_dir }}/precheck-filesystems.yml"
    owner: root
    group: root
    mode: "0640"
    content: "{{ uip_pre_fs_report | to_nice_yaml }}"
  tags:
    - uip_precheck
    - uip_precheck_fs
    - uip_preupgrade

- name: Persist critical filesystem verification report in UIP state
  ansible.builtin.copy:
    dest: "{{ uip_state_file }}"
    owner: root
    group: root
    mode: "0640"
    content: |
      host: "{{ inventory_hostname }}"
      os: "{{ uip_os }}"
      src_ver: "{{ uip_src_ver }}"
      dst_ver: "{{ uip_dst_ver }}"
      path: "{{ uip_path_key }}"
      repo_mgr: "{{ uip_repo_mgr }}"
      state: "precheck_fs_collected"
      fs_report:
      {{ uip_pre_fs_report | to_nice_yaml(indent=2) | indent(2, true) }}
      updated_at: "{{ ansible_date_time.iso8601 }}"
  tags:
    - uip_precheck
    - uip_precheck_fs
    - uip_preupgrade
