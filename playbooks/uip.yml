---
- name: Enterprise Linux in-place upgrade
  hosts: linux
  become: true
  gather_facts: true
  serial: '{{ uip_serial }}'
  roles:
    - role: uip_common
      tags:
        - always
        - uip_common
        - uip_preupgrade
    - role: uip_discovery
      tags:
        - uip_discovery
        - uip_preupgrade
    - role: uip_snapshot
      tags:
        - uip_snapshot
        - uip_preupgrade
    - role: uip_precheck
      tags:
        - uip_precheck
        - uip_preupgrade
    - role: uip_remediate
      tags:
        - uip_remediate
        - uip_preupgrade
    - role: uip_upgrade
      tags:
        - uip_upgrade
        - uip_postupgrade
    - role: uip_postcheck
      tags:
        - uip_postcheck
        - uip_postupgrade
    - role: uip_report
      tags:
        - always
        - uip_report
        - uip_postupgrade
